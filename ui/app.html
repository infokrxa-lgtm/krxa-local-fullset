<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#eaf0f7;
    color:#111827;
}
.app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    background:#f8fafc;
    display:flex;
    flex-direction:column;
}
.header{
    background:#0b1f3a;
    color:white;
    padding:14px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
}
.status{
    margin:12px;
    padding:10px;
    border-radius:12px;
    background:#ecfdf5;
    color:#065f46;
    font-size:14px;
    text-align:center;
}
.micWrap{
    padding:12px;
}
.mic{
    width:100%;
    height:72px;
    border:0;
    border-radius:18px;
    background:#16a34a;
    color:white;
    font-size:22px;
    font-weight:bold;
}
.chat{
    flex:1;
    overflow-y:auto;
    padding:12px;
}
.msg{
    padding:12px;
    margin:10px 0;
    border-radius:14px;
    line-height:1.45;
    font-size:15px;
}
.user{
    background:#dbeafe;
}
.krxa{
    background:white;
    border:1px solid #e5e7eb;
}
.label{
    font-size:12px;
    font-weight:bold;
    color:#475569;
    margin-bottom:5px;
}
.cards{
    padding:0 12px 12px 12px;
}
.card{
    background:#fff7ed;
    border:1px solid #fed7aa;
    padding:14px;
    margin:8px 0;
    border-radius:14px;
    font-weight:bold;
}
.card a{
    color:#2563eb;
    text-decoration:none;
}
.inputBox{
    padding:12px;
    background:white;
    border-top:1px solid #e5e7eb;
}
textarea{
    width:100%;
    height:64px;
    font-size:15px;
    padding:10px;
    border-radius:12px;
    border:1px solid #cbd5e1;
}
.btn{
    width:100%;
    padding:13px;
    margin-top:8px;
    border:0;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-weight:bold;
}
.btn.secondary{
    background:#64748b;
}
.tools{
    font-size:13px;
    margin-top:10px;
    text-align:center;
}
.tools a{
    color:#2563eb;
}
.small{
    font-size:12px;
    color:#64748b;
    text-align:center;
    margin-top:8px;
}
</style>
</head>

<body>
<div class="app">

<div class="header">KRXA · __SERVICE__ 서비스</div>

<div class="status" id="status">KRXA 준비됨 · 마이크를 누르고 자연스럽게 말하세요</div>

<div class="micWrap">
    <button class="mic" onclick="recordVoice()">🎤 말하기</button>
</div>

<div id="chat" class="chat"></div>

<div id="cards" class="cards"></div>

<div class="inputBox">
    <textarea id="t" placeholder="직접 입력도 가능합니다"></textarea>
    <button class="btn" onclick="sendText()">텍스트 전송</button>
    <button class="btn secondary" onclick="clearMemory()">단기 기억 초기화</button>

    <div class="small">
        현재는 회원가입 없이 guest/session 기준으로 기록됩니다.
    </div>

    <div class="tools">
        <a href="/user">홈</a> |
        <a id="historyLink" href="#" onclick="this.href='/history?session_id='+sessionId" target="_blank">기억보기</a>
    </div>
</div>

</div>

<script>
let sessionId = localStorage.getItem("krxa_session_id");
if(!sessionId){
    sessionId = "session-" + Math.random().toString(16).slice(2,10);
    localStorage.setItem("krxa_session_id", sessionId);
}

function setStatus(t){
    document.getElementById("status").innerText = t;
}

function addChat(who, text, cls){
    let chat = document.getElementById("chat");
    chat.innerHTML +=
        "<div class='msg " + cls + "'>" +
        "<div class='label'>" + who + "</div>" +
        text +
        "</div>";

    let msgs = chat.querySelectorAll(".msg");
    if(msgs.length > 10){
        msgs[0].remove();
    }

    chat.scrollTop = chat.scrollHeight;
}

function showCards(cards){
    let html = "";
    if(cards && cards.length > 0){
        cards.forEach(function(c){
            if(c.url){
                html += "<div class='card'><a href='" + c.url + "' target='_blank'>↗ " + c.label + "</a></div>";
            } else if(c.text){
                html += "<div class='card'>" + c.label + "<br><span style='font-weight:normal'>" + c.text + "</span></div>";
            }
        });
    }
    document.getElementById("cards").innerHTML = html;
}

async function sendKRXA(text){
    if(!text){ return; }

    addChat("나", text, "user");
    setStatus("KRXA가 듣고 이해하는 중...");

    let fd = new FormData();
    fd.append("text", text);
    fd.append("service", "__SERVICE__");
    fd.append("session_id", sessionId);

    try{
        let r = await fetch("/chat", {method:"POST", body:fd});
        let j = await r.json();

        if(j.session_id){
            sessionId = j.session_id;
            localStorage.setItem("krxa_session_id", sessionId);
        }

        addChat("KRXA", j.result, "krxa");
        showCards(j.cards);

        setStatus("KRXA가 음성으로 전달 중...");
        await playTTS(j.result);

        setStatus("KRXA 준비됨 · 다음 말을 해주세요");
    }catch(e){
        setStatus("오류 발생: " + e.message);
    }
}

async function sendText(){
    let input = document.getElementById("t");
    let text = input.value.trim();
    input.value = "";
    await sendKRXA(text);
}

async function recordVoice(){
    try{
        setStatus("듣는 중... 3.5초 동안 말하세요");

        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        const mr = new MediaRecorder(stream);
        let chunks = [];

        mr.ondataavailable = e => chunks.push(e.data);

        mr.onstop = async () => {
            stream.getTracks().forEach(track => track.stop());

            setStatus("음성 인식 중...");
            let blob = new Blob(chunks, {type:"audio/webm"});
            let fd = new FormData();
            fd.append("file", blob, "voice.webm");

            try{
                let r = await fetch("/api/stt", {method:"POST", body:fd});
                let j = await r.json();

                if(j.ok && j.text){
                    await sendKRXA(j.text);
                }else{
                    setStatus("음성 인식 실패");
                }
            }catch(e){
                setStatus("STT 오류: " + e.message);
            }
        };

        mr.start();
        setTimeout(()=>mr.stop(), 3500);

    }catch(e){
        alert("마이크 권한을 허용해야 합니다.");
        setStatus("마이크 권한 필요");
    }
}

async function playTTS(text){
    try{
        let fd = new FormData();
        fd.append("text", text);

        let r = await fetch("/api/tts", {method:"POST", body:fd});
        let blob = await r.blob();

        if(blob.size < 100){
            setStatus("음성 생성 실패");
            return;
        }

        let audio = new Audio(URL.createObjectURL(blob));
        await audio.play();

    }catch(e){
        setStatus("스피커 재생 실패");
    }
}

async function clearMemory(){
    let fd = new FormData();
    fd.append("session_id", sessionId);

    await fetch("/history/clear", {method:"POST", body:fd});

    document.getElementById("chat").innerHTML = "";
    document.getElementById("cards").innerHTML = "";
    setStatus("단기 기억을 초기화했습니다.");
}
</script>
</body>
</html>
