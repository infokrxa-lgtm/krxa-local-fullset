<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRXA Voice Travel</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#eef2f7;font-family:Arial,sans-serif}
.wrap{max-width:420px;margin:auto;height:100vh;background:#f8fafc;display:flex;flex-direction:column;overflow:hidden}
.top{background:#082046;color:white;padding:10px;text-align:center;font-size:17px;font-weight:bold}
.modebar,.langbar{display:flex;gap:8px;padding:8px 12px;background:#f8fafc}
.modebtn,.langbtn{flex:1;border:0;border-radius:11px;padding:9px;font-weight:bold;background:#e5e7eb;color:#334155}
.modebtn.active,.langbtn.active{background:#0ea5e9;color:white}
.status{margin:0 12px 6px;background:#e8f8ee;color:#25734d;padding:8px;border-radius:10px;text-align:center;font-size:13px}
.flow{margin:0 12px 6px;background:#dbeafe;color:#1e3a8a;padding:8px;border-radius:10px;text-align:center;font-size:13px;font-weight:bold}
.chat{flex:1;overflow-y:auto;padding:10px 12px 20px;background:#f8fafc}
.me{background:#dbeafe;padding:11px;border-radius:12px;margin-bottom:8px;font-size:15px}
.bot{background:white;padding:11px;border-radius:12px;margin-bottom:8px;border:1px solid #ddd;font-size:15px}
.hold{background:#fef3c7;color:#92400e;padding:10px;border-radius:12px;margin-bottom:8px;font-size:14px}
.err{background:#fee2e2;color:#991b1b;padding:10px;border-radius:12px;margin-bottom:8px;font-size:14px}
.bottom{background:#f8fafc;padding:8px 12px;border-top:1px solid #e5e7eb}
.row{display:flex;gap:10px;margin-bottom:8px}
.btn{flex:1;border:0;border-radius:14px;padding:12px;color:white;font-size:17px;font-weight:bold}
.mic{background:#16a34a}
.map{background:#2563eb}
textarea{width:100%;height:50px;border-radius:10px;border:1px solid #bbb;padding:8px;font-size:15px}
.send{margin-top:7px;width:100%;border:0;background:#2563eb;color:white;padding:11px;border-radius:10px;font-size:16px;font-weight:bold}
.small{font-size:11px;color:#64748b;text-align:center;margin-top:5px}
</style>
</head>

<body>
<div class="wrap">
    <div class="top">KRXA · __SERVICE__ 서비스</div>

    <div class="modebar">
        <button id="interpreterBtn" class="modebtn" onclick="setMode('interpreter')">무료 통역</button>
        <button id="agencyBtn" class="modebtn" onclick="setMode('agency')">여행 에이전시</button>
    </div>

    <div class="langbar">
        <button id="langAuto" class="langbtn" onclick="setLang('auto')">자동</button>
        <button id="langGps" class="langbtn" onclick="setLang('gps')">GPS</button>
        <button id="langKo" class="langbtn" onclick="setLang('ko')">KO</button>
        <button id="langEn" class="langbtn" onclick="setLang('en')">EN</button>
        <button id="langJa" class="langbtn" onclick="setLang('ja')">JA</button>
    </div>

    <div class="status" id="status">KRXA 준비됨</div>
    <div class="flow" id="flowSignal">흐름 대기 중</div>

    <div class="chat" id="chat"></div>

    <div class="bottom">
        <div class="row">
            <button class="btn mic" onclick="recordVoice()">🎤 말하기</button>
            <button class="btn map" onclick="openMap()">📍 지도 안내</button>
        </div>

        <textarea id="text" placeholder="말하거나 직접 입력하세요"></textarea>
        <button id="sendBtn" class="send" onclick="sendText()">텍스트 전송</button>
        <div class="small" id="locText">기기 위치 참고 · 사용자 언어 선택/GPS 반영</div>
    </div>
</div>

<script>
const SERVICE = "__SERVICE__";

let sessionId = localStorage.getItem("krxa_session_id");
if(!sessionId){
    sessionId = "session-" + Math.random().toString(16).slice(2,10);
    localStorage.setItem("krxa_session_id", sessionId);
}

let mode = localStorage.getItem("krxa_mode") || "agency";
let selectedLanguageMode = localStorage.getItem("krxa_language_mode") || "gps";

let currentLat = "";
let currentLng = "";
let currentPlace = "";
let currentAudio = null;
let sending = false;

let pendingSpeech = "";

function setStatus(t){
    document.getElementById("status").innerText = t;
}

function setFlow(t){
    document.getElementById("flowSignal").innerText = t || "흐름 유지 중";
}

function setMode(m){
    mode = m;
    localStorage.setItem("krxa_mode", mode);

    document.getElementById("interpreterBtn").classList.toggle("active", mode === "interpreter");
    document.getElementById("agencyBtn").classList.toggle("active", mode === "agency");

    setStatus(mode === "interpreter" ? "무료 통역 전용 루트" : "여행 에이전시 모드");
}

function setLang(l){
    selectedLanguageMode = l;
    localStorage.setItem("krxa_language_mode", selectedLanguageMode);

    ["Auto","Gps","Ko","En","Ja"].forEach(x=>{
        document.getElementById("lang"+x).classList.remove("active");
    });

    const map = {auto:"langAuto",gps:"langGps",ko:"langKo",en:"langEn",ja:"langJa"};
    document.getElementById(map[l]).classList.add("active");

    setStatus("STT 언어 기준: " + l.toUpperCase());
}

setTimeout(()=>{
    setMode(mode);
    setLang(selectedLanguageMode);
},0);

function escapeHtml(text){
    return String(text)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
}

function scrollToBottom(){
    const chat = document.getElementById("chat");
    requestAnimationFrame(()=>{
        chat.scrollTop = chat.scrollHeight;
        setTimeout(()=>{chat.scrollTop = chat.scrollHeight;},100);
    });
}

function addMessage(type,title,text){
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = type;
    div.innerHTML = "<b>" + title + "</b><br>" + escapeHtml(text);
    chat.appendChild(div);

    while(chat.children.length > 5){
        chat.removeChild(chat.children[0]);
    }

    scrollToBottom();
}

function addError(text){
    addMessage("err","오류",text);
}

function addHold(text){
    addMessage("hold","KRXA",text);
}

function stopAudio(){
    try{
        if(currentAudio){
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
    }catch(e){}
}

async function sendToServer(message, source="text"){
    const clean = (message || "").trim();

    if(!clean){
        setStatus("입력 내용이 없습니다.");
        return;
    }

    if(sending){
        setStatus("이전 요청 처리 중...");
        return;
    }

    sending = true;
    document.getElementById("sendBtn").disabled = true;

    addMessage("me","나",clean);

    const apiUrl = mode === "interpreter" ? "/api/translate" : "/api/turn";

    setStatus(mode === "interpreter" ? "무료 통역 처리 중..." : "여행 에이전시 처리 중...");
    setFlow("응답 준비 중");

    const fd = new FormData();
    fd.append("text", clean);
    fd.append("service", SERVICE);
    fd.append("session_id", sessionId);
    fd.append("source", source);
    fd.append("location_text", currentPlace);
    fd.append("lat", currentLat);
    fd.append("lng", currentLng);
    fd.append("device_locale", navigator.language || "");

    if(mode !== "interpreter"){
        fd.append("mode", "agency");
    }

    try{
        const res = await fetch(apiUrl, {method:"POST", body:fd});
        const raw = await res.text();

        if(!res.ok){
            addError(apiUrl + " 오류: " + raw);
            setStatus("서버 오류");
            setFlow("오류 발생");
            return;
        }

        let data = JSON.parse(raw);

        if(data.session_id){
            sessionId = data.session_id;
            localStorage.setItem("krxa_session_id", sessionId);
        }

        if(data.result){
            addMessage("bot","KRXA",data.result);
            setStatus("다음 말을 해주세요.");
            setFlow("흐름 유지 중");
            playTTS(data.result);
        }else{
            addError("응답 결과 없음");
            setStatus("응답 없음");
            setFlow("응답 없음");
        }

    }catch(e){
        addError("전송 실패: " + e.message);
        setStatus("전송 실패");
        setFlow("전송 실패");
    }finally{
        sending = false;
        document.getElementById("sendBtn").disabled = false;
        scrollToBottom();
    }
}

async function recordVoice(){
    stopAudio();

    try{
        setStatus("5초 동안 말해주세요...");
        setFlow("듣는 중");

        const stream = await navigator.mediaDevices.getUserMedia({
            audio:{
                echoCancellation:true,
                noiseSuppression:true,
                autoGainControl:true,
                channelCount:1
            }
        });

        const mr = new MediaRecorder(stream);
        let chunks = [];

        mr.ondataavailable = e => {
            if(e.data && e.data.size > 0){
                chunks.push(e.data);
            }
        };

        mr.onstop = async ()=>{
            stream.getTracks().forEach(track=>track.stop());

            const blob = new Blob(chunks,{type:"audio/webm"});

            if(blob.size < 1500){
                setStatus("음성이 너무 짧습니다.");
                setFlow("음성 입력 부족");
                return;
            }

            setStatus("음성 인식 중...");
            setFlow("판단 중");

            const fd = new FormData();
            fd.append("file", blob, "voice.webm");
            fd.append("session_id", sessionId);
            fd.append("duration", "5");
            fd.append("user_language_mode", selectedLanguageMode);
            fd.append("lat", currentLat);
            fd.append("lng", currentLng);
            fd.append("device_locale", navigator.language || "");

            try{
                const res = await fetch("/api/stt", {method:"POST", body:fd});
                const raw = await res.text();

                if(!res.ok){
                    addError("/api/stt 오류: " + raw);
                    setStatus("STT 오류");
                    setFlow("STT 오류");
                    return;
                }

                let data = JSON.parse(raw);

                setFlow(data.flow_signal || "흐름 유지 중");

                if(!data.ok || !data.text){
                    setStatus("음성 인식 실패 · " + (data.reason || "다시 말해주세요."));
                    return;
                }

                const turn = data.turn_analysis && data.turn_analysis.turn ? data.turn_analysis.turn : {};
                const bg = data.turn_analysis && data.turn_analysis.background ? data.turn_analysis.background : {};

                if(bg.is_background && bg.action === "block"){
                    setStatus("배경음으로 판단되어 호출 보류");
                    setFlow(data.flow_signal || "배경음 차단");
                    addHold("배경음으로 판단되어 대화 엔진 호출을 보류했습니다.");
                    return;
                }

                if(data.should_call_llm === false){
                    pendingSpeech = (pendingSpeech + " " + data.text).trim();
                    setStatus("발화가 이어지는 중으로 판단 · 계속 말해주세요.");
                    setFlow(data.flow_signal || "계속 듣는 중");
                    addHold("아직 말이 끝나지 않은 것으로 판단했습니다: " + pendingSpeech);
                    return;
                }

                const finalText = (pendingSpeech ? pendingSpeech + " " : "") + data.text;
                pendingSpeech = "";

                await sendToServer(finalText, "voice");

            }catch(e){
                addError("STT 실패: " + e.message);
                setStatus("STT 실패");
                setFlow("STT 실패");
            }
        };

        mr.start();

        setTimeout(()=>{
            if(mr.state !== "inactive"){
                mr.stop();
            }
        },5000);

    }catch(e){
        addError("마이크 오류: " + e.message);
        setStatus("마이크 권한 필요");
        setFlow("마이크 오류");
    }
}

async function playTTS(text){
    try{
        const fd = new FormData();
        fd.append("text", text);
        fd.append("session_id", sessionId);

        const res = await fetch("/api/tts", {method:"POST", body:fd});
        const blob = await res.blob();

        if(blob.size < 100){ return; }

        currentAudio = new Audio(URL.createObjectURL(blob));
        currentAudio.play();

    }catch(e){
        setStatus("TTS 실패");
    }
}

function sendText(){
    const el = document.getElementById("text");
    const text = el.value.trim();
    el.value = "";
    sendToServer(text, "text");
}

document.getElementById("text").addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendText();
    }
});

function openMap(){
    let url = "https://www.google.com/maps";

    if(currentPlace){
        url = "https://www.google.com/maps/search/" + encodeURIComponent(currentPlace);
    }else if(currentLat && currentLng){
        url = "https://www.google.com/maps/search/travel+nearby/@" + currentLat + "," + currentLng + ",15z";
    }

    window.open(url,"_blank");
}

function requestDeviceLocation(){
    if(!navigator.geolocation){
        document.getElementById("locText").innerText = "GPS 미지원 · 언어 선택값 사용";
        return;
    }

    navigator.geolocation.getCurrentPosition(
        pos=>{
            currentLat = pos.coords.latitude;
            currentLng = pos.coords.longitude;
            document.getElementById("locText").innerText =
                "기기 위치 확인됨 · 언어 기준: " + selectedLanguageMode.toUpperCase();
        },
        err=>{
            document.getElementById("locText").innerText = "위치 권한 없음 · 언어 선택값 사용";
        },
        {enableHighAccuracy:true,timeout:8000,maximumAge:30000}
    );
}

requestDeviceLocation();
</script>
</body>
</html>
