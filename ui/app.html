<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRXA Voice Travel</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    background:#eef2f7;
    font-family:Arial,sans-serif;
}

.wrap{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    background:#f8fafc;
    display:flex;
    flex-direction:column;
}

.top{
    position:sticky;
    top:0;
    z-index:10;
    background:#082046;
    color:white;
    padding:16px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.modebar{
    display:flex;
    gap:8px;
    padding:12px 14px;
    background:#f8fafc;
    position:sticky;
    top:56px;
    z-index:9;
}

.modebtn{
    flex:1;
    border:0;
    border-radius:12px;
    padding:12px;
    font-weight:bold;
    background:#e5e7eb;
    color:#334155;
}

.modebtn.active{
    background:#0ea5e9;
    color:white;
}

.status{
    margin:0 14px 10px;
    background:#e8f8ee;
    color:#25734d;
    padding:11px;
    border-radius:10px;
    text-align:center;
    font-size:14px;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:12px 14px 160px;
}

.me{
    background:#dbeafe;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    font-size:15px;
}

.bot{
    background:white;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    border:1px solid #ddd;
    font-size:15px;
}

.err{
    background:#fee2e2;
    color:#991b1b;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    font-size:14px;
}

.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    max-width:420px;
    margin:auto;
    background:#f8fafc;
    padding:12px 14px;
    border-top:1px solid #e5e7eb;
}

.row{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.btn{
    flex:1;
    border:0;
    border-radius:14px;
    padding:16px;
    color:white;
    font-size:20px;
    font-weight:bold;
}

.mic{background:#16a34a}
.map{background:#2563eb}

textarea{
    width:100%;
    height:64px;
    border-radius:10px;
    border:1px solid #bbb;
    padding:10px;
    font-size:15px;
}

.send{
    margin-top:10px;
    width:100%;
    border:0;
    background:#2563eb;
    color:white;
    padding:15px;
    border-radius:10px;
    font-size:17px;
    font-weight:bold;
}

.small{
    font-size:12px;
    color:#64748b;
    text-align:center;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="wrap">

    <div class="top">
        KRXA · __SERVICE__ 서비스
    </div>

    <div class="modebar">
        <button id="interpreterBtn"
                class="modebtn active"
                onclick="setMode('interpreter')">
            무료 통역
        </button>

        <button id="agencyBtn"
                class="modebtn"
                onclick="setMode('agency')">
            여행 에이전시
        </button>
    </div>

    <div class="status" id="status">
        KRXA 준비됨
    </div>

    <div class="chat" id="chat"></div>

    <div class="bottom">

        <div class="row">
            <button class="btn mic"
                    onclick="recordVoice()">
                🎤 말하기
            </button>

            <button class="btn map"
                    onclick="openMap()">
                📍 지도 안내
            </button>
        </div>

        <textarea id="text"
                  placeholder="말하거나 직접 입력하세요"></textarea>

        <button class="send"
                onclick="sendText()">
            텍스트 전송
        </button>

        <div class="small" id="locText">
            기기 위치 참고 · 사용자가 말한 장소 우선
        </div>

    </div>

</div>

<script>

const SERVICE = "__SERVICE__";

let sessionId =
    localStorage.getItem("krxa_session_id");

if(!sessionId){
    sessionId =
        "session-" +
        Math.random().toString(16).slice(2,10);

    localStorage.setItem(
        "krxa_session_id",
        sessionId
    );
}

let mode =
    localStorage.getItem("krxa_mode")
    || "interpreter";

let currentLat = "";
let currentLng = "";
let currentPlace = "";
let currentAudio = null;
let appConfig = {};

function setStatus(t){
    document.getElementById("status").innerText = t;
}

function setMode(m){
    mode = m;

    localStorage.setItem(
        "krxa_mode",
        mode
    );

    document.getElementById("interpreterBtn")
        .classList.toggle(
            "active",
            mode === "interpreter"
        );

    document.getElementById("agencyBtn")
        .classList.toggle(
            "active",
            mode === "agency"
        );

    setStatus(
        mode === "interpreter"
        ? "무료 통역 모드"
        : "여행 에이전시 모드"
    );
}

setTimeout(()=>setMode(mode),0);

async function loadConfig(){
    try{
        const r = await fetch("/api/config");
        const j = await r.json();

        if(j.ok){
            appConfig = j.config || {};
        }
    }catch(e){}
}

loadConfig();

function escapeHtml(text){
    return String(text)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
}

function addMessage(type,title,text){

    const chat =
        document.getElementById("chat");

    const div =
        document.createElement("div");

    div.className = type;

    div.innerHTML =
        "<b>" + title + "</b><br>" +
        escapeHtml(text);

    chat.appendChild(div);

    while(chat.children.length > 4){
        chat.removeChild(chat.children[0]);
    }

    chat.scrollTop = chat.scrollHeight;
}

function addError(text){

    const chat =
        document.getElementById("chat");

    const div =
        document.createElement("div");

    div.className = "err";

    div.innerHTML =
        "<b>오류</b><br>" +
        escapeHtml(text);

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function stopAudio(){

    try{
        if(currentAudio){
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
    }catch(e){}
}

async function sendToServer(message){

    if(!message || !message.trim()){
        setStatus("입력 없음");
        return;
    }

    addMessage("me","나",message);

    setStatus("KRXA 처리 중...");

    const fd = new FormData();

    fd.append("text", message);
    fd.append("service", SERVICE);
    fd.append("session_id", sessionId);
    fd.append("mode", mode);

    try{

        const res =
            await fetch("/chat",{
                method:"POST",
                body:fd
            });

        const raw =
            await res.text();

        if(!res.ok){

            addError(raw);

            setStatus("서버 오류");

            return;
        }

        const data =
            JSON.parse(raw);

        if(data.session_id){

            sessionId =
                data.session_id;

            localStorage.setItem(
                "krxa_session_id",
                sessionId
            );
        }

        addMessage(
            "bot",
            "KRXA",
            data.result
        );

        setStatus("응답 완료");

        playTTS(data.result);

    }catch(e){

        addError(e.message);

        setStatus("전송 실패");
    }
}

async function recordVoice(){

    stopAudio();

    try{

        setStatus("5초 동안 말해주세요...");

        const stream =
            await navigator.mediaDevices.getUserMedia({
                audio:{
                    echoCancellation:true,
                    noiseSuppression:true,
                    autoGainControl:true,
                    channelCount:1
                }
            });

        const mr =
            new MediaRecorder(stream);

        let chunks = [];

        mr.ondataavailable =
            e => chunks.push(e.data);

        mr.onstop = async ()=>{

            stream.getTracks()
                .forEach(track=>track.stop());

            const blob =
                new Blob(
                    chunks,
                    {type:"audio/webm"}
                );

            if(blob.size < 1500){

                setStatus(
                    "음성이 너무 짧습니다."
                );

                return;
            }

            setStatus("음성 인식 중...");

            const fd =
                new FormData();

            fd.append(
                "file",
                blob,
                "voice.webm"
            );

            fd.append(
                "session_id",
                sessionId
            );

            fd.append(
                "duration",
                "5"
            );

            try{

                const res =
                    await fetch(
                        "/api/stt",
                        {
                            method:"POST",
                            body:fd
                        }
                    );

                const raw =
                    await res.text();

                if(!res.ok){

                    addError(raw);

                    setStatus(
                        "STT 오류"
                    );

                    return;
                }

                const data =
                    JSON.parse(raw);

                if(
                    data.ok &&
                    data.text
                ){

                    sendToServer(
                        data.text
                    );

                }else{

                    setStatus(
                        "음성 인식 실패"
                    );
                }

            }catch(e){

                addError(e.message);

                setStatus(
                    "STT 실패"
                );
            }
        };

        mr.start();

        setTimeout(()=>{

            if(
                mr.state !==
                "inactive"
            ){
                mr.stop();
            }

        },5000);

    }catch(e){

        addError(e.message);

        setStatus(
            "마이크 권한 필요"
        );
    }
}

async function playTTS(text){

    try{

        const fd =
            new FormData();

        fd.append(
            "text",
            text
        );

        fd.append(
            "session_id",
            sessionId
        );

        const res =
            await fetch(
                "/api/tts",
                {
                    method:"POST",
                    body:fd
                }
            );

        const blob =
            await res.blob();

        if(blob.size < 100){
            return;
        }

        currentAudio =
            new Audio(
                URL.createObjectURL(blob)
            );

        currentAudio.play();

    }catch(e){

        setStatus(
            "TTS 실패"
        );
    }
}

function sendText(){

    const el =
        document.getElementById("text");

    const text =
        el.value.trim();

    el.value = "";

    sendToServer(text);
}

function openMap(){

    let url =
        "https://www.google.com/maps";

    if(currentPlace){

        url =
            "https://www.google.com/maps/search/" +
            encodeURIComponent(
                currentPlace
            );

    }else if(
        currentLat &&
        currentLng
    ){

        url =
            "https://www.google.com/maps/search/travel+nearby/@"
            + currentLat + ","
            + currentLng +
            ",15z";
    }

    window.open(
        url,
        "_blank"
    );
}

function requestDeviceLocation(){

    if(!navigator.geolocation){
        return;
    }

    navigator.geolocation.getCurrentPosition(
        pos=>{
            currentLat =
                pos.coords.latitude;

            currentLng =
                pos.coords.longitude;

            document.getElementById(
                "locText"
            ).innerText =
                "기기 위치 확인됨";
        },
        err=>{
            document.getElementById(
                "locText"
            ).innerText =
                "위치 권한 없음";
        },
        {
            enableHighAccuracy:true,
            timeout:8000,
            maximumAge:30000
        }
    );
}

requestDeviceLocation();

</script>

</body>
</html>
