<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRXA Travel V1</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#eaf1f8;font-family:Arial,sans-serif;color:#0f172a}
.wrap{max-width:430px;margin:auto;height:100vh;background:#f8fafc;display:flex;flex-direction:column;overflow:hidden}
.hero{background:linear-gradient(180deg,#0b5bbb,#0b3b7a);color:white;padding:20px 16px 14px;text-align:center}
.hero h1{margin:0;font-size:34px}
.hero p{margin:6px 0 12px;font-size:15px}
.search{background:white;color:#64748b;border-radius:999px;padding:12px 15px;text-align:left}
.langbar{display:flex;gap:7px;padding:10px 12px}
.langbtn{flex:1;border:0;border-radius:12px;padding:10px 4px;font-weight:bold;background:#e5e7eb;color:#334155}
.langbtn.active{background:#0ea5e9;color:white}
.otherLang{display:none;padding:0 12px 8px}
.otherLang select{width:100%;padding:10px;border-radius:10px;border:1px solid #cbd5e1}
.status{margin:0 12px 6px;background:#e8f8ee;color:#25734d;padding:8px;border-radius:10px;text-align:center;font-size:13px}
.flow{margin:0 12px 8px;background:#dbeafe;color:#1e3a8a;padding:8px;border-radius:10px;text-align:center;font-size:13px;font-weight:bold}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:9px 12px}
.tab{background:white;border:1px solid #e5e7eb;border-radius:14px;padding:10px 3px;text-align:center;font-weight:bold;font-size:12px;box-shadow:0 3px 10px rgba(0,0,0,.07)}
.tab span{display:block;font-size:22px;margin-bottom:4px}
.panel{padding:0 12px 8px;max-height:178px;overflow:auto}
.card{background:white;border:1px solid #ddd;border-radius:12px;padding:10px;margin:7px 0}
.card b{font-size:15px}
.card small{color:#64748b;word-break:break-all}
.card button{margin-top:7px;width:100%;border:0;border-radius:10px;padding:9px;background:#2563eb;color:white;font-weight:bold}
.chat{flex:1;overflow-y:auto;padding:8px 12px 16px;background:#f8fafc}
.me{background:#dbeafe;padding:10px;border-radius:12px;margin-bottom:8px;font-size:15px}
.bot{background:white;padding:10px;border-radius:12px;margin-bottom:8px;border:1px solid #ddd;font-size:15px}
.err{background:#fee2e2;color:#991b1b;padding:10px;border-radius:12px;margin-bottom:8px;font-size:14px}
.bottom{background:#f8fafc;padding:8px 12px;border-top:1px solid #e5e7eb}
.row{display:flex;gap:10px;margin-bottom:8px}
.btn{flex:1;border:0;border-radius:14px;padding:12px;color:white;font-size:17px;font-weight:bold}
.mic{background:#16a34a}.map{background:#2563eb}.sos{background:#dc2626}.memory{background:#7c3aed}
textarea{width:100%;height:48px;border-radius:10px;border:1px solid #bbb;padding:8px;font-size:15px}
.send{margin-top:7px;width:100%;border:0;background:#2563eb;color:white;padding:11px;border-radius:10px;font-size:16px;font-weight:bold}
.small{font-size:11px;color:#64748b;text-align:center;margin-top:5px}
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
  <h1>말대말</h1>
  <p>통역하고, 연결하고, 기억합니다</p>
  <div class="search" onclick="openMap()">📍 지도에서 주변 확인</div>
</div>

<div class="langbar">
  <button id="langAuto" class="langbtn" onclick="setLang('auto')">자동</button>
  <button id="langEn" class="langbtn" onclick="setLang('en')">영어</button>
  <button id="langJa" class="langbtn" onclick="setLang('ja')">일본어</button>
  <button id="langZh" class="langbtn" onclick="setLang('zh')">중국어</button>
  <button id="langOther" class="langbtn" onclick="setLang('other')">기타</button>
</div>

<div class="otherLang" id="otherLangBox">
  <select id="otherLangSelect" onchange="setOtherLang(this.value)">
    <option value="fr">프랑스어</option>
    <option value="de">독일어</option>
    <option value="es">스페인어</option>
    <option value="it">이탈리아어</option>
    <option value="vi">베트남어</option>
    <option value="th">태국어</option>
    <option value="id">인도네시아어</option>
    <option value="ru">러시아어</option>
  </select>
</div>

<div class="status" id="status">상대언어를 선택하고 말하세요</div>
<div class="flow" id="flowSignal">KRXAI 기억 루프 대기 중</div>

<div class="tabs">
  <div class="tab" onclick="openInterpreter()"><span>🎤</span>통역</div>
  <div class="tab" onclick="openTravelCategory('airport')"><span>✈️</span>공항</div>
  <div class="tab" onclick="openTravelCategory('hotel')"><span>🏨</span>호텔</div>
  <div class="tab" onclick="openTravelCategory('food')"><span>🍜</span>식당</div>
  <div class="tab" onclick="openTravelCategory('transport')"><span>🚕</span>이동</div>
  <div class="tab" onclick="openTravelCategory('tour')"><span>📷</span>관광</div>
  <div class="tab" onclick="openTravelCategory('shopping')"><span>🛍️</span>쇼핑</div>
  <div class="tab" onclick="openSOS()"><span>🆘</span>SOS</div>
  <div class="tab" onclick="openTravelCategory('fun')"><span>🎬</span>재미</div>
  <div class="tab" onclick="openTravelCategory('game')"><span>🎮</span>게임</div>
  <div class="tab" onclick="showMemory()"><span>🧠</span>KRXAI</div>
  <div class="tab" onclick="openMap()"><span>🗺️</span>지도</div>
</div>

<div class="panel" id="linkPanel">
  <div class="card">
    <b>Travel V1</b><br>
    <small>판단하지 않습니다. 통역하고, 검증된 외부 사이트로 연결합니다.</small>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="bottom">
  <div class="row">
    <button class="btn mic" onclick="recordVoice()">🎤 말하기</button>
    <button class="btn map" onclick="openMap()">📍 지도</button>
  </div>
  <div class="row">
    <button class="btn sos" onclick="openSOS()">🆘 SOS</button>
    <button class="btn memory" onclick="showMemory()">🧠 KRXAI</button>
  </div>

  <textarea id="text" placeholder="통역할 말을 입력하세요"></textarea>
  <button id="sendBtn" class="send" onclick="sendText()">통역하기</button>
  <div class="small" id="locText">기기 위치 확인 중</div>
</div>

</div>

<script>
const SERVICE = "__SERVICE__";

let sessionId = localStorage.getItem("krxa_session_id");
if(!sessionId){
  sessionId = "session-" + Math.random().toString(16).slice(2,10);
  localStorage.setItem("krxa_session_id", sessionId);
}

let selectedLanguageMode = localStorage.getItem("krxa_language_mode") || "auto";
let currentLat = "";
let currentLng = "";
let currentAudio = null;
let sending = false;

function setStatus(t){document.getElementById("status").innerText=t;}
function setFlow(t){document.getElementById("flowSignal").innerText=t||"흐름 유지 중";}

function remember(kind, detail){
  const key = "krxai_travel_v1_memory";
  let data = [];
  try{ data = JSON.parse(localStorage.getItem(key) || "[]"); }catch(e){}
  data.push({time:new Date().toISOString(), kind, detail});
  if(data.length > 200){ data = data.slice(data.length - 200); }
  localStorage.setItem(key, JSON.stringify(data));
}

function setLang(l){
  if(l !== "other"){
    selectedLanguageMode = l;
    localStorage.setItem("krxa_language_mode", l);
    document.getElementById("otherLangBox").style.display="none";
  }else{
    document.getElementById("otherLangBox").style.display="block";
    selectedLanguageMode = document.getElementById("otherLangSelect").value || "fr";
    localStorage.setItem("krxa_language_mode", selectedLanguageMode);
  }

  ["Auto","En","Ja","Zh","Other"].forEach(x=>document.getElementById("lang"+x).classList.remove("active"));
  const map={auto:"langAuto",en:"langEn",ja:"langJa",zh:"langZh"};
  if(map[l]) document.getElementById(map[l]).classList.add("active");
  else document.getElementById("langOther").classList.add("active");

  remember("language_selected",{language:selectedLanguageMode});
  setStatus("상대언어 기준: " + selectedLanguageMode.toUpperCase());
}

function setOtherLang(v){
  selectedLanguageMode = v;
  localStorage.setItem("krxa_language_mode", v);
  remember("language_selected",{language:v});
  setStatus("상대언어 기준: " + v.toUpperCase());
}

setTimeout(()=>{
  const base = ["auto","en","ja","zh"].includes(selectedLanguageMode) ? selectedLanguageMode : "other";
  setLang(base);
},0);

function escapeHtml(text){
  return String(text).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function scrollToBottom(){
  const chat=document.getElementById("chat");
  requestAnimationFrame(()=>{chat.scrollTop=chat.scrollHeight;setTimeout(()=>chat.scrollTop=chat.scrollHeight,100);});
}

function addMessage(type,title,text){
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className=type;
  div.innerHTML="<b>"+title+"</b><br>"+escapeHtml(text);
  chat.appendChild(div);
  while(chat.children.length>6){chat.removeChild(chat.children[0]);}
  scrollToBottom();
}

function addError(t){addMessage("err","오류",t);}

function openInterpreter(){
  document.getElementById("linkPanel").innerHTML=`
    <div class="card"><b>🎤 통역 모드</b><br><small>KRXA는 답변하지 않고 번역만 합니다.</small></div>
  `;
  remember("tab_opened",{category:"interpreter"});
}

async function openTravelCategory(category){
  remember("tab_opened",{category});
  const panel=document.getElementById("linkPanel");
  panel.innerHTML="<div class='card'>링크 불러오는 중...</div>";

  try{
    const r=await fetch("/api/travel-links/"+encodeURIComponent(category));
    const j=await r.json();

    if(!j.ok || !j.links || j.links.length===0){
      panel.innerHTML="<div class='card'>등록된 링크가 없습니다. CONTROL에서 추가하세요.</div>";
      return;
    }

    panel.innerHTML="";
    j.links.forEach(link=>{
      const div=document.createElement("div");
      div.className="card";
      div.innerHTML=`<b>${escapeHtml(link.name)}</b><br><small>${escapeHtml(link.url)}</small><button>새 창에서 열기</button>`;
      div.querySelector("button").onclick=()=>openExternal(link.url, link.name);
      panel.appendChild(div);
    });
  }catch(e){
    panel.innerHTML="<div class='card'>링크 로드 실패</div>";
  }
}

function openExternal(url,name){
  remember("external_link_opened",{name,url});
  window.open(url,"_blank");
}

async function sendToServer(message, source="text"){
  const clean=(message||"").trim();
  if(!clean){setStatus("입력 내용이 없습니다.");return;}
  if(sending){setStatus("이전 요청 처리 중...");return;}

  sending=true;
  document.getElementById("sendBtn").disabled=true;
  addMessage("me","원문",clean);
  setStatus("통역 처리 중...");
  setFlow("번역 준비 중");

  const fd=new FormData();
  fd.append("text",clean);
  fd.append("service",SERVICE);
  fd.append("session_id",sessionId);
  fd.append("source",source);
  fd.append("lat",currentLat);
  fd.append("lng",currentLng);
  fd.append("device_locale",navigator.language||"");
  fd.append("target_language",selectedLanguageMode);

  try{
    const res=await fetch("/api/translate",{method:"POST",body:fd});
    const raw=await res.text();
    if(!res.ok){addError("/api/translate 오류: "+raw);return;}

    const data=JSON.parse(raw);

    if(data.session_id){
      sessionId=data.session_id;
      localStorage.setItem("krxa_session_id",sessionId);
    }

    if(data.result){
      addMessage("bot","번역",data.result);
      remember("translation",{source:clean,result:data.result,target_language:selectedLanguageMode});
      setStatus("통역 완료");
      setFlow("KRXAI 기억 저장 완료");
      playTTS(data.result);
    }else{
      addError("번역 결과 없음");
    }
  }catch(e){
    addError("전송 실패: "+e.message);
  }finally{
    sending=false;
    document.getElementById("sendBtn").disabled=false;
    scrollToBottom();
  }
}

async function recordVoice(){
  try{
    setStatus("3초 동안 말해주세요...");
    setFlow("듣는 중");

    const stream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,channelCount:1}
    });

    const mr=new MediaRecorder(stream);
    let chunks=[];
    mr.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data);};

    mr.onstop=async()=>{
      stream.getTracks().forEach(track=>track.stop());
      const blob=new Blob(chunks,{type:"audio/webm"});

      if(blob.size<1200){setStatus("음성이 너무 짧습니다.");setFlow("음성 입력 부족");return;}

      setStatus("음성 인식 중...");
      setFlow("판단 중");

      const fd=new FormData();
      fd.append("file",blob,"voice.webm");
      fd.append("session_id",sessionId);
      fd.append("duration","3");

      // 중요:
      // STT 입력 언어는 상대언어가 아니라 auto로 둡니다.
      // 상대언어는 번역 단계에서만 target_language로 사용합니다.
      fd.append("user_language_mode","auto");
      fd.append("target_language",selectedLanguageMode);

      fd.append("lat",currentLat);
      fd.append("lng",currentLng);
      fd.append("device_locale",navigator.language||"");

      try{
        const res=await fetch("/api/stt",{method:"POST",body:fd});
        const data=await res.json();

        setFlow(data.flow_signal||"흐름 유지 중");

        if(!data.ok || !data.text){
          setStatus("음성 인식 실패 · 다시 말해주세요.");
          remember("stt_fail",{reason:data.reason,text:data.text});
          return;
        }

        const bg=data.turn_analysis&&data.turn_analysis.background?data.turn_analysis.background:{};

        if(bg.is_background && bg.action==="block"){
          addMessage("err","배경음","배경음으로 판단되어 통역을 보류했습니다.");
          setStatus("배경음 감지");
          remember("background_block",{text:data.text});
          return;
        }

        await sendToServer(data.text,"voice");

      }catch(e){
        addError("STT 실패: "+e.message);
      }
    };

    mr.start();
    setTimeout(()=>{if(mr.state!=="inactive")mr.stop();},3000);

  }catch(e){
    addError("마이크 오류: "+e.message);
    setStatus("마이크 권한 필요");
  }
}

async function playTTS(text){
  try{
    const fd=new FormData();
    fd.append("text",text);
    fd.append("session_id",sessionId);
    const res=await fetch("/api/tts",{method:"POST",body:fd});
    const blob=await res.blob();
    if(blob.size<100)return;
    currentAudio=new Audio(URL.createObjectURL(blob));
    currentAudio.play();
  }catch(e){}
}

function sendText(){
  const el=document.getElementById("text");
  const text=el.value.trim();
  el.value="";
  sendToServer(text,"text");
}

document.getElementById("text").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){
    e.preventDefault();
    sendText();
  }
});

function openMap(){
  let url="https://www.google.com/maps";
  if(currentLat&&currentLng){
    url="https://www.google.com/maps/search/travel+nearby/@"+currentLat+","+currentLng+",15z";
  }
  remember("map_opened",{lat:currentLat,lng:currentLng});
  window.open(url,"_blank");
}

function openSOS(){
  remember("sos_opened",{});
  document.getElementById("linkPanel").innerHTML=`
    <div class="card"><b>🆘 SOS</b><br><small>긴급 상황에서는 현지 긴급번호와 대사관 정보를 확인하세요.</small></div>
    <div class="card"><b>병원 찾기</b><br><small>Google Maps</small><button onclick="openExternal('https://www.google.com/maps/search/hospital','Hospital')">열기</button></div>
    <div class="card"><b>약국 찾기</b><br><small>Google Maps</small><button onclick="openExternal('https://www.google.com/maps/search/pharmacy','Pharmacy')">열기</button></div>
    <div class="card"><b>대사관 찾기</b><br><small>Google Search</small><button onclick="openExternal('https://www.google.com/search?q=nearest+embassy','Embassy')">열기</button></div>
  `;
}

function showMemory(){
  const data = localStorage.getItem("krxai_travel_v1_memory") || "[]";
  document.getElementById("linkPanel").innerHTML=`
    <div class="card">
      <b>🧠 KRXAI 기억 루프</b><br>
      <small>Travel V1에서는 판단하지 않고 사용 이력만 저장합니다.</small>
      <pre style="white-space:pre-wrap;max-height:160px;overflow:auto;background:#f1f5f9;padding:8px;border-radius:8px">${escapeHtml(data)}</pre>
    </div>
  `;
}

function requestDeviceLocation(){
  if(!navigator.geolocation){
    document.getElementById("locText").innerText="GPS 미지원";
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      currentLat=pos.coords.latitude;
      currentLng=pos.coords.longitude;
      document.getElementById("locText").innerText="기기 위치 확인됨";
      remember("gps",{lat:currentLat,lng:currentLng});
    },
    err=>{document.getElementById("locText").innerText="위치 권한 없음";},
    {enableHighAccuracy:true,timeout:8000,maximumAge:30000}
  );
}

requestDeviceLocation();
</script>
</body>
</html>
