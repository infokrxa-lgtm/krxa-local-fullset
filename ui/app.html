<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>말대말 Travel V1</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#eaf1f8;font-family:Arial,sans-serif;color:#0f172a}
.app{max-width:430px;margin:auto;height:100dvh;background:#f8fafc;overflow:hidden;position:relative}
.page{display:none;height:100%;overflow-y:auto;padding:12px 14px 148px}
.page.active{display:block}
.topbar{position:sticky;top:0;z-index:10;background:#f8fafc;padding:8px 0 10px}
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.quick button{border:0;border-radius:13px;background:white;padding:9px 3px;font-weight:bold;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.hero{height:330px;border-radius:0 0 32px 32px;background:linear-gradient(180deg,#0b67d1,#0b3b7a);color:white;text-align:center;padding:34px 20px;display:flex;flex-direction:column;justify-content:center}
.hero h1{font-size:46px;margin:0 0 12px}
.hero p{font-size:20px;line-height:1.45;margin:0 0 34px}
.bigMic{width:122px;height:122px;border:0;border-radius:50%;background:#2563eb;color:white;font-size:48px;margin:0 auto;box-shadow:0 0 0 18px rgba(37,99,235,.15)}
.title{font-size:24px;font-weight:bold;text-align:center;margin:10px 0 16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:white;border:1px solid #e5e7eb;border-radius:18px;padding:18px 8px;text-align:center;font-weight:bold;box-shadow:0 4px 12px rgba(0,0,0,.07)}
.card span{display:block;font-size:32px;margin-bottom:8px}
.card small{display:block;color:#64748b;font-size:12px;margin-top:4px}
.wide{grid-column:1/3}
.back{border:0;background:white;border-radius:13px;padding:10px 14px;font-size:20px}
.lang{display:flex;gap:7px;margin:10px 0}
.lang button{flex:1;border:0;border-radius:12px;padding:10px 4px;background:#e5e7eb;font-weight:bold}
.lang button.active{background:#0ea5e9;color:white}
select,input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:11px;font-size:15px;margin:6px 0}
.status{background:#e8f8ee;color:#25734d;padding:9px;border-radius:12px;text-align:center;font-size:13px;margin:8px 0}
.flow{background:#dbeafe;color:#1e3a8a;padding:9px;border-radius:12px;text-align:center;font-size:13px;font-weight:bold;margin-bottom:10px}
.link{background:white;border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin:9px 0}
.link small{display:block;color:#64748b;word-break:break-all}
.link button{width:100%;border:0;border-radius:10px;background:#2563eb;color:white;padding:10px;margin-top:8px;font-weight:bold}
.chat{margin:12px 0}
.msg{padding:12px;border-radius:14px;margin:8px 0;border:1px solid #e5e7eb;background:white}
.me{background:#dbeafe}
.bot{background:white}
.fixedBottom{position:absolute;left:0;right:0;bottom:0;background:#f8fafc;border-top:1px solid #e5e7eb;padding:9px 14px 8px}
.bottomBtns{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:7px}
.btn{border:0;border-radius:15px;padding:13px;color:white;font-size:17px;font-weight:bold}
.green{background:#16a34a}.blue{background:#2563eb}.red{background:#dc2626}.purple{background:#7c3aed}
.send{width:100%;border:0;background:#2563eb;color:white;border-radius:12px;padding:12px;margin-top:6px;font-weight:bold;font-size:16px}
.nav{display:flex;justify-content:space-around;font-size:12px;color:#64748b;padding-top:5px}
.nav button{border:0;background:transparent;color:#64748b}
.small{font-size:12px;text-align:center;color:#64748b}
</style>
</head>

<body>
<div class="app" id="app">

<section id="home" class="page active">
  <div class="hero">
    <h1>말대말</h1>
    <p>어디서든, 누구와도<br>바로 통역하고 연결합니다</p>
    <button class="bigMic" onclick="go('talk')">🎙️</button>
  </div>
</section>

<section id="situations" class="page">
  <div class="topbar">
    <div class="quick">
      <button onclick="openCategory('call')">📞 통화</button>
      <button onclick="openCategory('hotel')">🏨 호텔</button>
      <button onclick="openCategory('food')">🍜 식당</button>
      <button onclick="openCategory('route')">🗺 길찾기</button>
    </div>
  </div>

  <div class="title">어떤 상황인가요?</div>
  <div class="grid">
    <div class="card" onclick="openCategory('call')"><span>📞</span>통화<small>전화 연결 통역</small></div>
    <div class="card" onclick="openCategory('airport')"><span>✈️</span>공항<small>항공·수하물</small></div>
    <div class="card" onclick="openCategory('hotel')"><span>🏨</span>호텔<small>예약·체크인</small></div>
    <div class="card" onclick="openCategory('food')"><span>🍜</span>식당<small>예약·주문</small></div>
    <div class="card" onclick="openCategory('tour')"><span>📷</span>관광<small>YouTube·TikTok</small></div>
    <div class="card" onclick="openCategory('shopping')"><span>🛍️</span>쇼핑<small>구매·환불</small></div>
    <div class="card" onclick="openCategory('route')"><span>🗺️</span>길찾기<small>지도 앱 연결</small></div>
    <div class="card" onclick="openCategory('game')"><span>🎮</span>게임<small>여행 중 즐기기</small></div>
    <div class="card" onclick="openCategory('music')"><span>🎵</span>음악<small>플레이리스트</small></div>
    <div class="card" onclick="openCategory('sos')"><span>🆘</span>SOS<small>긴급 상황</small></div>
    <div class="card wide" onclick="go('talk')"><span>💬</span>자유대화<small>바로 통역</small></div>
  </div>
</section>

<section id="links" class="page">
  <button class="back" onclick="go('situations')">‹</button>
  <div class="title" id="catTitle">연결</div>
  <div id="linkList"></div>

  <div class="link">
    <b>내 사이트 추가</b>
    <input id="addName" placeholder="사이트명">
    <input id="addUrl" placeholder="https://...">
    <button onclick="addUserLink()">추가</button>
    <input id="delIndex" placeholder="삭제 번호 예: 0">
    <button style="background:#dc2626" onclick="deleteUserLink()">삭제</button>
  </div>

  <button class="send" onclick="go('talk')">이 상황으로 통역하기</button>
</section>

<section id="talk" class="page">
  <div class="topbar">
    <div class="quick">
      <button onclick="openCategory('call')">📞 통화</button>
      <button onclick="openCategory('hotel')">🏨 호텔</button>
      <button onclick="openCategory('food')">🍜 식당</button>
      <button onclick="openCategory('route')">🗺 길찾기</button>
    </div>
  </div>

  <div class="title">실시간 통역</div>

  <div class="lang">
    <button id="l_auto" onclick="setLang('auto')">자동</button>
    <button id="l_en" onclick="setLang('en')">영어</button>
    <button id="l_ja" onclick="setLang('ja')">일본어</button>
    <button id="l_zh" onclick="setLang('zh')">중국어</button>
  </div>

  <select onchange="setLang(this.value)">
    <option value="">기타 언어 선택</option>
    <option value="fr">프랑스어</option>
    <option value="de">독일어</option>
    <option value="es">스페인어</option>
    <option value="vi">베트남어</option>
    <option value="th">태국어</option>
    <option value="ru">러시아어</option>
  </select>

  <div class="status" id="status">상대언어를 선택하고 말하세요</div>
  <div class="flow" id="flow">KRXAI 기억 루프 대기 중</div>
  <div id="chat" class="chat"></div>
</section>

<section id="history" class="page">
  <button class="back" onclick="go('home')">‹</button>
  <div class="title">대화 기록</div>
  <div id="memoryBox"></div>
</section>

<div class="fixedBottom">
  <div class="bottomBtns">
    <button class="btn green" onclick="recordVoice()">🎙️ 말하기</button>
    <button class="btn blue" onclick="openMap()">📍 지도</button>
    <button class="btn red" onclick="openCategory('sos')">🆘 SOS</button>
    <button class="btn purple" onclick="showMemory()">🧠 기록</button>
  </div>
  <textarea id="text" placeholder="통역할 말을 입력하세요"></textarea>
  <button class="send" onclick="sendText()">통역하기</button>
  <div class="small" id="locText">기기 위치 확인 중</div>
  <div class="nav">
    <button onclick="go('home')">홈</button>
    <button onclick="go('situations')">상황</button>
    <button onclick="go('talk')">통역</button>
    <button onclick="showMemory()">기록</button>
  </div>
</div>

</div>

<script>
const SERVICE="__SERVICE__";
let sessionId=localStorage.getItem("krxa_session_id")||("session-"+Math.random().toString(16).slice(2,10));
localStorage.setItem("krxa_session_id",sessionId);

let selectedLanguageMode=localStorage.getItem("krxa_language_mode")||"auto";
let currentCategory="";
let currentLat="", currentLng="", sending=false;
let pageOrder=["home","situations","links","talk","history"];
let touchStartX=0;

function go(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

document.getElementById("app").addEventListener("touchstart",e=>touchStartX=e.touches[0].clientX);
document.getElementById("app").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)<80)return;
  const cur=document.querySelector(".page.active").id;
  let i=pageOrder.indexOf(cur);
  if(dx<0)i=(i+1)%pageOrder.length;
  else i=(i-1+pageOrder.length)%pageOrder.length;
  go(pageOrder[i]);
});

function esc(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")}
function status(t){document.getElementById("status").innerText=t}
function flow(t){document.getElementById("flow").innerText=t}

function remember(kind,detail){
  let k="krxai_travel_v1_memory", d=[];
  try{d=JSON.parse(localStorage.getItem(k)||"[]")}catch(e){}
  d.push({time:new Date().toISOString(),kind,detail});
  if(d.length>200)d=d.slice(-200);
  localStorage.setItem(k,JSON.stringify(d));
}

function setLang(v){
  if(!v)return;
  selectedLanguageMode=v;
  localStorage.setItem("krxa_language_mode",v);
  document.querySelectorAll(".lang button").forEach(b=>b.classList.remove("active"));
  let el=document.getElementById("l_"+v); if(el)el.classList.add("active");
  remember("language_selected",{language:v});
  status("상대언어 기준: "+v.toUpperCase());
}
setTimeout(()=>setLang(selectedLanguageMode),0);

async function openCategory(cat){
  currentCategory=cat;
  remember("category_opened",{category:cat});
  go("links");
  const titles={call:"통화",airport:"공항",hotel:"호텔",food:"식당",taxi:"택시",route:"길찾기",tour:"관광",shopping:"쇼핑",game:"게임",music:"음악",sos:"SOS"};
  document.getElementById("catTitle").innerText=titles[cat]||cat;
  const box=document.getElementById("linkList");
  box.innerHTML="<div class='link'>불러오는 중...</div>";

  try{
    const r=await fetch("/api/travel-links/"+cat);
    const j=await r.json();
    if(!j.ok||!j.links||!j.links.length){
      box.innerHTML="<div class='link'>등록된 링크가 없습니다.</div>";
      return;
    }
    box.innerHTML="";
    j.links.forEach((l,i)=>{
      const div=document.createElement("div");
      div.className="link";
      div.innerHTML=`<b>${i}. ${esc(l.name)}</b><small>${esc(l.url)}</small><button>새 창에서 열기</button>`;
      div.querySelector("button").onclick=()=>{
        remember("link_opened",{category:cat,name:l.name,url:l.url});
        if(l.url==="tel:"){ window.location.href="tel:"; }
        else window.open(l.url,"_blank");
      };
      box.appendChild(div);
    });
  }catch(e){box.innerHTML="<div class='link'>링크 로드 실패</div>"}
}

async function addUserLink(){
  const name=document.getElementById("addName").value.trim();
  const url=document.getElementById("addUrl").value.trim();
  if(!currentCategory||!name||!url)return alert("카테고리, 사이트명, URL을 확인하세요.");
  const fd=new FormData(); fd.append("category",currentCategory); fd.append("name",name); fd.append("url",url);
  await fetch("/api/travel-links/add",{method:"POST",body:fd});
  openCategory(currentCategory);
}

async function deleteUserLink(){
  const idx=document.getElementById("delIndex").value.trim();
  if(!currentCategory||idx==="")return alert("삭제 번호를 입력하세요.");
  const fd=new FormData(); fd.append("category",currentCategory); fd.append("index",idx);
  await fetch("/api/travel-links/delete",{method:"POST",body:fd});
  openCategory(currentCategory);
}

function addMsg(cls,title,text){
  go("talk");
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML="<b>"+title+"</b><br>"+esc(text);
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

async function sendToServer(text,source="text"){
  text=(text||"").trim(); if(!text||sending)return;
  sending=true;
  addMsg("me","원문",text);
  status("통역 처리 중...");
  flow("번역 준비 중");

  const fd=new FormData();
  fd.append("text",text);
  fd.append("service",SERVICE);
  fd.append("session_id",sessionId);
  fd.append("source",source);
  fd.append("lat",currentLat);
  fd.append("lng",currentLng);
  fd.append("device_locale",navigator.language||"");
  fd.append("target_language",selectedLanguageMode);

  try{
    const r=await fetch("/api/translate",{method:"POST",body:fd});
    const j=await r.json();
    addMsg("bot","번역",j.result||"번역 결과 없음");
    remember("translation",{source:text,result:j.result,target_language:selectedLanguageMode});
    status("통역 완료");
    flow("KRXAI 기억 저장 완료");
    playTTS(j.result||"");
  }catch(e){addMsg("","오류",e.message)}
  sending=false;
}

function sendText(){
  const el=document.getElementById("text");
  const t=el.value;
  el.value="";
  sendToServer(t,"text");
}

async function recordVoice(){
  try{
    go("talk");
    status("2초 동안 말해주세요...");
    flow("듣는 중");

    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
    const mr=new MediaRecorder(stream);
    let chunks=[];
    mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data)};
    mr.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(chunks,{type:"audio/webm"});
      const fd=new FormData();
      fd.append("file",blob,"voice.webm");
      fd.append("session_id",sessionId);
      fd.append("duration","2");
      fd.append("user_language_mode","auto");
      fd.append("target_language",selectedLanguageMode);
      fd.append("lat",currentLat);
      fd.append("lng",currentLng);
      fd.append("device_locale",navigator.language||"");

      const r=await fetch("/api/stt",{method:"POST",body:fd});
      const j=await r.json();
      flow(j.flow_signal||"흐름 유지 중");
      if(j.ok&&j.text)sendToServer(j.text,"voice");
      else status("음성 인식 실패");
    };
    mr.start();
    setTimeout(()=>{if(mr.state!=="inactive")mr.stop()},2000);
  }catch(e){addMsg("","마이크 오류",e.message)}
}

async function playTTS(text){
  if(!text)return;
  try{
    const fd=new FormData(); fd.append("text",text); fd.append("session_id",sessionId);
    const r=await fetch("/api/tts",{method:"POST",body:fd});
    const blob=await r.blob();
    if(blob.size>100)new Audio(URL.createObjectURL(blob)).play();
  }catch(e){}
}

function openMap(){
  let url="https://www.google.com/maps";
  if(currentLat&&currentLng)url=`https://www.google.com/maps/search/travel+nearby/@${currentLat},${currentLng},15z`;
  window.open(url,"_blank");
}

function showMemory(){
  go("history");
  let raw=[];
  try{raw=JSON.parse(localStorage.getItem("krxai_travel_v1_memory")||"[]")}catch(e){}
  const box=document.getElementById("memoryBox");
  box.innerHTML="";
  raw.slice().reverse().slice(0,30).forEach((m,i)=>{
    const div=document.createElement("div");
    div.className="link";
    let title=m.kind==="translation"?"통역 기록":m.kind==="link_opened"?"링크 열기":m.kind==="category_opened"?"상황 선택":"사용 기록";
    div.innerHTML=`<b>${title}</b><small>${new Date(m.time).toLocaleString()}</small><button>내용 보기</button>`;
    div.querySelector("button").onclick=()=>alert(JSON.stringify(m.detail,null,2));
    box.appendChild(div);
  });
}

if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    p=>{
      currentLat=p.coords.latitude;
      currentLng=p.coords.longitude;
      document.getElementById("locText").innerText="기기 위치 확인됨";
      remember("gps",{lat:currentLat,lng:currentLng});
    },
    e=>document.getElementById("locText").innerText="위치 권한 없음",
    {enableHighAccuracy:true,timeout:8000,maximumAge:30000}
  );
}
</script>
</body>
</html>
