<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>KRXA Travel V1 · Control Driven App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box}
body{margin:0;background:#eaf2fb;font-family:Arial,sans-serif;color:#0f172a}
.phone{max-width:430px;margin:0 auto;min-height:100vh;background:#f8fafc;position:relative;overflow:hidden}
.page{display:none;min-height:100vh;padding:16px 14px 92px}
.page.active{display:block}
.header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.back{border:0;background:#e2e8f0;border-radius:12px;padding:9px 12px;font-weight:900}
.title{font-size:20px;font-weight:900}
.gps{background:#0f172a;color:white;border-radius:18px;padding:12px;margin-bottom:12px;font-size:13px}
.hero{background:linear-gradient(135deg,#2563eb,#0f766e);color:white;border-radius:22px;padding:18px;margin-bottom:12px;box-shadow:0 8px 18px rgba(0,0,0,.16);cursor:pointer}
.hero small{opacity:.85}
.hero h2{margin:8px 0 4px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.card{border:1px solid #dbe3ee;background:white;border-radius:18px;padding:16px;min-height:86px;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer}
.card b{display:block;font-size:16px;margin-bottom:5px}
.card small{color:#64748b}
.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;background:white;border-top:1px solid #dbe3ee;display:flex;justify-content:space-around;padding:8px}
.dot{border:0;background:#e2e8f0;border-radius:999px;padding:8px 10px;font-weight:900}
.dot.active{background:#2563eb;color:white}
.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:20;padding:20px}
.modalBox{max-width:430px;margin:30px auto;background:white;border-radius:20px;padding:16px;max-height:82vh;overflow:auto}
.modalHead{display:flex;justify-content:space-between;align-items:center}
.btn{border:0;border-radius:999px;padding:9px 12px;margin:4px;font-weight:900;cursor:pointer}
.blue{background:#2563eb;color:white}.green{background:#16a34a;color:white}.gray{background:#64748b;color:white}.red{background:#dc2626;color:white}
input,select{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:12px;margin:5px 0}
.lang{display:flex;gap:6px;margin:8px 0}.lang button{flex:1}
</style>
</head>
<body>
<div class="phone" id="app"></div>
<div class="bottom" id="nav"></div>

<div class="modal" id="modal">
  <div class="modalBox">
    <div class="modalHead">
      <h3 id="modalTitle">안내</h3>
      <button class="btn red" onclick="KRXA_App.closeModal()">닫기</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const API="/api/patch17/control-first";
let DATA=null;
let CURRENT=1;
let HERO_INDEX=0;
let HERO_TIMER=null;

async function loadConfig(){
  const r=await fetch(API+"?ts="+Date.now(),{cache:"no-store"});
  const d=await r.json();
  DATA=d.data||{pages:[],components:{}};
}

function enabled(x){return x && x.enabled!==false}
function pageByNo(n){return (DATA.pages||[]).find(p=>Number(p.page)===Number(n))}
function comp(id){return (DATA.components||{})[id]}
function groupsOf(id){const c=comp(id); return c && c.groups ? c.groups.filter(enabled) : []}

function icon(id){
  return {
    gps:"📍",hero:"⭐",food_hero:"🍜",food:"🍽️",taxi:"🚕",route:"🧭",sos:"🆘",
    airport:"✈️",hotel:"🏨",tour:"🏞️",shopping:"🛍️",music:"🎵",tv:"📺",
    call:"📞",photo:"📷",video:"🎥",m2m_link:"🎙️",mini_talk:"🎙️",
    hospital:"🏥",embassy:"🏛️",police:"🚓",emergency:"🚑"
  }[id]||"🔹";
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  (DATA.pages||[]).forEach(p=>{
    const sec=document.createElement("section");
    sec.className="page "+(p.page===CURRENT?"active":"");
    sec.dataset.adminPage="page"+p.page;

    sec.innerHTML=`
      <div class="header">
        ${p.page>1?`<button class="back" onclick="KRXA_App.goUserPage(2)">‹</button>`:""}
        <div class="title">PAGE ${p.page} · ${p.title}</div>
      </div>
      <div id="pageBody${p.page}"></div>
    `;
    app.appendChild(sec);
    renderPageBody(p);
  });
  renderNav();
}

function renderPageBody(p){
  const body=document.getElementById("pageBody"+p.page);
  if(!body)return;
  body.innerHTML="";

  const items=(p.items||[]).filter(enabled);

  if(items.some(x=>x.id==="gps")) body.appendChild(gpsBlock());

  if(p.page===1 && items.some(x=>x.id==="hero")) body.appendChild(heroBlock("hero"));
  if(p.page===2 && items.some(x=>x.id==="food_hero")) body.appendChild(heroBlock("food_hero"));

  const grid=document.createElement("div");
  grid.className="grid";

  items.forEach(it=>{
    if(["gps","hero","food_hero"].includes(it.id))return;
    const c=document.createElement("div");
    c.className="card";
    c.dataset.adminId=it.id;
    c.innerHTML=`<b>${icon(it.id)} ${it.title}</b><small>${it.id}</small>`;
    c.onclick=()=>runComponent(it.id,it.title);
    grid.appendChild(c);
  });
  body.appendChild(grid);
}

function gpsBlock(){
  const d=document.createElement("div");
  d.className="gps";
  d.dataset.adminId="gps";
  d.innerHTML=`📍 위치 확인 중 · ${new Date().toLocaleString()}`;
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      d.innerHTML=`📍 현재위치 ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)} · ${new Date().toLocaleString()}`;
    },()=>{d.innerHTML=`📍 위치 권한 필요 · ${new Date().toLocaleString()}`;});
  }
  return d;
}

function heroBlock(id){
  const h=document.createElement("div");
  h.className="hero";
  h.dataset.adminId=id;
  const gs=groupsOf(id);
  const g=gs[HERO_INDEX%Math.max(1,gs.length)];
  h.innerHTML=`<small>${id==="hero"?"LIVE TRAVEL DISCOVERY":"MARKET · FOOD RECOMMEND"}</small>
  <h2>${g?g.title:"추천 준비 중"}</h2>
  <p>${g?(g.items||[]).filter(enabled).length+"개 추천 · 클릭해서 보기":"관제에서 데이터를 등록하세요"}</p>`;
  h.onclick=()=>openGroupList(id,g&&g.id);
  return h;
}

function renderNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML="";
  (DATA.pages||[]).forEach(p=>{
    const b=document.createElement("button");
    b.className="dot "+(p.page===CURRENT?"active":"");
    b.textContent=p.page;
    b.onclick=()=>goUserPage(p.page);
    nav.appendChild(b);
  });
}

function goUserPage(n){CURRENT=Number(n);render();}

function openGroupList(componentId, groupId){
  const gs=groupsOf(componentId);
  const g=gs.find(x=>x.id===groupId)||gs[0];
  if(!g){openModal("안내","표시할 그룹이 없습니다.");return;}
  const list=(g.items||[]).filter(enabled);
  const html=list.length?list.map((x,i)=>`
    <div style="border-bottom:1px solid #e5e7eb;padding:10px 0">
      <b>${x.name||x.title||"-"}</b><br>
      <small>${x.area||""} ${x.category||""}</small><br>
      <button class="btn blue" onclick='KRXA_RunItem(${JSON.stringify(x).replaceAll("'","&#39;")})'>실행</button>
    </div>
  `).join(""):"표시할 항목이 없습니다.";
  openModal(g.title,html);
}

function runComponent(id,title){
  if(id==="m2m_link"||id==="mini_talk"){goUserPage(5);return;}
  if(id==="sos"){goUserPage(8);return;}
  const gs=groupsOf(id);
  if(gs.length){openComponentManager(id,title);return;}

  if(id==="route"){
    openDestinationInput("길찾기");
    return;
  }

  openModal(title,`<p>관제에 실행 데이터가 없습니다.</p>`);
}

function openComponentManager(id,title){
  const gs=groupsOf(id);
  const html=gs.map(g=>`
    <div style="border-bottom:1px solid #e5e7eb;padding:10px 0">
      <b>${g.title}</b><br><small>${(g.items||[]).filter(enabled).length}개</small><br>
      <button class="btn blue" onclick="KRXA_App.openGroupList('${id}','${g.id}')">보기</button>
    </div>
  `).join("");
  openModal(title,html||"표시할 그룹이 없습니다.");
}

function openDestinationInput(title){
  openModal(title,`
    <input id="destInput" placeholder="목적지를 입력하세요. 예: 부산 해운대">
    <button class="btn blue" onclick="KRXA_App.openDirFromInput()">현재위치 ↔ 목적지 추천경로</button>
  `);
}

async function getOrigin(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation)return reject();
    navigator.geolocation.getCurrentPosition(
      p=>resolve(p.coords.latitude+","+p.coords.longitude),
      reject,
      {enableHighAccuracy:true,timeout:8000,maximumAge:60000}
    );
  });
}

function destinationOf(x){
  if(!x)return"";
  if(typeof x==="string")return x;
  if(x.destination_type==="manual")return x.destination_value||x.address||x.map_query||x.name||"";
  if(x.destination_type==="address")return x.address||x.map_query||x.name||"";
  if(x.destination_type==="map_query")return x.map_query||x.address||x.name||"";
  return x.address||x.map_query||x.name||x.title||"";
}

async function runItem(x){
  if(!x||x.enabled===false)return;
  const action=x.action_type||(x.url?"url":x.phone?"phone":"map_dir");
  if(action==="url"&&x.url){window.open(x.url,"_blank");return;}
  if(action==="phone"&&x.phone){location.href="tel:"+x.phone;return;}
  if(action==="map_search"){
    const q=x.map_query||x.address||x.name;
    if(q)window.open("https://www.google.com/maps/search/"+encodeURIComponent(q),"_blank");
    return;
  }
  if(action==="m2m"){goUserPage(5);return;}

  const dest=destinationOf(x);
  if(!dest){alert("목적지가 없습니다.");return;}
  try{
    const origin=await getOrigin();
    window.open("https://www.google.com/maps/dir/"+encodeURIComponent(origin)+"/"+encodeURIComponent(dest),"_blank");
  }catch(e){
    window.open("https://www.google.com/maps/dir//"+encodeURIComponent(dest),"_blank");
  }
}

async function openDirFromInput(){
  const v=document.getElementById("destInput")?.value||"";
  if(!v.trim()){alert("목적지를 입력하세요.");return;}
  await runItem({name:v,address:v,action_type:"map_dir",travel_mode:"recommend",origin_type:"current_location",destination_type:"manual",destination_value:v,enabled:true});
}

function openModal(title,html){
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalBody").innerHTML=html;
  document.getElementById("modal").style.display="block";
}
function closeModal(){document.getElementById("modal").style.display="none";}

function startHeroTimer(){
  if(HERO_TIMER)clearInterval(HERO_TIMER);
  HERO_TIMER=setInterval(()=>{HERO_INDEX++;render();},5000);
}

window.KRXA_App={goUserPage,openGroupList,openModal,closeModal,openDirFromInput};
window.KRXA_RunItem=runItem;

(async function(){
  await loadConfig();
  render();
  startHeroTimer();
  setInterval(async()=>{await loadConfig();render();},5000);
})();
</script>
</body>
</html>
