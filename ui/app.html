<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRXA Voice Travel</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#eef2f7;font-family:Arial,sans-serif}
.wrap{max-width:420px;margin:auto;min-height:100vh;background:#f8fafc}
.top{background:#082046;color:white;padding:16px;text-align:center;font-size:18px;font-weight:bold}
.row{display:flex;gap:10px;padding:14px}
.btn{flex:1;border:0;border-radius:14px;padding:16px;color:white;font-size:20px;font-weight:bold}
.mic{background:#16a34a}
.map{background:#2563eb}
.status{margin:0 14px;background:#e8f8ee;color:#25734d;padding:11px;border-radius:10px;text-align:center;font-size:14px}
.chat{padding:14px;min-height:310px;max-height:430px;overflow-y:auto}
.me{background:#dbeafe;padding:14px;border-radius:12px;margin-bottom:10px;font-size:15px}
.bot{background:white;padding:14px;border-radius:12px;margin-bottom:10px;border:1px solid #ddd;font-size:15px}
.cards{padding:0 14px}
.linkbtn{width:100%;margin-top:8px;border:1px solid #ffbf75;background:#fff7ef;color:#b45309;padding:14px;border-radius:10px}
.inputbox{padding:14px}
textarea{width:100%;height:64px;border-radius:10px;border:1px solid #bbb;padding:10px;font-size:15px}
.send{margin-top:10px;width:100%;border:0;background:#2563eb;color:white;padding:15px;border-radius:10px;font-size:17px;font-weight:bold}
</style>
</head>

<body>
<div class="wrap">
    <div class="top">KRXA · __SERVICE__ 서비스</div>

    <div class="row">
        <button class="btn mic" onclick="recordVoice()">🎤 말하기</button>
        <button class="btn map" onclick="openMap()">📍 지도 안내</button>
    </div>

    <div class="status" id="status">KRXA 준비됨 · 마이크를 누르고 말하세요</div>

    <div class="chat" id="chat"></div>

    <div class="cards" id="cards">
        <button class="linkbtn" onclick="openMap()">↗ 지도 열기</button>
    </div>

    <div class="inputbox">
        <textarea id="text" placeholder="직접 입력도 가능합니다"></textarea>
        <button class="send" onclick="sendText()">텍스트 전송</button>
    </div>
</div>

<script>
const SERVICE = "__SERVICE__";

let sessionId = localStorage.getItem("krxa_session_id");
if(!sessionId){
    sessionId = "session-" + Math.random().toString(16).slice(2,10);
    localStorage.setItem("krxa_session_id", sessionId);
}

let currentLat = "";
let currentLng = "";

navigator.geolocation.getCurrentPosition(
    pos => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        setStatus("KRXA 준비됨 · 위치 기반 안내 가능");
    },
    err => {
        setStatus("KRXA 준비됨 · 위치 권한 없이 작동");
    }
);

function setStatus(t){
    document.getElementById("status").innerText = t;
}

function addMessage(type, title, text){
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = type;
    div.innerHTML = "<b>" + title + "</b><br>" + text;
    chat.appendChild(div);

    while(chat.children.length > 4){
        chat.removeChild(chat.children[0]);
    }

    chat.scrollTop = chat.scrollHeight;
}

function showCards(cards){
    let html = "";

    if(cards && cards.length > 0){
        cards.forEach(c => {
            if(c.url){
                html += "<button class='linkbtn' onclick=\"window.open('" + c.url + "','_blank')\">↗ " + c.label + "</button>";
            }else if(c.text){
                html += "<button class='linkbtn'>" + c.label + "<br>" + c.text + "</button>";
            }
        });
    }else{
        html = "<button class='linkbtn' onclick='openMap()'>↗ 지도 열기</button>";
    }

    document.getElementById("cards").innerHTML = html;
}

async function sendToServer(message){
    if(!message.trim()){ return; }

    addMessage("me", "나", message);
    setStatus("KRXA 통역 중...");

    let finalText = message;
    if(currentLat && currentLng){
        finalText += "\\n\\nUser location: " + currentLat + "," + currentLng;
    }

    const fd = new FormData();
    fd.append("text", finalText);
    fd.append("service", SERVICE);
    fd.append("session_id", sessionId);

    const res = await fetch("/chat", {
        method:"POST",
        body:fd
    });

    const data = await res.json();

    if(data.session_id){
        sessionId = data.session_id;
        localStorage.setItem("krxa_session_id", sessionId);
    }

    addMessage("bot", "KRXA", data.result);
    showCards(data.cards);

    await playServerTTS(data.result);
    setStatus("KRXA 준비됨 · 다음 말을 해주세요");
}

async function recordVoice(){
    try{
        setStatus("듣는 중... 3.5초 동안 말하세요");

        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        const mr = new MediaRecorder(stream);
        let chunks = [];

        mr.ondataavailable = e => chunks.push(e.data);

        mr.onstop = async () => {
            stream.getTracks().forEach(track => track.stop());

            setStatus("음성 인식 중...");

            const blob = new Blob(chunks, {type:"audio/webm"});
            const fd = new FormData();
            fd.append("file", blob, "voice.webm");

            const res = await fetch("/api/stt", {
                method:"POST",
                body:fd
            });

            const data = await res.json();

            if(data.ok && data.text){
                await sendToServer(data.text);
            }else{
                setStatus("음성 인식 실패");
            }
        };

        mr.start();
        setTimeout(() => {
            if(mr.state !== "inactive"){
                mr.stop();
            }
        }, 3500);

    }catch(e){
        setStatus("마이크 권한 필요");
        alert("마이크 권한을 허용해야 합니다.");
    }
}

async function playServerTTS(text){
    try{
        setStatus("KRXA 음성 출력 중...");

        const fd = new FormData();
        fd.append("text", text);

        const res = await fetch("/api/tts", {
            method:"POST",
            body:fd
        });

        const blob = await res.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        await audio.play();

    }catch(e){
        setStatus("스피커 재생 실패");
    }
}

function sendText(){
    const el = document.getElementById("text");
    const text = el.value.trim();
    el.value = "";
    sendToServer(text);
}

function openMap(){
    let url = "https://www.google.com/maps";
    if(currentLat && currentLng){
        url = "https://www.google.com/maps/search/travel+nearby/@" + currentLat + "," + currentLng + ",15z";
    }
    window.open(url, "_blank");
}
</script>
</body>
</html>
