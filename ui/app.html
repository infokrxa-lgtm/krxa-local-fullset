<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#eef2f7}
.header{background:#0b1f3a;color:white;padding:16px;text-align:center;font-weight:bold}
.box{padding:14px}
textarea{width:100%;height:90px;font-size:16px;box-sizing:border-box}
button{width:100%;padding:14px;margin-top:8px;background:#2563eb;color:white;border:0;border-radius:10px;font-weight:bold}
.msg{background:white;padding:12px;margin:10px 0;border-radius:10px}
.card{background:#fff7ed;padding:12px;margin:8px 0;border-radius:10px}
</style>
</head>
<body>
<div class="header">__SERVICE__ 서비스</div>
<div class="box">
<textarea id="t" placeholder="사용자 입력 언어로 입력하세요"></textarea>
<button onclick="send()">전송</button>
<button onclick="clearMemory()">기억 초기화</button>

<h3>대화</h3>
<div id="chat"></div>

<h3>서비스 카드</h3>
<div id="cards"></div>

<p>
<a href="/user">← 홈</a> |
<a id="historyLink" href="#" onclick="this.href='/history?session_id='+sessionId" target="_blank">기억보기</a>
</p>
</div>

<script>
let sessionId = localStorage.getItem("krxa_session_id");
if(!sessionId){
    sessionId = "session-" + Math.random().toString(16).slice(2,10);
    localStorage.setItem("krxa_session_id", sessionId);
}

async function send(){
    let input = document.getElementById("t");
    let text = input.value.trim();
    if(!text){ return; }
    input.value = "";

    let fd = new FormData();
    fd.append("text", text);
    fd.append("service", "__SERVICE__");
    fd.append("session_id", sessionId);

    let r = await fetch("/chat", {method:"POST", body:fd});
    let j = await r.json();

    if(j.session_id){
        sessionId = j.session_id;
        localStorage.setItem("krxa_session_id", sessionId);
    }

    document.getElementById("chat").innerHTML += "<div class='msg'><b>나:</b><br>" + text + "</div>";
    document.getElementById("chat").innerHTML += "<div class='msg'><b>KRXA:</b><br>" + j.result + "</div>";

    let html = "";
    if(j.cards && j.cards.length > 0){
        j.cards.forEach(function(c){
            if(c.url){
                html += "<div class='card'><a href='" + c.url + "' target='_blank'>" + c.label + "</a></div>";
            } else if(c.text){
                html += "<div class='card'><b>" + c.label + "</b><br>" + c.text + "</div>";
            }
        });
    }
    document.getElementById("cards").innerHTML = html;
}

async function clearMemory(){
    let fd = new FormData();
    fd.append("session_id", sessionId);
    await fetch("/history/clear", {method:"POST", body:fd});
    document.getElementById("chat").innerHTML = "";
    document.getElementById("cards").innerHTML = "";
    alert("기억을 초기화했습니다.");
}
</script>
</body>
</html>
