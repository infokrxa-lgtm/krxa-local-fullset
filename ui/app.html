<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KRXA Voice Travel</title>

<style>
body{
    margin:0;
    background:#eef2f7;
    font-family:Arial,sans-serif;
}

.wrap{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    background:#f5f7fb;
}

.top{
    background:#082046;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.row{
    display:flex;
    gap:10px;
    padding:14px;
}

.btn{
    flex:1;
    border:none;
    border-radius:14px;
    padding:18px;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
}

.mic{
    background:#17a948;
}

.map{
    background:#2f63ea;
}

.status{
    margin:0 14px;
    background:#e8f8ee;
    color:#25734d;
    padding:12px;
    border-radius:10px;
    text-align:center;
    font-size:14px;
}

.chat{
    padding:14px;
    height:420px;
    overflow-y:auto;
}

.me{
    background:#dfeafc;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
}

.bot{
    background:white;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    border:1px solid #ddd;
}

.inputbox{
    padding:14px;
}

textarea{
    width:100%;
    height:70px;
    border-radius:10px;
    border:1px solid #bbb;
    padding:10px;
    font-size:16px;
    box-sizing:border-box;
}

.send{
    margin-top:10px;
    width:100%;
    border:none;
    background:#2f63ea;
    color:white;
    padding:16px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.linkbtn{
    width:100%;
    margin-top:10px;
    border:1px solid #ffbf75;
    background:#fff7ef;
    color:#cc6d00;
    padding:14px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">

<div class="top">
KRXA • food 서비스
</div>

<div class="row">
<button class="btn mic" onclick="startVoice()">
🎤 말하기
</button>

<button class="btn map" onclick="openMap()">
📍 지도 안내
</button>
</div>

<div class="status" id="status">
KRXA 준비됨 · 위치 기반 여행 안내 가능
</div>

<div class="chat" id="chat"></div>

<div style="padding:0 14px;">
<button class="linkbtn" onclick="openMap()">
↗ 지도 열기
</button>
</div>

<div class="inputbox">

<textarea id="text"
placeholder="직접 입력도 가능합니다"></textarea>

<button class="send" onclick="sendText()">
텍스트 전송
</button>

</div>

</div>

<script>

const SERVICE = "food";

let recognition;
let currentLat = null;
let currentLng = null;

function addMessage(type, text){

    const chat = document.getElementById("chat");

    const div = document.createElement("div");

    div.className = type;

    div.innerHTML = text;

    chat.appendChild(div);

    while(chat.children.length > 6){
        chat.removeChild(chat.children[0]);
    }

    chat.scrollTop = chat.scrollHeight;
}

function speakText(text){

    const tts = new SpeechSynthesisUtterance(text);

    tts.lang = "ko-KR";

    speechSynthesis.speak(tts);

    tts.onend = ()=>{
        document.getElementById("status").innerText =
        "다시 듣는 중...";
    };
}

async function sendToServer(message){

    addMessage("me", "<b>나</b><br>"+message);

    document.getElementById("status").innerText =
    "KRXA 응답 생성중...";

    const formData = new FormData();

    formData.append("text", message);
    formData.append("service", SERVICE);

    if(currentLat){
        formData.append("lat", currentLat);
    }

    if(currentLng){
        formData.append("lng", currentLng);
    }

    const res = await fetch("/chat",{
        method:"POST",
        body:formData
    });

    const data = await res.json();

    addMessage("bot",
    "<b>KRXA</b><br>"+data.result);

    speakText(data.result);

    document.getElementById("status").innerText =
    "KRXA 준비됨";
}

function startVoice(){

    if(!('webkitSpeechRecognition' in window)){
        alert("음성인식 미지원 브라우저");
        return;
    }

    recognition = new webkitSpeechRecognition();

    recognition.lang = "ko-KR";

    recognition.continuous = false;

    recognition.interimResults = false;

    document.getElementById("status").innerText =
    "듣고 있습니다...";

    recognition.start();

    recognition.onresult = async function(event){

        const text =
        event.results[0][0].transcript;

        await sendToServer(text);
    };

    recognition.onerror = function(){

        document.getElementById("status").innerText =
        "음성 인식 오류";
    };
}

function sendText(){

    const text =
    document.getElementById("text").value;

    if(!text.trim()) return;

    sendToServer(text);

    document.getElementById("text").value = "";
}

function openMap(){

    if(currentLat && currentLng){

        window.open(
        `https://maps.google.com/?q=${currentLat},${currentLng}`
        );

    }else{

        alert("위치 확인 중입니다.");
    }
}

navigator.geolocation.getCurrentPosition(

function(pos){

    currentLat = pos.coords.latitude;
    currentLng = pos.coords.longitude;

    document.getElementById("status").innerText =
    "현재 위치 기반 여행 안내 가능";

},

function(){

    document.getElementById("status").innerText =
    "위치 권한이 비활성화됨";
}

);

</script>

</body>
</html>
