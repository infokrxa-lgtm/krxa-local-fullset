<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KRXA Travel Branch CONTROL v2</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial,sans-serif}.wrap{padding:18px}.card{background:#1e293b;border-radius:16px;padding:14px;margin-bottom:14px}
button{border:0;border-radius:9px;padding:9px 12px;margin:2px;background:#2563eb;color:white;font-weight:bold;cursor:pointer}.green{background:#16a34a}.red{background:#dc2626}.gray{background:#64748b}.orange{background:#ea580c}
input,select,textarea{width:100%;padding:8px;margin:3px 0;border-radius:7px;border:0;box-sizing:border-box}
table{width:100%;border-collapse:collapse;background:#111827}th,td{border:1px solid #334155;padding:6px;font-size:12px}th{background:#0f172a}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}pre{background:#020617;border-radius:10px;padding:10px;white-space:pre-wrap;max-height:260px;overflow:auto}
</style></head><body><div class="wrap">
<h1>KRXA Travel Branch CONTROL v2</h1>
<p>엑셀형 맛집 리스트 · 신규/수정/삭제 · 활성 ON/OFF · CSV/JSON 업로드/다운로드 · DEV 지시/보고</p>
<div class="card">
<button onclick="loadAll()">DB 불러오기</button><button class="green" onclick="saveDB()">DB 저장</button><button onclick="addBranch()">Branch 추가</button><button onclick="addPlace()">맛집 추가</button>
<button class="gray" onclick="downloadJSON()">JSON 다운로드</button><button class="gray" onclick="downloadCSV()">CSV 다운로드</button>
<input id="jsonFile" type="file" accept=".json" onchange="importJSON(event)" style="display:none"><button class="orange" onclick="jsonFile.click()">JSON 업로드</button>
<input id="csvFile" type="file" accept=".csv" onchange="importCSV(event)" style="display:none"><button class="orange" onclick="csvFile.click()">CSV 업로드</button>
<button class="gray" onclick="window.open('/dev/travel-branch','_blank')">DEV 작업창</button><button class="gray" onclick="window.open('/control/travel-dashboard','_blank')">관제 대시보드</button><button class="gray" onclick="window.open('/travel-v1','_blank')">USER 확인</button>
<div id="status">대기</div></div>
<div class="grid"><div class="card"><h2>Branch</h2><select id="branchSelect" onchange="selectBranch(this.value)"></select><div id="branchEditor"></div></div>
<div class="card"><h2>CONTROL → DEV 지시</h2><input id="devTitle" placeholder="지시 제목"><textarea id="devBody" rows="5" placeholder="DEV 지시 내용"></textarea><button class="green" onclick="sendDevRequest()">DEV 지시 등록</button><button onclick="loadDevRequests()">지시/보고 새로고침</button><pre id="devRequests">대기</pre></div></div>
<div class="card"><h2>맛집/장소 리스트</h2><div style="overflow:auto"><table id="placeTable"></table></div></div>
</div>
<script>
let db={name:"KRXA Travel Branch Fractal DB",version:"v1",branches:[]};let currentBranchIndex=0;
function log(m){status.textContent=m} async function loadAll(){await loadDB();await loadDevRequests()}
async function loadDB(){db=await (await fetch('/api/travel-branches')).json(); if(!db.branches)db.branches=[]; render(); log('DB 불러오기 완료')}
async function saveDB(){let out=await (await fetch('/api/travel-branches/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(db)})).json();log(out.ok?'DB 저장 완료':'DB 저장 실패')}
function cur(){if(!db.branches.length)addBranch(false); if(currentBranchIndex>=db.branches.length)currentBranchIndex=0; return db.branches[currentBranchIndex]}
function render(){renderBranchSelect();renderBranchEditor();renderPlaceTable()}
function renderBranchSelect(){branchSelect.innerHTML='';db.branches.forEach((b,i)=>{let o=document.createElement('option');o.value=i;o.textContent=(i+1)+'. '+(b.title||b.id)+' / active:'+b.active+' / hero:'+b.hero_enabled;if(i===currentBranchIndex)o.selected=true;branchSelect.appendChild(o)})}
function selectBranch(i){currentBranchIndex=Number(i);render()}
function addBranch(doRender=true){db.branches.push({id:'branch-'+Date.now(),title:'신규 Branch',type:'food_branch',active:true,hero_enabled:true,priority:99,items:[]});currentBranchIndex=db.branches.length-1;if(doRender)render()}
function deleteBranch(){if(!confirm('현재 Branch 삭제?'))return;db.branches.splice(currentBranchIndex,1);currentBranchIndex=0;render()}
function renderBranchEditor(){let b=cur();branchEditor.innerHTML=`<input value="${esc(b.id)}" onchange="cur().id=this.value"><input value="${esc(b.title)}" onchange="cur().title=this.value"><input value="${esc(b.type)}" onchange="cur().type=this.value"><input type="number" value="${b.priority||0}" onchange="cur().priority=Number(this.value)"><button onclick="cur().active=!cur().active;render()">Active:${b.active}</button><button onclick="cur().hero_enabled=!cur().hero_enabled;render()">Hero:${b.hero_enabled}</button><button class="red" onclick="deleteBranch()">Branch 삭제</button>`}
function addPlace(){let b=cur();b.items=b.items||[];b.items.push({id:'food-'+Date.now(),name:'신규 맛집',category:'food',region:'',address:'',phone:'',map_keyword:'',source:b.title||'',source_url:'',active:true,priority:b.items.length+1,score:0});render()}
function deletePlace(i){if(!confirm('삭제?'))return;cur().items.splice(i,1);render()}
function renderPlaceTable(){let items=cur().items||[];let h=['ON','ID','이름','분류','지역','주소','전화','지도검색어','출처','URL','우선','점수','길찾기','삭제'];let html='<thead><tr>'+h.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>';items.forEach((it,i)=>{html+=`<tr><td><button onclick="cur().items[${i}].active=!cur().items[${i}].active;render()">${it.active?'ON':'OFF'}</button></td>${['id','name','category','region','address','phone','map_keyword','source','source_url'].map(k=>`<td><input value="${esc(it[k]||'')}" onchange="cur().items[${i}].${k}=this.value"></td>`).join('')}<td><input type="number" value="${it.priority||0}" onchange="cur().items[${i}].priority=Number(this.value)"></td><td><input type="number" value="${it.score||0}" onchange="cur().items[${i}].score=Number(this.value)"></td><td><button onclick="openRoute('${esc((it.address||it.map_keyword||it.name||'').replaceAll("'", ""))}')">길찾기</button></td><td><button class="red" onclick="deletePlace(${i})">삭제</button></td></tr>`});placeTable.innerHTML=html+'</tbody>'}
function openRoute(d){if(window.KRXA_DeviceContext&&window.KRXA_DeviceContext.openRouteTo)window.KRXA_DeviceContext.openRouteTo(d);else window.open('https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(d),'_blank')}
function downloadJSON(){downloadFile('travel_branches.json',JSON.stringify(db,null,2),'application/json')}
function downloadCSV(){let rows=[['branch_id','branch_title','item_id','name','category','region','address','phone','map_keyword','source','source_url','active','priority','score']];db.branches.forEach(b=>(b.items||[]).forEach(it=>rows.push([b.id,b.title,it.id,it.name,it.category||'',it.region||'',it.address||'',it.phone||'',it.map_keyword||'',it.source||'',it.source_url||'',it.active,it.priority||'',it.score||''])));let csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');downloadFile('travel_branches.csv',csv,'text/csv')}
function downloadFile(n,c,t){let blob=new Blob([c],{type:t});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=n;a.click()}
function importJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{db=JSON.parse(r.result);if(!db.branches)db.branches=[];currentBranchIndex=0;render();log('JSON 업로드 완료')}catch(err){alert(err.message)}};r.readAsText(f,'utf-8')}
function importCSV(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{let lines=r.result.split(/\r?\n/).filter(x=>x.trim());let rows=lines.map(parseCSVLine);rows.shift();let b=cur();b.items=rows.map((row,idx)=>({id:row[2]||'food-'+Date.now()+'-'+idx,name:row[3]||'',category:row[4]||'food',region:row[5]||'',address:row[6]||'',phone:row[7]||'',map_keyword:row[8]||'',source:row[9]||b.title,source_url:row[10]||'',active:String(row[11]).toLowerCase()!=='false',priority:Number(row[12]||idx+1),score:Number(row[13]||0)}));render();log('CSV 업로드 완료')};r.readAsText(f,'utf-8')}
function parseCSVLine(line){let out=[],cur='',q=false;for(let i=0;i<line.length;i++){let c=line[i],n=line[i+1];if(c=='"'&&q&&n=='"'){cur+='"';i++;continue}if(c=='"'){q=!q;continue}if(c==','&&!q){out.push(cur);cur='';continue}cur+=c}out.push(cur);return out}
async function sendDevRequest(){let title=devTitle.value.trim(),body=devBody.value.trim();if(!title&&!body){alert('지시 입력');return}let out=await (await fetch('/api/dev-requests/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,body,source:'control_branch',status:'requested'})})).json();log(out.ok?'DEV 지시 등록 완료':'실패');devTitle.value='';devBody.value='';loadDevRequests()}
async function loadDevRequests(){try{let data=await (await fetch('/api/dev-requests')).json();devRequests.textContent=JSON.stringify(data.requests||[],null,2)}catch(e){devRequests.textContent=e.message}}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
loadAll()
</script><script src="/ui/js/travel_context.js"></script></body></html>
