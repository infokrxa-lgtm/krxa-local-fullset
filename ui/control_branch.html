<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KRXA Travel Branch Control</title><style>body{margin:0;background:#0f172a;color:white;font-family:Arial,sans-serif}.wrap{padding:24px}.card{background:#1e293b;border-radius:18px;padding:18px;margin-bottom:14px}input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:0;box-sizing:border-box}button{border:0;border-radius:10px;padding:10px 14px;margin:4px;background:#2563eb;color:white;font-weight:bold}.green{background:#16a34a}.red{background:#dc2626}.gray{background:#64748b}.item{background:#111827;border-radius:12px;padding:12px;margin:8px 0}</style></head><body><div class="wrap"><h1>KRXA Travel Branch CONTROL</h1><p>Branch / Place 등록·수정·삭제·활성화 ON/OFF</p><div class="card"><button onclick="loadDB()">DB 불러오기</button><button class="green" onclick="saveDB()">DB 저장</button><button onclick="addBranch()">Branch 추가</button><button class="gray" onclick="window.open('/travel-v1','_blank')">USER 확인</button><button class="gray" onclick="window.open('/dev/travel-branch','_blank')">DEV 검증</button></div><div id="branchBox"></div></div><script>
let db={name:'KRXA Travel Branch Fractal DB',version:'v1',branches:[]};
async function loadDB(){db=await (await fetch('/api/travel-branches')).json();if(!db.branches)db.branches=[];render()}
async function saveDB(){const data=await (await fetch('/api/travel-branches/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(db)})).json();alert(data.ok?'저장 완료':'저장 실패')}
function addBranch(){db.branches.push({id:'branch-'+Date.now(),title:'신규 Branch',type:'food_branch',active:true,hero_enabled:true,priority:99,items:[]});render()}
function deleteBranch(i){if(confirm('Branch 삭제?')){db.branches.splice(i,1);render()}}
function addItem(bi){db.branches[bi].items.push({id:'place-'+Date.now(),name:'신규 장소',category:'food',region:'',address:'',phone:'',map_keyword:'',source:'',source_url:'',active:true,priority:99,score:0});render()}
function deleteItem(bi,ii){if(confirm('장소 삭제?')){db.branches[bi].items.splice(ii,1);render()}}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function render(){const box=document.getElementById('branchBox');box.innerHTML='';db.branches.forEach((b,bi)=>{let html=`<div class="card"><h2>Branch ${bi+1}: ${esc(b.title)}</h2><input value="${esc(b.id)}" onchange="db.branches[${bi}].id=this.value" placeholder="branch id"><input value="${esc(b.title)}" onchange="db.branches[${bi}].title=this.value" placeholder="title"><input value="${esc(b.type)}" onchange="db.branches[${bi}].type=this.value" placeholder="type"><input type="number" value="${b.priority||0}" onchange="db.branches[${bi}].priority=Number(this.value)" placeholder="priority"><button onclick="db.branches[${bi}].active=!db.branches[${bi}].active;render()">Active: ${b.active}</button><button onclick="db.branches[${bi}].hero_enabled=!db.branches[${bi}].hero_enabled;render()">Hero: ${b.hero_enabled}</button><button class="green" onclick="addItem(${bi})">장소 추가</button><button class="red" onclick="deleteBranch(${bi})">Branch 삭제</button><h3>장소 목록</h3>`;(b.items||[]).forEach((it,ii)=>{html+=`<div class="item"><input value="${esc(it.id)}" onchange="db.branches[${bi}].items[${ii}].id=this.value" placeholder="장소 ID"><input value="${esc(it.name)}" onchange="db.branches[${bi}].items[${ii}].name=this.value" placeholder="장소명"><input value="${esc(it.category||'food')}" onchange="db.branches[${bi}].items[${ii}].category=this.value" placeholder="category"><input value="${esc(it.region)}" onchange="db.branches[${bi}].items[${ii}].region=this.value" placeholder="지역"><input value="${esc(it.address)}" onchange="db.branches[${bi}].items[${ii}].address=this.value" placeholder="주소"><input value="${esc(it.phone)}" onchange="db.branches[${bi}].items[${ii}].phone=this.value" placeholder="전화"><input value="${esc(it.map_keyword)}" onchange="db.branches[${bi}].items[${ii}].map_keyword=this.value" placeholder="지도 검색어"><input value="${esc(it.source)}" onchange="db.branches[${bi}].items[${ii}].source=this.value" placeholder="출처"><input value="${esc(it.source_url)}" onchange="db.branches[${bi}].items[${ii}].source_url=this.value" placeholder="출처 URL"><input type="number" value="${it.priority||0}" onchange="db.branches[${bi}].items[${ii}].priority=Number(this.value)" placeholder="priority"><input type="number" value="${it.score||0}" onchange="db.branches[${bi}].items[${ii}].score=Number(this.value)" placeholder="score"><button onclick="db.branches[${bi}].items[${ii}].active=!db.branches[${bi}].items[${ii}].active;render()">Active: ${it.active}</button><button class="red" onclick="deleteItem(${bi},${ii})">삭제</button></div>`});html+='</div>';box.innerHTML+=html})}
loadDB();</script></body></html>
