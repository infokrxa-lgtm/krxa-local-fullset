<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KRXA Travel Control Dashboard</title><style>body{margin:0;background:#0f172a;color:white;font-family:Arial,sans-serif}.wrap{padding:22px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:#1e293b;border-radius:18px;padding:16px;margin-bottom:14px}button{border:0;border-radius:10px;padding:10px 14px;margin:4px;background:#2563eb;color:white;font-weight:bold}.green{background:#16a34a}.gray{background:#64748b}.item{background:#111827;border-radius:12px;padding:10px;margin:8px 0}small{color:#cbd5e1}</style></head><body><div class="wrap"><h1>KRXA Travel CONTROL Dashboard</h1><div class="card"><button onclick="loadAll()">전체 새로고침</button><button class="green" onclick="window.open('/control/branch','_blank')">Branch 관리</button><button class="gray" onclick="window.open('/dev/travel-branch','_blank')">DEV 검증</button><button class="gray" onclick="window.open('/dev/travel-analytics','_blank')">Analytics</button><button onclick="window.open('/travel-v1','_blank')">USER 확인</button></div><div class="grid"><div class="card"><h2>DB 상태</h2><div id="dbStats">대기</div></div><div class="card"><h2>추천 상태</h2><div id="recommendStats">대기</div></div></div><div class="grid"><div class="card"><h2>Memory 통계</h2><div id="memoryStats">대기</div></div><div class="card"><h2>인기 Place</h2><div id="placeRank">대기</div></div></div><div class="card"><h2>최근 실행 이벤트</h2><div id="eventList">대기</div></div></div><script>
let branches={},recommend={},memory={};async function j(url){try{return await(await fetch(url)).json()}catch(e){return{error:e.message}}}async function loadAll(){branches=await j('/api/travel-branches');recommend=await j('/api/travel-recommend');memory=await j('/api/travel-memory');render()}function item(label,v){return`<div class="item">${label}: <b>${v}</b></div>`}function render(){const bl=branches.branches||[],cards=recommend.cards||[],ev=memory.events||[];let all=[];bl.forEach(b=>(b.items||[]).forEach(it=>all.push({...it,branch_title:b.title})));document.getElementById('dbStats').innerHTML=item('Branch 전체',bl.length)+item('Branch 활성',bl.filter(b=>b.active).length)+item('Hero Branch',bl.filter(b=>b.hero_enabled).length)+item('Place 전체',all.length)+item('Place 활성',all.filter(x=>x.active).length);document.getElementById('recommendStats').innerHTML=item('추천 카드',cards.length)+cards.map(c=>`<div class="item"><b>${c.name||'-'}</b><br><small>${c.branch_title||''} · ${c.source||''}</small></div>`).join('');document.getElementById('memoryStats').innerHTML=item('전체 이벤트',ev.length)+item('지도/길찾기',ev.filter(e=>(e.action||'').includes('route')).length)+item('리스트 보기',ev.filter(e=>(e.action||'').includes('list')).length);const counts={};ev.forEach(e=>{const k=e.place_name||e.place_id||'unknown';counts[k]=(counts[k]||0)+1});document.getElementById('placeRank').innerHTML=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10).map(r=>`<div class="item"><b>${r[0]}</b> · ${r[1]}회</div>`).join('')||'데이터 없음';document.getElementById('eventList').innerHTML=ev.slice(0,30).map(e=>`<div class="item"><b>${e.action||'-'}</b> <small>${e.time||''}</small><br>${e.branch_title||e.branch_id||'-'} / ${e.place_name||e.place_id||'-'}<br><small>${e.destination||''}</small></div>`).join('')||'이벤트 없음'}loadAll();</script></body></html>
