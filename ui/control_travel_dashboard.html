<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KRXA Travel Dashboard v2</title><style>body{margin:0;background:#0f172a;color:white;font-family:Arial,sans-serif}.wrap{padding:18px}.card{background:#1e293b;border-radius:16px;padding:14px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}button{border:0;border-radius:9px;padding:9px 12px;margin:2px;background:#2563eb;color:white;font-weight:bold}.green{background:#16a34a}.gray{background:#64748b}.item{background:#111827;border-radius:10px;padding:8px;margin:6px 0}</style></head><body><div class="wrap"><h1>KRXA Travel CONTROL Dashboard v2</h1><div class="card"><button onclick="loadAll()">새로고침</button><button class="green" onclick="window.open('/control/branch','_blank')">Branch 작업창</button><button class="gray" onclick="window.open('/dev/travel-branch','_blank')">DEV 작업창</button><button onclick="window.open('/travel-v1','_blank')">USER</button></div><div class="grid"><div class="card"><h2>DB</h2><div id="dbStats"></div></div><div class="card"><h2>추천</h2><div id="recommendStats"></div></div></div><div class="grid"><div class="card"><h2>Memory</h2><div id="memoryStats"></div></div><div class="card"><h2>CONTROL ↔ DEV</h2><div id="devStats"></div></div></div></div><script>async function j(u){try{return await(await fetch(u)).json()}catch(e){return{error:e.message}}}function item(k,v){return `<div class="item">${k}: <b>${v}</b></div>`}async function loadAll(){let br=await j('/api/travel-branches'),rec=await j('/api/travel-recommend'),mem=await j('/api/travel-memory'),req=await j('/api/dev-requests');let bl=br.branches||[],cards=rec.cards||[],ev=mem.events||[],rq=req.requests||[];let places=[];bl.forEach(b=>(b.items||[]).forEach(it=>places.push(it)));dbStats.innerHTML=item('Branch',bl.length)+item('활성 Branch',bl.filter(b=>b.active).length)+item('Hero Branch',bl.filter(b=>b.hero_enabled).length)+item('Place',places.length)+item('활성 Place',places.filter(p=>p.active).length);recommendStats.innerHTML=item('추천 카드',cards.length)+cards.map(c=>`<div class="item">${c.name}<br>${c.branch_title} · ${c.source}</div>`).join('');memoryStats.innerHTML=item('이벤트',ev.length)+item('Hero 노출',ev.filter(e=>e.action==='hero_exposed').length)+item('길찾기',ev.filter(e=>(e.action||'').includes('route')).length);devStats.innerHTML=item('전체 지시/보고',rq.length)+item('요청',rq.filter(r=>r.status==='requested').length)+item('보고',rq.filter(r=>r.status==='reported').length)}loadAll()</script></body></html>
