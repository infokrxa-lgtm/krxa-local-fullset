<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KRXA Travel Branch DEV</title><style>body{margin:0;background:#0f172a;color:white;font-family:Arial,sans-serif}.wrap{padding:24px}.card{background:#1e293b;border-radius:18px;padding:18px;margin-bottom:14px}textarea{width:100%;height:360px;border-radius:12px;padding:12px;box-sizing:border-box}button{border:0;border-radius:10px;padding:10px 14px;margin:4px;background:#2563eb;color:white;font-weight:bold}.green{background:#16a34a}.gray{background:#64748b}pre{background:#020617;padding:12px;border-radius:12px;white-space:pre-wrap}</style></head><body><div class="wrap"><h1>KRXA Travel Branch DEV</h1><div class="card"><button onclick="loadDB()">DB 불러오기</button><button class="green" onclick="validateDB()">JSON 검증</button><button class="green" onclick="saveDB()">DB 저장</button><button onclick="downloadJSON()">JSON 다운로드</button><button onclick="downloadCSV()">CSV 다운로드</button><button class="gray" onclick="window.open('/travel-v1','_blank')">USER 확인</button><button class="gray" onclick="window.open('/control/branch','_blank')">CONTROL 확인</button></div><div class="card"><h2>DB 편집</h2><textarea id="jsonBox"></textarea></div><div class="card"><h2>검증 결과</h2><pre id="resultBox">대기 중</pre></div></div><script>
async function loadDB(){const db=await (await fetch('/api/travel-branches')).json();document.getElementById('jsonBox').value=JSON.stringify(db,null,2);log('DB 불러오기 완료')}
function getEditedDB(){return JSON.parse(document.getElementById('jsonBox').value)}
function validateDB(){try{const data=getEditedDB(),errors=[],ids=new Set();if(!data.branches||!Array.isArray(data.branches))errors.push('branches 배열이 없습니다.');(data.branches||[]).forEach((b,bi)=>{if(!b.id)errors.push('Branch '+bi+': id 없음');if(ids.has(b.id))errors.push('Branch 중복 id: '+b.id);ids.add(b.id);if(!b.title)errors.push('Branch '+bi+': title 없음');if(typeof b.active!=='boolean')errors.push('Branch '+b.id+': active boolean 아님');if(typeof b.hero_enabled!=='boolean')errors.push('Branch '+b.id+': hero_enabled boolean 아님');(b.items||[]).forEach((it,ii)=>{if(!it.id)errors.push(b.id+' item '+ii+': id 없음');if(!it.name)errors.push(b.id+' item '+ii+': name 없음');if(!it.address&&!it.map_keyword)errors.push(b.id+' / '+it.name+': 주소 또는 지도검색어 없음');if(typeof it.active!=='boolean')errors.push(b.id+' / '+it.name+': active boolean 아님')})});log(errors.length?'검증 실패\n\n'+errors.join('\n'):'검증 성공\nBranch 수: '+data.branches.length)}catch(e){log('JSON 오류: '+e.message)}}
async function saveDB(){try{const data=getEditedDB();const out=await (await fetch('/api/travel-branches/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})).json();log(out.ok?'저장 완료':'저장 실패')}catch(e){log('저장 오류: '+e.message)}}
function downloadJSON(){downloadFile('travel_branches.json',document.getElementById('jsonBox').value,'application/json')}
function downloadCSV(){try{const data=getEditedDB();let rows=[['branch_id','branch_title','item_id','name','category','region','address','phone','map_keyword','source','source_url','active','priority','score']];(data.branches||[]).forEach(b=>(b.items||[]).forEach(it=>rows.push([b.id,b.title,it.id,it.name,it.category||'',it.region||'',it.address||'',it.phone||'',it.map_keyword||'',it.source||'',it.source_url||'',it.active,it.priority||'',it.score||''])));const csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');downloadFile('travel_branches.csv',csv,'text/csv')}catch(e){log('CSV 생성 오류: '+e.message)}}
function downloadFile(name,content,type){const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()}function log(msg){document.getElementById('resultBox').textContent=msg}loadDB();</script></body></html>
