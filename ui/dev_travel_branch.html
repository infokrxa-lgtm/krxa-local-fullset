<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KRXA Travel Branch DEV v2</title>
<style>body{margin:0;background:#0f172a;color:white;font-family:Arial,sans-serif}.wrap{padding:18px}.card{background:#1e293b;border-radius:16px;padding:14px;margin-bottom:14px}button{border:0;border-radius:9px;padding:9px 12px;margin:2px;background:#2563eb;color:white;font-weight:bold}.green{background:#16a34a}.gray{background:#64748b}textarea,input{width:100%;padding:8px;margin:3px 0;border-radius:7px;border:0;box-sizing:border-box}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}pre{background:#020617;border-radius:10px;padding:10px;white-space:pre-wrap;max-height:360px;overflow:auto}</style>
</head><body><div class="wrap"><h1>KRXA Travel Branch DEV v2</h1><p>CONTROL 지시 수신 · DEV 검증/수정 · 보고 등록</p>
<div class="card"><button onclick="loadAll()">전체 불러오기</button><button class="green" onclick="validateDB()">JSON 검증</button><button class="green" onclick="saveDB()">DB 저장</button><button onclick="downloadJSON()">JSON 다운로드</button><button onclick="downloadCSV()">CSV 다운로드</button><button class="gray" onclick="window.open('/control/branch','_blank')">CONTROL</button><button class="gray" onclick="window.open('/control/travel-dashboard','_blank')">Dashboard</button></div>
<div class="grid"><div class="card"><h2>CONTROL 지시 / DEV 보고</h2><button onclick="loadRequests()">지시 불러오기</button><pre id="requestBox">대기</pre><input id="reportTitle" placeholder="보고 제목"><textarea id="reportBody" rows="4" placeholder="DEV 보고 내용"></textarea><button class="green" onclick="sendReport()">CONTROL 보고 등록</button></div><div class="card"><h2>검증 결과</h2><pre id="resultBox">대기</pre></div></div>
<div class="card"><h2>DB 편집</h2><textarea id="jsonBox" style="height:420px"></textarea></div></div>
<script>
let db={}; async function loadAll(){await loadDB();await loadRequests()} async function loadDB(){db=await (await fetch('/api/travel-branches')).json();jsonBox.value=JSON.stringify(db,null,2);log('DB 불러오기 완료')} function getDB(){return JSON.parse(jsonBox.value)}
async function saveDB(){try{db=getDB();let out=await (await fetch('/api/travel-branches/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(db)})).json();log(out.ok?'DB 저장 완료':'DB 저장 실패')}catch(e){log('저장 오류:'+e.message)}}
function validateDB(){try{let d=getDB(),err=[],keys=new Set();if(!Array.isArray(d.branches))err.push('branches 배열 없음');(d.branches||[]).forEach((b,bi)=>{if(!b.id)err.push('Branch '+bi+' id 없음');if(!b.title)err.push('Branch '+bi+' title 없음');(b.items||[]).forEach((it,ii)=>{if(!it.name)err.push(b.id+' item '+ii+' name 없음');if(!it.address&&!it.map_keyword)err.push((it.name||it.id)+' 주소/지도검색어 없음');let k=(it.name||'')+'|'+(it.address||it.map_keyword||'');if(keys.has(k))err.push('중복 의심 '+k);keys.add(k)})});log(err.length?'검증 실패\n\n'+err.join('\n'):'검증 성공')}catch(e){log('JSON 오류:'+e.message)}}
async function loadRequests(){let data=await (await fetch('/api/dev-requests')).json();requestBox.textContent=JSON.stringify(data.requests||[],null,2)}
async function sendReport(){let title=reportTitle.value.trim()||'DEV 보고',body=reportBody.value.trim();let out=await (await fetch('/api/dev-requests/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,body,source:'dev_travel_branch',status:'reported'})})).json();log(out.ok?'CONTROL 보고 등록 완료':'보고 실패');reportTitle.value='';reportBody.value='';loadRequests()}
function downloadJSON(){downloadFile('travel_branches_dev.json',jsonBox.value,'application/json')} function downloadCSV(){let d=getDB(),rows=[['branch_id','branch_title','item_id','name','category','region','address','phone','map_keyword','source','source_url','active','priority','score']];(d.branches||[]).forEach(b=>(b.items||[]).forEach(it=>rows.push([b.id,b.title,it.id,it.name,it.category||'',it.region||'',it.address||'',it.phone||'',it.map_keyword||'',it.source||'',it.source_url||'',it.active,it.priority||'',it.score||''])));let csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');downloadFile('travel_branches_dev.csv',csv,'text/csv')}
function downloadFile(n,c,t){let blob=new Blob([c],{type:t});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=n;a.click()} function log(x){resultBox.textContent=x} loadAll()
</script></body></html>
