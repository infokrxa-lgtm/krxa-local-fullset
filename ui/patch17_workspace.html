<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>PATCH17-1 실행 정확도 작업창</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#eef4fb;font-family:Arial,sans-serif;color:#0f172a}
.wrap{padding:18px}.panel{background:white;border:1px solid #cbd5e1;border-radius:18px;padding:18px}
.btn{border:0;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;cursor:pointer;margin:3px}
.on{background:#16a34a;color:white}.off{background:#dc2626;color:white}.blue{background:#2563eb;color:white}.gray{background:#64748b;color:white}.red{background:#dc2626;color:white}
.row{display:grid;grid-template-columns:34px 1fr 1fr 1fr 1.4fr 1.2fr 1.2fr 1fr 70px 60px 60px 60px;gap:6px;align-items:center;border-bottom:1px solid #e5e7eb;padding:8px 0}
input{padding:7px;border:1px solid #cbd5e1;border-radius:8px;width:100%;box-sizing:border-box}
small{color:#64748b}
</style>
</head>
<body>
<div class="wrap"><div class="panel">
<h2 id="title">PATCH17-1 작업창</h2>
<p>이름/지역/분류/실주소/지도검색어/URL/전화 수정 후 저장하면 USER에 반영됩니다. 지도는 현재위치 → 목적지 DIR로 실행합니다.</p>
<div id="rows"></div>
<button class="btn blue" onclick="addItem()">+ 신규</button>
<span id="updown"></span>
<button class="btn on" onclick="save()">완료 / USER 반영</button>
<button class="btn blue" onclick="window.open('/travel-v1','_blank')">사용자 실행 확인</button>
</div></div>

<script>
let DATA=null,C='',G='';
const qs=new URLSearchParams(location.search);
C=qs.get('component')||'hero';
G=qs.get('group')||'baekban';

async function api(path,opt={}){
  const r=await fetch(path,{headers:{"Content-Type":"application/json"},...opt});
  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}
async function load(){
  const d=await api('/api/patch17/control-first?ts='+Date.now());
  DATA=d.data;
  normalize();
  render();
}
function comp(){return DATA.components[C];}
function group(){return comp().groups.find(x=>x.id===G);}
function normalize(){
  const g=group();
  g.items = g.items || [];
  g.items.forEach(x=>{
    x.name = x.name || '';
    x.area = x.area || '';
    x.category = x.category || '';
    x.address = x.address || '';
    x.map_query = x.map_query || x.address || x.name || '';
    x.url = x.url || '';
    x.phone = x.phone || '';
    x.enabled = x.enabled !== false;
  });
}
function item(i){return group().items[i];}

function render(){
  const g=group();
  document.getElementById('title').textContent=comp().title+' · '+g.title;

  document.getElementById('rows').innerHTML=(g.items||[]).map((x,i)=>`
  <div class="row">
    <span>${i+1}</span>
    <input value="${esc(x.name)}" onchange="item(${i}).name=this.value" placeholder="이름">
    <input value="${esc(x.area)}" onchange="item(${i}).area=this.value" placeholder="지역">
    <input value="${esc(x.category)}" onchange="item(${i}).category=this.value" placeholder="분류">
    <input value="${esc(x.address)}" onchange="item(${i}).address=this.value" placeholder="실주소">
    <input value="${esc(x.map_query)}" onchange="item(${i}).map_query=this.value" placeholder="지도검색어">
    <input value="${esc(x.url)}" onchange="item(${i}).url=this.value" placeholder="URL">
    <input value="${esc(x.phone)}" onchange="item(${i}).phone=this.value" placeholder="전화">
    <button class="btn ${x.enabled!==false?'on':'off'}" onclick="toggle(${i})">${x.enabled!==false?'ON':'OFF'}</button>
    <button class="btn gray" onclick="move(${i},-1)">↑</button>
    <button class="btn gray" onclick="move(${i},1)">↓</button>
    <button class="btn red" onclick="del(${i})">삭제</button>
  </div>
  <div style="padding:4px 0 8px 34px">
    <button class="btn blue" onclick="mapDir(${i})">현재위치 → 지도 DIR</button>
    <button class="btn gray" onclick="openUrl(${i})">URL</button>
    <button class="btn gray" onclick="callPhone(${i})">전화</button>
  </div>
  `).join('');

  document.getElementById('updown').innerHTML = g.upload_download ? 
  `<button class="btn gray" onclick="downloadItems()">다운로드</button>
   <label class="btn gray">업로드<input type="file" accept=".json" onchange="uploadItems(event)" style="display:none"></label>` : '';
}
function esc(s){return String(s||'').replaceAll('"','&quot;');}

function addItem(){
  group().items.push({name:'신규',area:'',category:'',address:'',map_query:'',url:'',phone:'',enabled:true});
  render();
}
function toggle(i){item(i).enabled=!(item(i).enabled!==false);render();}
function del(i){if(confirm('삭제할까요?')){group().items.splice(i,1);render();}}
function move(i,dir){
  const arr=group().items;
  const ni=i+dir;
  if(ni<0||ni>=arr.length)return;
  const t=arr[i]; arr[i]=arr[ni]; arr[ni]=t;
  render();
}
function destinationOf(x){return x.address || x.map_query || x.name;}

function mapDir(i){
  const x=item(i);
  const dest=destinationOf(x);
  if(!dest){alert('실주소 또는 지도검색어를 입력하세요.');return;}

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const origin=pos.coords.latitude+','+pos.coords.longitude;
      const url='https://www.google.com/maps/dir/?api=1&origin='+encodeURIComponent(origin)+'&destination='+encodeURIComponent(dest)+'&travelmode=driving';
      window.open(url,'_blank');
    },()=>{
      const url='https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(dest)+'&travelmode=driving';
      window.open(url,'_blank');
    },{enableHighAccuracy:true,timeout:8000});
  }else{
    const url='https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(dest)+'&travelmode=driving';
    window.open(url,'_blank');
  }
}
function openUrl(i){
  const u=item(i).url;
  if(!u){alert('URL이 없습니다.');return;}
  window.open(u,'_blank');
}
function callPhone(i){
  const p=item(i).phone;
  if(!p){alert('전화번호가 없습니다.');return;}
  location.href='tel:'+p;
}

async function save(){
  const d=await api('/api/patch17/control-first/save',{method:'POST',body:JSON.stringify(DATA)});
  DATA=d.data;
  alert('저장 완료 / USER 반영');
  render();
}
function downloadItems(){
  const b=new Blob([JSON.stringify(group().items||[],null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download=C+'_'+G+'_items.json';
  a.click();
}
function uploadItems(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      group().items=JSON.parse(r.result);
      normalize();
      render();
      alert('업로드 완료. 완료 / USER 반영을 누르세요.');
    }catch(err){alert('JSON 오류: '+err.message);}
  };
  r.readAsText(f);
}
load();
</script>
</body>
</html>
