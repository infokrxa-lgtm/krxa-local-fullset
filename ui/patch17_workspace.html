<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>PATCH17-6 Admin Editable Execution Rules</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#eef4fb;font-family:Arial,sans-serif;color:#0f172a}
.wrap{padding:18px}.panel{background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:18px}
.btn{border:0;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:900;cursor:pointer;margin:3px}
.on{background:#16a34a;color:white}.off{background:#dc2626;color:white}.blue{background:#2563eb;color:white}.gray{background:#64748b;color:white}.red{background:#dc2626;color:white}
.actionbar{position:sticky;top:0;background:white;border:1px solid #dbe3ee;border-radius:14px;padding:10px;margin:10px 0;z-index:10}
.table{overflow:auto;border:1px solid #e5e7eb;border-radius:12px}
.row{display:grid;grid-template-columns:42px 42px 150px 120px 120px 130px 120px 120px 160px 160px 160px 130px 160px 80px 60px 60px 70px;gap:6px;align-items:center;border-bottom:1px solid #e5e7eb;padding:7px;min-width:2100px}
.header{font-size:12px;font-weight:900;background:#f8fafc;color:#475569}
input,select{padding:7px;border:1px solid #cbd5e1;border-radius:8px;width:100%;box-sizing:border-box}
.selected{background:#eff6ff}
.note{font-size:12px;color:#64748b}
</style>
</head>
<body>
<div class="wrap"><div class="panel">
<h2 id="title">PATCH17-6 실제 실행규칙 작업창</h2>
<p>1~8페이지 전체 항목의 내용·실행종류·지도모드·출발지·목적지·URL·전화·순서를 관제에서 수정합니다.</p>

<div class="actionbar">
  <b>공통 실행/관리</b>
  <button class="btn blue" onclick="runSelected()">선택 실행</button>
  <button class="btn blue" onclick="runMapDir()">지도 DIR</button>
  <button class="btn gray" onclick="runMapSearch()">지도 검색</button>
  <button class="btn gray" onclick="runUrl()">URL</button>
  <button class="btn gray" onclick="runPhone()">전화</button>
  <button class="btn blue" onclick="addItem()">+ 신규</button>
  <button class="btn gray" onclick="downloadJson()">JSON 다운로드</button>
  <label class="btn gray">JSON 업로드<input type="file" accept=".json" onchange="uploadJson(event)" style="display:none"></label>
  <span id="csvBtns"></span>
  <button class="btn on" onclick="save()">완료 / USER 반영</button>
  <button class="btn blue" onclick="window.open('/travel-v1','_blank')">사용자 실행 확인</button>
</div>

<div class="note">
실행종류: 지도길찾기 / 지도검색 / URL / 전화 / 말대말 / 내부페이지 / 없음 · 
지도모드: 자동차 / 대중교통 / 도보 / 자전거
</div>

<div class="table">
<div class="row header">
  <span>No</span><span>선택</span><span>이름</span><span>지역</span><span>분류</span>
  <span>실행종류</span><span>지도모드</span><span>출발지</span><span>목적지</span>
  <span>실주소</span><span>지도검색어</span><span>전화</span><span>URL</span>
  <span>ON</span><span>↑</span><span>↓</span><span>삭제</span>
</div>
<div id="rows"></div>
</div>

</div></div>

<script>
let DATA=null,C='',G='',SELECTED=0;
const qs=new URLSearchParams(location.search);
C=qs.get('component')||'hero';
G=qs.get('group')||'baekban';

async function api(path,opt={}){
  const r=await fetch(path,{headers:{"Content-Type":"application/json"},...opt});
  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}

async function load(){
  const d=await api('/api/patch17/control-first?ts='+Date.now());
  DATA=d.data;
  normalize();
  render();
}

function comp(){return DATA.components[C] || (DATA.components[C]={title:C,groups:[]});}
function group(){
  const c=comp();
  let g=(c.groups||[]).find(x=>x.id===G);
  if(!g){
    c.groups=c.groups||[];
    g={id:G,title:G,enabled:true,items:[]};
    c.groups.push(g);
  }
  return g;
}
function item(i){return group().items[i];}
function cur(){const g=group(); if(!g.items.length){alert('항목이 없습니다.');return null;} return g.items[SELECTED]||g.items[0];}

function defaultActionForComponent(){
  if(C==='call'||C.includes('call')||G.includes('phone')) return 'phone';
  if(C==='m2m_link') return 'm2m';
  if(C==='music'||C==='tv'||G.includes('site')||G.includes('youtube')||G.includes('spotify')) return 'url';
  if(C==='route'||C==='taxi'||C==='hotel'||C==='food'||C==='hero'||C==='tour'||C==='shopping'||C==='airport'||C==='sos') return 'map_dir';
  return 'none';
}
function defaultTravelMode(){
  if(C==='taxi'||G==='bus'||G==='subway'||G==='map_provider') return 'transit';
  if(C==='route') return 'driving';
  if(C==='tour'||C==='shopping'||C==='food') return 'walking';
  return 'driving';
}

function normalize(){
  const g=group();
  g.items=g.items||[];
  g.items.forEach(x=>{
    x.name=x.name||'';
    x.area=x.area||'';
    x.category=x.category||'';
    x.address=x.address||'';
    x.map_query=x.map_query||x.address||x.name||'';
    x.url=x.url||'';
    x.phone=x.phone||'';
    x.description=x.description||'';
    x.action_type=x.action_type||guessAction(x);
    x.travel_mode=x.travel_mode||defaultTravelMode();
    x.origin_type=x.origin_type||'current_location';
    x.destination_type=x.destination_type||guessDestinationType(x);
    x.destination_value=x.destination_value||'';
    x.enabled=x.enabled!==false;
  });
  if(SELECTED>=g.items.length) SELECTED=Math.max(0,g.items.length-1);
}

function guessAction(x){
  if(x.action_type) return x.action_type;
  if(x.url) return 'url';
  if(x.phone) return 'phone';
  if(x.address||x.map_query||x.name) return defaultActionForComponent();
  return defaultActionForComponent();
}
function guessDestinationType(x){
  if(x.destination_type) return x.destination_type;
  if(x.address) return 'address';
  if(x.map_query) return 'map_query';
  return 'name';
}
function esc(s){return String(s||'').replaceAll('"','&quot;');}

function render(){
  const c=comp(), g=group();
  document.getElementById('title').textContent=(c.title||C)+' · '+(g.title||G);

  document.getElementById('rows').innerHTML=(g.items||[]).map((x,i)=>`
  <div class="row ${SELECTED===i?'selected':''}">
    <span>${i+1}</span>
    <input type="radio" name="sel" ${SELECTED===i?'checked':''} onchange="SELECTED=${i};render()">
    <input value="${esc(x.name)}" onchange="item(${i}).name=this.value" placeholder="이름">
    <input value="${esc(x.area)}" onchange="item(${i}).area=this.value" placeholder="지역">
    <input value="${esc(x.category)}" onchange="item(${i}).category=this.value" placeholder="분류">

    <select onchange="item(${i}).action_type=this.value">
      ${opt('map_dir','지도길찾기',x.action_type)}
      ${opt('map_search','지도검색',x.action_type)}
      ${opt('url','URL',x.action_type)}
      ${opt('phone','전화',x.action_type)}
      ${opt('m2m','말대말',x.action_type)}
      ${opt('page','내부페이지',x.action_type)}
      ${opt('none','없음',x.action_type)}
    </select>

    <select onchange="item(${i}).travel_mode=this.value">
      ${opt('driving','자동차',x.travel_mode)}
      ${opt('transit','대중교통',x.travel_mode)}
      ${opt('walking','도보',x.travel_mode)}
      ${opt('bicycling','자전거',x.travel_mode)}
    </select>

    <select onchange="item(${i}).origin_type=this.value">
      ${opt('current_location','현재위치',x.origin_type)}
      ${opt('manual','직접입력',x.origin_type)}
      ${opt('none','없음',x.origin_type)}
    </select>

    <select onchange="item(${i}).destination_type=this.value">
      ${opt('address','실주소',x.destination_type)}
      ${opt('map_query','지도검색어',x.destination_type)}
      ${opt('name','이름',x.destination_type)}
      ${opt('manual','직접입력',x.destination_type)}
    </select>

    <input value="${esc(x.address)}" onchange="item(${i}).address=this.value" placeholder="실주소">
    <input value="${esc(x.map_query)}" onchange="item(${i}).map_query=this.value" placeholder="지도검색어">
    <input value="${esc(x.phone)}" onchange="item(${i}).phone=this.value" placeholder="전화">
    <input value="${esc(x.url)}" onchange="item(${i}).url=this.value" placeholder="URL">

    <button class="btn ${x.enabled!==false?'on':'off'}" onclick="toggle(${i})">${x.enabled!==false?'ON':'OFF'}</button>
    <button class="btn gray" onclick="move(${i},-1)">↑</button>
    <button class="btn gray" onclick="move(${i},1)">↓</button>
    <button class="btn red" onclick="del(${i})">삭제</button>
  </div>`).join('');

  document.getElementById('csvBtns').innerHTML = g.upload_download ?
  `<button class="btn gray" onclick="downloadCsv()">엑셀용 CSV 다운로드</button>
   <label class="btn gray">엑셀용 CSV 업로드<input type="file" accept=".csv,.txt" onchange="uploadCsv(event)" style="display:none"></label>` : '';
}
function opt(v,label,cur){return `<option value="${v}" ${cur===v?'selected':''}>${label}</option>`;}

function toggle(i){item(i).enabled=!(item(i).enabled!==false);render();}
function addItem(){
  group().items.push({
    name:'신규',
    area:'',
    category:'',
    address:'',
    map_query:'',
    url:'',
    phone:'',
    description:'',
    action_type:defaultActionForComponent(),
    travel_mode:defaultTravelMode(),
    origin_type:'current_location',
    destination_type:'name',
    destination_value:'',
    enabled:true
  });
  SELECTED=group().items.length-1;
  render();
}
function del(i){if(confirm('삭제할까요?')){group().items.splice(i,1);SELECTED=Math.max(0,SELECTED-1);render();}}
function move(i,dir){const a=group().items,ni=i+dir;if(ni<0||ni>=a.length)return;[a[i],a[ni]]=[a[ni],a[i]];SELECTED=ni;render();}

function destinationOf(x){
  if(x.destination_type==='manual') return x.destination_value || x.address || x.map_query || x.name;
  if(x.destination_type==='address') return x.address || x.map_query || x.name;
  if(x.destination_type==='map_query') return x.map_query || x.address || x.name;
  return x.name || x.address || x.map_query;
}

async function getCurrentPosition(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation) return reject(new Error('geolocation not supported'));
    navigator.geolocation.getCurrentPosition(
      p=>resolve(p.coords.latitude+','+p.coords.longitude),
      reject,
      {enableHighAccuracy:true,timeout:8000,maximumAge:60000}
    );
  });
}

async function runMapDir(){
  const x=cur(); if(!x)return;
  const dest=destinationOf(x);
  if(!dest){alert('목적지가 없습니다.');return;}

  let url='https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(dest)+'&travelmode='+encodeURIComponent(x.travel_mode||'driving');

  if(x.origin_type==='current_location'){
    try{
      const origin=await getCurrentPosition();
      url='https://www.google.com/maps/dir/?api=1&origin='+encodeURIComponent(origin)+'&destination='+encodeURIComponent(dest)+'&travelmode='+encodeURIComponent(x.travel_mode||'driving');
    }catch(e){}
  }else if(x.origin_type==='manual' && x.origin_value){
    url='https://www.google.com/maps/dir/?api=1&origin='+encodeURIComponent(x.origin_value)+'&destination='+encodeURIComponent(dest)+'&travelmode='+encodeURIComponent(x.travel_mode||'driving');
  }

  window.open(url,'_blank');
}
function runMapSearch(){
  const x=cur(); if(!x)return;
  const q=x.map_query||x.address||x.name;
  if(!q){alert('검색어가 없습니다.');return;}
  window.open('https://www.google.com/maps/search/'+encodeURIComponent(q),'_blank');
}
function runUrl(){
  const x=cur(); if(!x)return;
  if(!x.url){alert('URL이 없습니다.');return;}
  window.open(x.url,'_blank');
}
function runPhone(){
  const x=cur(); if(!x)return;
  if(!x.phone){alert('전화번호가 없습니다.');return;}
  location.href='tel:'+x.phone;
}
function runSelected(){
  const x=cur(); if(!x)return;
  if(x.action_type==='map_dir') return runMapDir();
  if(x.action_type==='map_search') return runMapSearch();
  if(x.action_type==='url') return runUrl();
  if(x.action_type==='phone') return runPhone();
  if(x.action_type==='m2m') return window.open('/travel-v1','_blank');
  if(x.action_type==='page') return window.open('/travel-v1','_blank');
  alert('실행종류가 없음입니다.');
}

async function save(){
  const d=await api('/api/patch17/control-first/save',{method:'POST',body:JSON.stringify(DATA)});
  DATA=d.data; normalize(); alert('저장 완료 / USER 반영'); render();
}

function downloadJson(){
  const b=new Blob([JSON.stringify(group().items||[],null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=C+'_'+G+'_items.json'; a.click();
}
function uploadJson(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{group().items=JSON.parse(r.result);normalize();render();alert('업로드 완료. 완료를 눌러 저장하세요.')}catch(err){alert(err.message)}};
  r.readAsText(f);
}
function downloadCsv(){
  const cols=['name','area','category','action_type','travel_mode','origin_type','destination_type','address','map_query','url','phone','description','enabled'];
  const lines=[cols.join(',')].concat((group().items||[]).map(x=>cols.map(c=>csv(x[c])).join(',')));
  const b=new Blob(["\ufeff"+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=C+'_'+G+'_items.csv'; a.click();
}
function csv(v){return '"'+String(v??'').replaceAll('"','""')+'"';}
function uploadCsv(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    const text=r.result.replace(/^\ufeff/,'');
    const rows=parseCsv(text);
    if(rows.length<2){alert('CSV 데이터가 없습니다.');return;}
    const head=rows[0].map(x=>x.trim());
    group().items=rows.slice(1).filter(r=>r.some(Boolean)).map(r=>{
      const o={}; head.forEach((h,i)=>o[h]=r[i]||'');
      return {
        name:o.name||o['식당명']||o['이름']||'',
        area:o.area||o['지역']||'',
        category:o.category||o['분류']||'',
        action_type:o.action_type||o['실행종류']||defaultActionForComponent(),
        travel_mode:o.travel_mode||o['지도모드']||defaultTravelMode(),
        origin_type:o.origin_type||o['출발지']||'current_location',
        destination_type:o.destination_type||o['목적지']||'address',
        address:o.address||o['실주소']||o['주소']||'',
        map_query:o.map_query||o['지도검색어']||o.address||o.name||'',
        url:o.url||o.URL||'',
        phone:o.phone||o['전화']||'',
        description:o.description||o['설명']||'',
        enabled:String(o.enabled??'true').toLowerCase()!=='false' && String(o.enabled??'on').toUpperCase()!=='OFF'
      };
    });
    normalize(); render(); alert('CSV 업로드 완료. 완료 / USER 반영을 누르세요.');
  };
  r.readAsText(f,'utf-8');
}
function parseCsv(text){
  const rows=[]; let row=[],val='',q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], nx=text[i+1];
    if(q){
      if(ch=='"'&&nx=='"'){val+='"';i++;}
      else if(ch=='"')q=false;
      else val+=ch;
    }else{
      if(ch=='"')q=true;
      else if(ch==','){row.push(val);val='';}
      else if(ch=='\n'){row.push(val);rows.push(row);row=[];val='';}
      else if(ch!='\r')val+=ch;
    }
  }
  row.push(val); rows.push(row);
  return rows;
}
load();
</script>
</body>
</html>
