<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KRXA Travel Analytics</title><style>body{margin:0;background:#020617;color:white;font-family:Arial,sans-serif}.wrap{padding:22px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:#111827;border-radius:18px;padding:16px;margin-bottom:14px}.item{background:#1e293b;border-radius:12px;padding:10px;margin:8px 0}button{border:0;border-radius:10px;padding:10px 14px;margin:4px;background:#2563eb;color:white;font-weight:bold}.green{background:#16a34a}.gray{background:#64748b}pre{background:#0f172a;border-radius:12px;padding:12px;white-space:pre-wrap;max-height:360px;overflow:auto}</style></head><body><div class="wrap"><h1>KRXA Travel Analytics Dashboard</h1><div class="card"><button onclick="loadAll()">분석 새로고침</button><button class="green" onclick="window.open('/control/travel-dashboard','_blank')">CONTROL</button><button class="gray" onclick="window.open('/control/branch','_blank')">Branch 관리</button><button onclick="downloadReport()">분석 JSON 다운로드</button></div><div class="grid"><div class="card"><h2>전체 요약</h2><div id="summaryBox">대기</div></div><div class="card"><h2>실행 전환</h2><div id="conversionBox">대기</div></div></div><div class="grid"><div class="card"><h2>인기 Branch</h2><div id="branchRank">대기</div></div><div class="card"><h2>인기 Place</h2><div id="placeRank">대기</div></div></div><div class="grid"><div class="card"><h2>Action 분석</h2><div id="actionRank">대기</div></div><div class="card"><h2>개선 후보</h2><div id="improveBox">대기</div></div></div><div class="card"><h2>원본 분석 데이터</h2><pre id="rawBox">대기</pre></div></div><script>
let report={};async function j(url){try{return await(await fetch(url)).json()}catch(e){return{error:e.message}}}function countBy(events,key){const o={};events.forEach(e=>{const k=e[key]||'unknown';o[k]=(o[k]||0)+1});return Object.entries(o).sort((a,b)=>b[1]-a[1])}function box(rows){return rows.length?rows.map((r,i)=>`<div class="item">${i+1}. <b>${r[0]}</b> · ${r[1]}회</div>`).join(''):'데이터 없음'}function item(k,v){return`<div class="item">${k}: <b>${v}</b></div>`}async function loadAll(){const branches=await j('/api/travel-branches'),recommend=await j('/api/travel-recommend'),memory=await j('/api/travel-memory');const bl=branches.branches||[],cards=recommend.cards||[],ev=memory.events||[];let places=0,active=0;bl.forEach(b=>(b.items||[]).forEach(it=>{places++;if(it.active)active++}));const imp=[];if(!ev.length)imp.push('Memory 이벤트가 없습니다. USER 테스트 필요');if(!cards.length)imp.push('추천 카드 없음: active/hero_enabled 확인');if(active<5)imp.push('활성 Place 5개 미만');report={generated_at:new Date().toISOString(),summary:{branches:bl.length,active_branches:bl.filter(b=>b.active).length,places,active_places:active,recommend_cards:cards.length,memory_events:ev.length},conversion:{hero_exposed:ev.filter(e=>e.action==='hero_exposed').length,list_open:ev.filter(e=>(e.action||'').includes('list')).length,route_open:ev.filter(e=>(e.action||'').includes('route')).length},branch_rank:countBy(ev,'branch_title').slice(0,10),place_rank:countBy(ev,'place_name').slice(0,10),action_rank:countBy(ev,'action').slice(0,10),improvements:imp};render()}function render(){document.getElementById('summaryBox').innerHTML=Object.entries(report.summary).map(([k,v])=>item(k,v)).join('');document.getElementById('conversionBox').innerHTML=Object.entries(report.conversion).map(([k,v])=>item(k,v)).join('');document.getElementById('branchRank').innerHTML=box(report.branch_rank);document.getElementById('placeRank').innerHTML=box(report.place_rank);document.getElementById('actionRank').innerHTML=box(report.action_rank);document.getElementById('improveBox').innerHTML=report.improvements.length?report.improvements.map(x=>`<div class="item">${x}</div>`).join(''):'<div class="item">개선 후보 없음</div>';document.getElementById('rawBox').textContent=JSON.stringify(report,null,2)}function downloadReport(){const blob=new Blob([JSON.stringify(report,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='travel_analytics_report.json';a.click()}loadAll();</script></body></html>
