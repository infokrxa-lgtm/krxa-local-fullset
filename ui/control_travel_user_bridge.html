<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>PATCH19 User UI Mirror Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#eef4fb;font-family:Arial,sans-serif;color:#0f172a}
.wrap{padding:16px}
.panel{background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:16px}
.grid{display:grid;grid-template-columns:420px 1fr;gap:16px}
.phone{background:#f8fafc;border:1px solid #cbd5e1;border-radius:22px;padding:12px;max-height:82vh;overflow:auto}
.page{border:1px solid #dbe3ee;border-radius:16px;margin:10px 0;background:white;overflow:hidden}
.head{background:#e2e8f0;padding:10px;font-weight:900;cursor:pointer}
.head.active{background:#2563eb;color:white}
.body{display:none;padding:10px}.body.open{display:block}
.item{border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin:7px 0;background:#fff;cursor:pointer}
.item:hover{background:#eff6ff}
.badge{float:right;font-size:12px;color:#64748b}
.btn{border:0;border-radius:999px;padding:8px 12px;font-weight:900;cursor:pointer;margin:3px}
.blue{background:#2563eb;color:white}.green{background:#16a34a;color:white}.gray{background:#64748b;color:white}.red{background:#dc2626;color:white}
.right{background:#f8fafc;border:1px solid #dbe3ee;border-radius:18px;padding:16px}
</style>
</head>
<body>
<div class="wrap">
<div class="panel">
<h2>PATCH19 · 사용자 UI 미러 관제</h2>
<p>사용자 UI 1~8페이지를 그대로 기준으로 보고, 항목 클릭 시 PATCH17 작업창에서 수정합니다.</p>
<div class="grid">
  <div class="phone" id="mirror"></div>
  <div class="right">
    <h2 id="selTitle">선택 없음</h2>
    <p id="selDesc">좌측 사용자 UI 항목을 선택하세요.</p>
    <div id="actions"></div>
  </div>
</div>
</div>
</div>

<script>
let DATA=null, OPEN=1, SELECTED=null;

const PAGE_MAP = [
  {page:1,title:"Discovery Home",items:[
    {id:"hero",title:"Hero 회전",component:"hero",group:"baekban",note:"PATCH17 Hero 작업창 유지"},
    {id:"mini_talk",title:"미니 말대말",component:"m2m_link",group:"connect"}
  ]},
  {page:2,title:"Quick Action",items:[
    {id:"gps",title:"GPS/위치시간바",component:"gps",group:"default"},
    {id:"food_hero",title:"맛집 추천 영역",component:"food_hero",group:"recommend",note:"PATCH17 맛집 작업창 유지"},
    {id:"food",title:"식당",component:"food",group:"recommend"},
    {id:"taxi",title:"교통",component:"taxi",group:"taxi"},
    {id:"route",title:"길찾기",component:"route",group:"map_provider"},
    {id:"sos",title:"SOS",component:"sos",group:"police"},
    {id:"mini_talk",title:"미니 말대말",component:"m2m_link",group:"connect"}
  ]},
  {page:3,title:"Travel Hub",items:[
    {id:"airport",title:"공항",component:"airport",group:"default_sites"},
    {id:"hotel",title:"호텔",component:"hotel",group:"default_sites"},
    {id:"food",title:"식당/맛집",component:"food",group:"recommend"},
    {id:"taxi",title:"교통",component:"taxi",group:"taxi"},
    {id:"route",title:"길찾기",component:"route",group:"map_provider"},
    {id:"tour",title:"관광",component:"tour",group:"recommend"},
    {id:"shopping",title:"쇼핑",component:"shopping",group:"recommend"},
    {id:"music",title:"음악",component:"music",group:"youtube"},
    {id:"tv",title:"TV시청",component:"tv",group:"youtube"},
    {id:"call",title:"통화",component:"call",group:"phone"},
    {id:"photo",title:"사진",component:"photo",group:"camera"},
    {id:"video",title:"동영상",component:"video",group:"camera"}
  ]},
  {page:4,title:"Detail Result",items:[
    {id:"detail_list",title:"상세 결과 리스트",component:"detail_list",group:"result_list"},
    {id:"map",title:"지도",component:"detail_list",group:"map"},
    {id:"reservation",title:"예약/사이트",component:"detail_list",group:"reservation"},
    {id:"phone",title:"전화",component:"detail_list",group:"phone"},
    {id:"photo",title:"사진",component:"detail_list",group:"photo"},
    {id:"video",title:"동영상",component:"detail_list",group:"video"},
    {id:"mini_talk",title:"말하기 연결",component:"m2m_link",group:"connect"}
  ]},
  {page:5,title:"말대말 통역",items:[
    {id:"m2m_link",title:"말대말 연결",component:"m2m_link",group:"connect"},
    {id:"auto",title:"자동통역",component:"m2m_link",group:"language"},
    {id:"lang_more",title:"기타 언어 선택",component:"m2m_link",group:"language"},
    {id:"mic",title:"마이크",component:"m2m_link",group:"mic"},
    {id:"text_input",title:"텍스트 입력",component:"m2m_link",group:"text"}
  ]},
  {page:6,title:"통화/메신저",items:[
    {id:"phone",title:"전화",component:"call",group:"phone"},
    {id:"whatsapp",title:"WhatsApp",component:"call",group:"whatsapp"},
    {id:"wechat",title:"WeChat",component:"call",group:"wechat"},
    {id:"hotel_call",title:"호텔 전화",component:"call",group:"user_contacts"},
    {id:"restaurant_call",title:"식당 전화",component:"call",group:"user_contacts"},
    {id:"taxi_call",title:"택시 전화",component:"call",group:"user_contacts"}
  ]},
  {page:7,title:"사용내역/기억",items:[
    {id:"recent_translate",title:"최근 통역",component:"memory_loop",group:"recent_translate"},
    {id:"recent_travel",title:"최근 여행",component:"memory_loop",group:"recent_travel"},
    {id:"memory_loop",title:"KRXA 기억 루프",component:"memory_loop",group:"memory_loop"},
    {id:"continue_translate",title:"통역 계속하기",component:"m2m_link",group:"connect"},
    {id:"travel_menu",title:"여행 메뉴 이동",component:"route",group:"destination"},
    {id:"clear_history",title:"사용내역 초기화",component:"memory_loop",group:"clear_history"}
  ]},
  {page:8,title:"SOS",items:[
    {id:"sos",title:"SOS",component:"sos",group:"police"},
    {id:"police",title:"경찰",component:"sos",group:"police"},
    {id:"emergency",title:"구급",component:"sos",group:"emergency"},
    {id:"hospital",title:"병원",component:"sos",group:"hospital"},
    {id:"embassy",title:"대사관",component:"sos",group:"embassy"},
    {id:"insurance",title:"보험",component:"sos",group:"insurance"},
    {id:"location_share",title:"위치공유",component:"sos",group:"location_share"},
    {id:"offline_phrase",title:"오프라인 생존문장",component:"sos",group:"offline_phrase"}
  ]}
];

async function api(path,opt={}){
  const r=await fetch(path,{headers:{"Content-Type":"application/json"},...opt});
  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}

async function load(){
  const d=await api('/api/patch17/control-first?ts='+Date.now());
  DATA=d.data || {};
  render();
}

function isOn(id){
  const pages=DATA.pages||[];
  for(const p of pages){
    const found=(p.items||[]).find(x=>x.id===id);
    if(found) return found.enabled!==false;
  }
  return true;
}

function render(){
  const box=document.getElementById('mirror');
  box.innerHTML='';
  PAGE_MAP.forEach(p=>{
    const div=document.createElement('div');
    div.className='page';

    const head=document.createElement('div');
    head.className='head '+(OPEN===p.page?'active':'');
    head.textContent='PAGE '+p.page+' · '+p.title;
    head.onclick=()=>{OPEN=OPEN===p.page?0:p.page;render();};

    const body=document.createElement('div');
    body.className='body '+(OPEN===p.page?'open':'');
    p.items.forEach(it=>{
      const row=document.createElement('div');
      row.className='item';
      row.innerHTML=`<b>${it.title}</b><span class="badge">${isOn(it.id)?'ON':'OFF'}</span><br><small>${it.component} / ${it.group}</small>`;
      row.onclick=()=>selectItem(p,it);
      body.appendChild(row);
    });

    div.appendChild(head);
    div.appendChild(body);
    box.appendChild(div);
  });
}

function selectItem(page,item){
  SELECTED={page,item};
  document.getElementById('selTitle').textContent='PAGE '+page.page+' · '+item.title;
  document.getElementById('selDesc').textContent=item.note || '선택 항목의 연결값/실행값/ON-OFF를 관리합니다.';

  document.getElementById('actions').innerHTML=`
    <button class="btn ${isOn(item.id)?'green':'red'}" onclick="toggleSelected()">${isOn(item.id)?'ON':'OFF'} 전환</button>
    <button class="btn blue" onclick="openWorkspace('${item.component}','${item.group}')">작업창 열기</button>
    <button class="btn gray" onclick="openUser()">사용자 화면 확인</button>
    <button class="btn green" onclick="save()">완료 / USER 반영</button>
  `;
}

function findOrCreatePageItem(id,title){
  DATA.pages=DATA.pages||[];
  let page=(DATA.pages||[]).find(p=>(p.items||[]).some(x=>x.id===id));
  if(!page){
    page=DATA.pages[0] || {page:1,title:'Discovery Home',items:[]};
    if(!DATA.pages.length) DATA.pages.push(page);
  }
  page.items=page.items||[];
  let item=page.items.find(x=>x.id===id);
  if(!item){
    item={id,title,enabled:true};
    page.items.push(item);
  }
  return item;
}

function toggleSelected(){
  if(!SELECTED)return;
  const it=findOrCreatePageItem(SELECTED.item.id, SELECTED.item.title);
  it.enabled=!(it.enabled!==false);
  selectItem(SELECTED.page, SELECTED.item);
  render();
}

function openWorkspace(component,group){
  window.open('/control/patch17-workspace?component='+encodeURIComponent(component)+'&group='+encodeURIComponent(group),'_blank');
}

function openUser(){
  window.open('/travel-v1','_blank');
}

async function save(){
  const d=await api('/api/patch17/control-first/save',{
    method:'POST',
    body:JSON.stringify(DATA)
  });
  DATA=d.data;
  alert('저장 완료 / USER 반영');
  render();
}

load();
</script>
</body>
</html>
