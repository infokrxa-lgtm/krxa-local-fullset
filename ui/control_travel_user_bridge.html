<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>KRXA Travel Result Manager Full V1</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#eef4fb;color:#0f172a;font-family:Arial,sans-serif}
.wrap{padding:18px}
.panel{background:white;border:1px solid #cbd5e1;border-radius:18px;padding:18px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:18px}
.page{margin:8px 0;border:1px solid #dbe3ee;border-radius:14px;overflow:hidden}
.head{display:flex;justify-content:space-between;align-items:center;padding:11px;background:#e2e8f0;font-weight:900;cursor:pointer}
.head.active{background:#2563eb;color:white}
.items{display:none;padding:8px;background:#f8fafc}
.items.open{display:block}
.item{padding:9px;margin:5px 0;border:1px solid #e2e8f0;border-radius:10px;background:white;cursor:pointer}
.item.active{background:#dbeafe}
.right{background:#f8fafc;border:1px solid #cbd5e1;border-radius:16px;padding:18px;min-height:650px}
.btn{border:0;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;cursor:pointer;margin:3px}
.on{background:#16a34a;color:white}.off{background:#dc2626;color:white}.blue{background:#2563eb;color:white}.gray{background:#64748b;color:white}.red{background:#dc2626;color:white}
.row{display:grid;grid-template-columns:1fr 80px 80px 80px;gap:8px;align-items:center;border-bottom:1px solid #e5e7eb;padding:8px 0}
input{padding:8px;border:1px solid #cbd5e1;border-radius:8px;width:100%}
</style>
</head>
<body>
<div class="wrap">
<div class="panel">
<h2>관제 · 사용자 결과 관리 FULL V1</h2>
<p>좌측은 사용자 1~8페이지 구조, 우측은 선택 항목의 사용자 결과 데이터 관리입니다.</p>
<div class="grid">
<div id="left"></div>
<div>
<h2 id="title">선택 없음</h2>
<div id="right" class="right">좌측 항목을 선택하세요.</div>
</div>
</div>
</div>
</div>
<script>
let DATA=null, OPEN=0, SEL_PAGE=null, SEL_ITEM=null;

async function load(){
  const r=await fetch('/api/travel-result-manager?ts='+Date.now());
  const d=await r.json();
  DATA=d.data;
  render(); detail();
}

function render(){
  const left=document.getElementById('left');
  left.innerHTML='';
  (DATA.pages||[]).forEach((p,pi)=>{
    const box=document.createElement('div');
    box.className='page';
    const head=document.createElement('div');
    head.className='head '+(OPEN===pi?'active':'');
    head.innerHTML=`<span>${p.page}. ${p.title}</span><span>${p.enabled===false?'OFF':'ON'}</span>`;
    head.onclick=()=>{OPEN=OPEN===pi?null:pi;SEL_PAGE=pi;SEL_ITEM=null;render();detail();};
    const items=document.createElement('div');
    items.className='items '+(OPEN===pi?'open':'');
    (p.items||[]).forEach((it,ii)=>{
      const row=document.createElement('div');
      row.className='item '+(SEL_PAGE===pi&&SEL_ITEM===ii?'active':'');
      row.innerHTML=`${it.title} <span style="float:right">${it.enabled===false?'OFF':'ON'}</span>`;
      row.onclick=()=>{SEL_PAGE=pi;SEL_ITEM=ii;render();detail();};
      items.appendChild(row);
    });
    box.appendChild(head);box.appendChild(items);left.appendChild(box);
  });
}

function resultKey(id){
  if(id==='hero') return 'hero';
  if(id==='hotel') return 'hotel';
  if(id==='food') return 'food';
  if(id==='taxi') return 'taxi';
  if(id==='route') return 'route';
  return id;
}

function detail(){
  const title=document.getElementById('title');
  const right=document.getElementById('right');

  if(SEL_PAGE===null || SEL_ITEM===null){
    title.textContent='선택 없음';
    right.textContent='좌측 항목을 선택하세요.';
    return;
  }

  const item=DATA.pages[SEL_PAGE].items[SEL_ITEM];
  const key=resultKey(item.id);
  const result=DATA.results[key];

  title.textContent=item.title + ' 결과 관리';

  if(item.id==='hero'){
    right.innerHTML=`
      <h3>Hero 회전 그룹 관리</h3>
      <p>Hero에서 회전될 그룹을 관리합니다.</p>
      <button class="btn blue" onclick="openHeroWorkspace()">Hero 작업창</button>
      <button class="btn on" onclick="save()">완료 / USER 반영</button>
      <div id="heroBox">불러오는 중...</div>
    `;
    loadHeroBox();
    return;
  }

  if(!result){
    right.innerHTML=`
      <h3>${item.title}</h3>
      <p>아직 결과 관리 템플릿이 없습니다.</p>
      <button class="btn blue" onclick="createResult('${key}')">결과 템플릿 생성</button>
      <button class="btn on" onclick="save()">완료 / USER 반영</button>
    `;
    return;
  }

  right.innerHTML=`
    <h3>${result.title}</h3>
    <div id="sections">
      ${(result.sections||[]).map((s,si)=>`
        <div style="background:white;border:1px solid #dbe3ee;border-radius:12px;padding:12px;margin:10px 0">
          <h4>${s.title} <button class="btn ${s.enabled!==false?'on':'off'}" onclick="toggleSection('${key}',${si})">${s.enabled!==false?'ON':'OFF'}</button></h4>
          ${(s.items||[]).map((x,xi)=>`
            <div class="row">
              <span>${x.name||x.title||'-'}</span>
              <span>${x.enabled!==false?'ON':'OFF'}</span>
              <button class="btn gray" onclick="editResultItem('${key}',${si},${xi})">수정</button>
              <button class="btn red" onclick="deleteResultItem('${key}',${si},${xi})">삭제</button>
            </div>
          `).join('')}
          <button class="btn blue" onclick="addResultItem('${key}',${si})">+ 신규</button>
        </div>
      `).join('')}
    </div>
    <button class="btn blue" onclick="addSection('${key}')">+ 섹션 추가</button>
    <button class="btn on" onclick="save()">완료 / USER 반영</button>
  `;
}

async function loadHeroBox(){
  const r=await fetch('/api/travel-hero-rotation?ts='+Date.now());
  const d=await r.json();
  const groups=(d.groups&&d.groups.groups)||[];
  document.getElementById('heroBox').innerHTML=groups.map((g,i)=>`
    <div class="row">
      <span>${g.title}</span>
      <span>${g.enabled!==false?'ON':'OFF'}</span>
      <button class="btn gray" onclick="editHeroGroup(${i})">수정</button>
      <button class="btn blue" onclick="openHeroWorkspace()">작업창</button>
    </div>
  `).join('');
}

function openHeroWorkspace(){
  window.open('/control/travel-hero-workspace','_blank');
}

function createResult(key){
  DATA.results[key]={title:key+' 결과 관리',sections:[]};
  detail();
}
function toggleSection(key,si){
  const s=DATA.results[key].sections[si];
  s.enabled=!(s.enabled!==false);
  detail();
}
function addSection(key){
  const title=prompt('섹션명');
  if(!title)return;
  DATA.results[key].sections.push({id:'section_'+Date.now(),title,enabled:true,items:[]});
  detail();
}
function addResultItem(key,si){
  const name=prompt('이름');
  if(!name)return;
  const url=prompt('URL/주소/값','')||'';
  DATA.results[key].sections[si].items.push({name,url,enabled:true});
  detail();
}
function editResultItem(key,si,xi){
  const x=DATA.results[key].sections[si].items[xi];
  x.name=prompt('이름',x.name||'')||x.name;
  x.url=prompt('URL/주소/값',x.url||'')||x.url;
  detail();
}
function deleteResultItem(key,si,xi){
  if(confirm('삭제할까요?')){
    DATA.results[key].sections[si].items.splice(xi,1);
    detail();
  }
}
async function save(){
  const r=await fetch('/api/travel-result-manager/save',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(DATA)
  });
  const d=await r.json();
  DATA=d.data;
  alert('저장 완료 / USER 반영');
  render();detail();
}
load();
</script>
</body>
</html>
