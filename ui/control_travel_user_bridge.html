<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>KRXA Travel CONTROL · Page Actions</title>
<style>
body{font-family:Arial,sans-serif;background:#f8fafc;margin:0;padding:18px;color:#0f172a}
.card{background:white;border-radius:16px;padding:14px;margin:10px 0;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.head{cursor:pointer;font-weight:800;padding:10px;border-radius:12px;background:#e2e8f0}
.body{display:none;padding:10px 4px}
button,a.btn{display:block;text-decoration:none;text-align:center;border:0;border-radius:10px;padding:10px;margin:8px 0;background:#2563eb;color:white;font-weight:700}
.green{background:#16a34a!important}.red{background:#dc2626!important}.gray{background:#64748b!important}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<h2>CONTROL · USER 1~8페이지 관리</h2>
<p>USER는 이용, CONTROL은 신규/수정/삭제/ON-OFF 관리. 기존 사용자 UI는 변경하지 않습니다.</p>

<div id="wrap"></div>

<script>
const pages=[
 ["1페이지 Hero/추천","추천관리","Hero·추천 장소·지도보기·DIR/SEARCH"],
 ["2페이지 실행허브","허브관리","회전 추천·GPS·시장추천·교통허브"],
 ["3페이지 서비스카드","서비스관리","호텔·식당·길찾기·관광·쇼핑·TV·음악"],
 ["4페이지 말대말","통역관리","음성·번역·대화흐름"],
 ["5페이지 기록","기록관리","히스토리·저장·재입력"],
 ["6페이지 즐겨찾기","즐겨찾기관리","사용자 등록·삭제·ON/OFF"],
 ["7페이지 SOS","SOS관리","긴급·현지 도움·연락"],
 ["8페이지 설정","설정관리","지도앱·사이트·사용자 설정"]
];

function toggle(id){
 const el=document.getElementById(id);
 el.style.display = el.style.display==="block" ? "none" : "block";
}

function action(page, kind){
 alert(page + " / CONTROL " + kind + " 기능 연결 예정");
}

function card(p,i){
 const id="p"+i;
 return `<div class="card">
  <div class="head" onclick="toggle('${id}')">${p[0]} · ${p[1]}</div>
  <div class="body" id="${id}">
    <p>${p[2]}</p>
    <a class="btn green" target="_blank" href="/travel-v1">USER 화면 확인</a>
    <div class="grid">
      <button onclick="action('${p[0]}','신규')">신규</button>
      <button onclick="action('${p[0]}','수정')">수정</button>
      <button class="red" onclick="action('${p[0]}','삭제')">삭제</button>
      <button class="gray" onclick="action('${p[0]}','ON/OFF')">ON/OFF</button>
    </div>
    <a class="btn" target="_blank" href="/control/travel-map-apps">지도앱 관리</a>
    <a class="btn" target="_blank" href="/dev/travel-user-bridge">DEV 연결 보기</a>
  </div>
 </div>`;
}

document.getElementById("wrap").innerHTML =
 pages.map((p,i)=>card(p,i)).join("") +
 `<div class="card">
   <div class="head" onclick="toggle('map')">공통 지도앱 관리</div>
   <div class="body" id="map">
    <a class="btn green" target="_blank" href="/control/travel-map-apps">지도앱 신규/수정/삭제/ON-OFF</a>
    <a class="btn" target="_blank" href="/api/travel-map-apps">API 상태 확인</a>
   </div>
 </div>`;
</script>
</body>
</html>
