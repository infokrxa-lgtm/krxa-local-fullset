<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>PATCH24 Mirror Control Right Accordion</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#eef4fb;font-family:Arial,sans-serif;color:#0f172a}
.wrap{padding:16px}
.panel{background:white;border:1px solid #cbd5e1;border-radius:18px;padding:16px}
.grid{display:grid;grid-template-columns:420px 1fr;gap:16px}
.left,.right{background:#f8fafc;border:1px solid #dbe3ee;border-radius:18px;padding:14px;min-height:80vh}
.page{border:1px solid #dbe3ee;border-radius:16px;margin:10px 0;background:white;overflow:hidden}
.head{background:#e2e8f0;padding:10px;font-weight:900;cursor:pointer}
.head.active{background:#2563eb;color:white}
.body{display:none;padding:10px}
.body.open{display:block}
.item{border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin:7px 0;background:white;cursor:pointer}
.item:hover{background:#eff6ff}
.badge{float:right;font-size:12px;color:white;border-radius:999px;padding:3px 8px}
.on{background:#16a34a}
.off{background:#dc2626}
.btn{border:0;border-radius:999px;padding:8px 12px;font-weight:900;cursor:pointer;margin:3px}
.blue{background:#2563eb;color:white}.green{background:#16a34a;color:white}.gray{background:#64748b;color:white}.red{background:#dc2626;color:white}
.group{background:white;border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin:8px 0}
.groupHead{display:flex;justify-content:space-between;gap:8px;align-items:center;cursor:pointer}
.groupBody{display:none;margin-top:10px}
.groupBody.open{display:block}
input{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:12px;margin:5px 0;box-sizing:border-box}
small{color:#64748b}
</style>
</head>
<body>
<div class="wrap">
<div class="panel">
<h2>PATCH24 · 사용자 UI 미러 관제</h2>
<p>좌측은 사용자 UI 기준, 우측은 선택 항목의 하위그룹/작업창/목적지 실행 관리입니다.</p>
<div class="grid">
  <div class="left" id="mirror"></div>
  <div class="right">
    <h2 id="selTitle">선택 없음</h2>
    <p id="selDesc">좌측 항목을 선택하세요.</p>
    <div id="actions"></div>
  </div>
</div>
</div>
</div>

<script>
let DATA=null, OPEN=1, SELECTED=null;
let OPEN_GROUP={};

const PAGE_MAP=[
  {page:1,title:"Discovery Home",items:[
    {id:"gps",title:"GPS/날짜/시간/장소",component:"gps",group:"status",type:"status"},
    {id:"hero",title:"Hero 회전",component:"hero",group:"baekban",type:"accordion"},
    {id:"mini_talk",title:"미니 말대말",component:"m2m_link",group:"connect",type:"m2m"}
  ]},
  {page:2,title:"Quick Action",items:[
    {id:"gps",title:"GPS/위치시간바",component:"gps",group:"status",type:"status"},
    {id:"food_hero",title:"맛집 추천 영역",component:"food",group:"recommend",type:"accordion"},
    {id:"food",title:"식당",component:"food",group:"recommend",type:"accordion"},
    {id:"taxi",title:"교통",component:"taxi",group:"taxi",type:"destination"},
    {id:"route",title:"길찾기",component:"route",group:"destination",type:"destination"},
    {id:"sos",title:"SOS",component:"sos",group:"police",type:"accordion"},
    {id:"mini_talk",title:"미니 말대말",component:"m2m_link",group:"connect",type:"m2m"}
  ]},
  {page:3,title:"Travel Hub",items:[
    {id:"airport",title:"공항/항공",component:"airport",group:"flight_sites",type:"accordion"},
    {id:"hotel",title:"호텔/숙박",component:"hotel",group:"llm_recommend",type:"destination"},
    {id:"food",title:"식당/맛집",component:"food",group:"recommend",type:"accordion"},
    {id:"taxi",title:"교통",component:"taxi",group:"taxi",type:"destination"},
    {id:"route",title:"길찾기",component:"route",group:"destination",type:"destination"},
    {id:"tour",title:"관광",component:"tour",group:"recommend",type:"accordion"},
    {id:"shopping",title:"쇼핑",component:"shopping",group:"recommend",type:"accordion"},
    {id:"music",title:"음악",component:"music",group:"youtube",type:"external"},
    {id:"tv",title:"TV시청",component:"tv",group:"youtube",type:"external"},
    {id:"call",title:"통화",component:"call",group:"phone",type:"accordion"},
    {id:"photo",title:"사진",component:"photo",group:"camera",type:"device"},
    {id:"video",title:"동영상",component:"video",group:"camera",type:"device"}
  ]},
  {page:4,title:"Detail Result",items:[
    {id:"detail_list",title:"상세 결과 리스트",component:"detail_list",group:"result_list",type:"accordion"},
    {id:"map",title:"지도",component:"route",group:"map_apps",type:"destination"},
    {id:"reservation",title:"예약/사이트",component:"hotel",group:"default_sites",type:"accordion"},
    {id:"phone",title:"전화",component:"call",group:"phone",type:"accordion"},
    {id:"mini_talk",title:"말하기 연결",component:"m2m_link",group:"connect",type:"m2m"}
  ]},
  {page:5,title:"말대말 통역",items:[
    {id:"m2m_link",title:"말대말 연결",component:"m2m_link",group:"connect",type:"m2m"},
    {id:"language",title:"언어 설정",component:"m2m_link",group:"language",type:"m2m"},
    {id:"mic",title:"마이크",component:"m2m_link",group:"mic",type:"m2m"},
    {id:"text",title:"텍스트 입력",component:"m2m_link",group:"text",type:"m2m"}
  ]},
  {page:6,title:"통화/메신저",items:[
    {id:"phone",title:"전화",component:"call",group:"phone",type:"accordion"},
    {id:"whatsapp",title:"WhatsApp",component:"call",group:"whatsapp",type:"accordion"},
    {id:"wechat",title:"WeChat",component:"call",group:"wechat",type:"accordion"},
    {id:"user_contacts",title:"사용자 연락처",component:"call",group:"user_contacts",type:"user_device"}
  ]},
  {page:7,title:"사용내역/기억",items:[
    {id:"recent_translate",title:"최근 통역",component:"memory_loop",group:"recent_translate",type:"history"},
    {id:"recent_travel",title:"최근 여행",component:"memory_loop",group:"recent_travel",type:"history"},
    {id:"memory_loop",title:"KRXA 기억 루프",component:"memory_loop",group:"memory_loop",type:"history"},
    {id:"clear_history",title:"사용내역 초기화",component:"memory_loop",group:"clear_history",type:"device"}
  ]},
  {page:8,title:"SOS",items:[
    {id:"police",title:"경찰",component:"sos",group:"police",type:"accordion"},
    {id:"emergency",title:"구급",component:"sos",group:"emergency",type:"accordion"},
    {id:"hospital",title:"병원",component:"sos",group:"hospital",type:"accordion"},
    {id:"embassy",title:"대사관",component:"sos",group:"embassy",type:"accordion"},
    {id:"insurance",title:"보험",component:"sos",group:"insurance",type:"accordion"},
    {id:"offline_phrase",title:"오프라인 생존문장",component:"sos",group:"offline_phrase",type:"accordion"}
  ]}
];

const DEFAULT_GROUPS={
  hero:[
    ["baekban","허영만 백반기행"],
    ["festival","지역축제"],
    ["near_food","주변맛집"],
    ["near_tour","주변관광지"]
  ],
  food:[
    ["recommend","추천리스트"],
    ["baekban","허영만 백반기행"],
    ["user_saved","사용자 등록 맛집"],
    ["route","식당 길찾기"]
  ],
  hotel:[
    ["llm_recommend","LLM 추천리스트"],
    ["default_sites","기본 예약사이트"],
    ["user_saved","사용자 등록 호텔"],
    ["route","호텔 길찾기"],
    ["phone","호텔 전화"]
  ],
  route:[
    ["destination","목적지 입력"],
    ["google_recommend","Google 추천경로"],
    ["map_apps","지도앱 선택"]
  ],
  taxi:[
    ["taxi","택시"],
    ["bus","버스"],
    ["subway","지하철"],
    ["map_apps","지도앱 선택"]
  ],
  airport:[
    ["flight_sites","항공권 사이트"],
    ["airport_info","공항 정보"],
    ["route","공항 길찾기"]
  ],
  tour:[
    ["recommend","추천 관광지"],
    ["festival","지역축제"],
    ["user_saved","사용자 관광지"],
    ["route","관광지 길찾기"]
  ],
  shopping:[
    ["recommend","추천 쇼핑"],
    ["site","쇼핑 사이트"],
    ["user_saved","사용자 쇼핑"],
    ["route","쇼핑 길찾기"]
  ],
  call:[
    ["phone","전화"],
    ["whatsapp","WhatsApp"],
    ["wechat","WeChat"],
    ["user_contacts","사용자 연락처"]
  ],
  sos:[
    ["police","경찰"],
    ["emergency","구급"],
    ["hospital","병원"],
    ["embassy","대사관"],
    ["insurance","보험"],
    ["offline_phrase","오프라인 문장"]
  ],
  m2m_link:[
    ["connect","연결"],
    ["language","언어 설정"],
    ["mic","마이크"],
    ["text","텍스트 입력"]
  ]
};

async function api(path,opt={}){
  const r=await fetch(path,{headers:{"Content-Type":"application/json"},...opt});
  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}

async function load(){
  const d=await api('/api/patch17/control-first?ts='+Date.now());
  DATA=d.data||{};
  normalize();
  render();
}

function normalize(){
  DATA.components=DATA.components||{};
  Object.keys(DEFAULT_GROUPS).forEach(cid=>{
    const c=DATA.components[cid] ||= {title:cid,enabled:true,groups:[]};
    c.groups=c.groups||[];
    DEFAULT_GROUPS[cid].forEach(([gid,title])=>{
      let g=c.groups.find(x=>x.id===gid);
      if(!g){
        g={id:gid,title,enabled:true,items:[]};
        c.groups.push(g);
      }
    });
  });

  const hotel=DATA.components.hotel;
  const llm=hotel.groups.find(g=>g.id==="llm_recommend");
  if(llm && (!llm.items || llm.items.length===0)){
    llm.items=[
      {name:"목적지 기반 호텔 추천",area:"사용자 입력",category:"LLM",url:"https://www.google.com/travel/hotels",action_type:"url",enabled:true}
    ];
  }
}

function comp(cid){return DATA.components&&DATA.components[cid]}
function group(cid,gid){const c=comp(cid);return c&&c.groups?c.groups.find(g=>g.id===gid):null}

function isOn(it){
  if(it.type==="status") return true;
  const c=comp(it.component);
  const g=group(it.component,it.group);
  if(c && c.enabled===false) return false;
  if(g && g.enabled===false) return false;
  return true;
}

function render(){
  const box=document.getElementById("mirror");
  box.innerHTML="";
  PAGE_MAP.forEach(p=>{
    const pg=document.createElement("div");
    pg.className="page";

    const head=document.createElement("div");
    head.className="head "+(OPEN===p.page?"active":"");
    head.textContent="PAGE "+p.page+" · "+p.title;
    head.onclick=()=>{OPEN=OPEN===p.page?0:p.page;render();};

    const body=document.createElement("div");
    body.className="body "+(OPEN===p.page?"open":"");
    p.items.forEach(it=>{
      const row=document.createElement("div");
      row.className="item";
      row.innerHTML=`<b>${it.title}</b><span class="badge ${isOn(it)?'on':'off'}">${isOn(it)?'ON':'OFF'}</span><br><small>${it.component} / ${it.group}</small>`;
      row.onclick=()=>selectItem(p,it);

      const badge=row.querySelector(".badge");
      badge.onclick=(e)=>{
        e.stopPropagation();
        toggleItemOnOff(it);
      };

      body.appendChild(row);
    });

    pg.appendChild(head);
    pg.appendChild(body);
    box.appendChild(pg);
  });
}

function toggleItemOnOff(it){
  if(it.type==="status"){
    alert("GPS/시간/장소는 자동 확인 항목입니다.");
    return;
  }
  const g=ensureGroup(it.component,it.group,it.title);
  g.enabled=!(g.enabled!==false);
  save(false);
  render();
  if(SELECTED && SELECTED.item.id===it.id) selectItem(SELECTED.page,it);
}

function ensureGroup(cid,gid,title){
  DATA.components=DATA.components||{};
  const c=DATA.components[cid] ||= {title:cid,enabled:true,groups:[]};
  c.groups=c.groups||[];
  let g=c.groups.find(x=>x.id===gid);
  if(!g){
    g={id:gid,title:title||gid,enabled:true,items:[]};
    c.groups.push(g);
  }
  return g;
}

function selectItem(page,it){
  SELECTED={page,item:it};
  document.getElementById("selTitle").textContent="PAGE "+page.page+" · "+it.title;
  document.getElementById("selDesc").textContent=descFor(it);
  renderRight(it);
}

function descFor(it){
  if(it.type==="status") return "사용자 기기 자동값입니다. 정상 작동 여부만 확인합니다.";
  if(it.type==="m2m") return "말대말 엔진은 기존 기능 유지, 연결/표시 상태만 관리합니다.";
  if(it.type==="destination") return "목적지를 입력하고 현재위치↔목적지 Google Maps DIR 추천방식으로 실행합니다.";
  return "하위그룹을 펼쳐 ON/OFF 및 기존 작업창으로 관리합니다.";
}

function renderRight(it){
  const box=document.getElementById("actions");
  if(it.type==="status"){
    box.innerHTML=`
      <div class="group"><b>GPS/날짜/시간/장소 확인</b><div id="gpsBox">확인 대기</div>
      <button class="btn blue" onclick="checkGps()">새로고침</button>
      <button class="btn gray" onclick="openUser()">사용자 화면 확인</button></div>`;
    checkGps();
    return;
  }

  let html=`
    <button class="btn ${isOn(it)?'green':'red'}" onclick="toggleItemOnOff(SELECTED.item)">${isOn(it)?'ON':'OFF'} 전환</button>
    <button class="btn gray" onclick="openUser()">사용자 화면 확인</button>
    <button class="btn green" onclick="save(true)">완료 / USER 반영</button>
  `;

  if(it.type==="destination"){
    html += destinationPanel(it);
  }

  html += accordionPanel(it);

  box.innerHTML=html;
}

function accordionPanel(it){
  const groups=(comp(it.component)?.groups||[]);
  if(!groups.length) return "";
  return groups.map(g=>{
    const key=it.component+"_"+g.id;
    const open=OPEN_GROUP[key]===true;
    return `
    <div class="group">
      <div class="groupHead" onclick="toggleGroupOpen('${key}')">
        <b>${g.title}</b>
        <span>
          <button class="btn ${g.enabled!==false?'green':'red'}" onclick="event.stopPropagation();toggleGroupOnOff('${it.component}','${g.id}')">${g.enabled!==false?'ON':'OFF'}</button>
          <button class="btn blue" onclick="event.stopPropagation();openWorkspace('${it.component}','${g.id}')">작업창</button>
        </span>
      </div>
      <div class="groupBody ${open?'open':''}">
        <small>${(g.items||[]).length}개 항목 · 클릭하면 접힘/펼침</small>
      </div>
    </div>`;
  }).join("");
}

function destinationPanel(it){
  return `
  <div class="group">
    <b>목적지 입력 테스트</b>
    <input id="destInput" placeholder="예: 부산 해운대 / 인천공항 / 호텔명">
    <button class="btn blue" onclick="openDirFromInput()">현재위치 ↔ 목적지 지도열기</button>
  </div>`;
}

function toggleGroupOpen(key){
  OPEN_GROUP[key]=!OPEN_GROUP[key];
  renderRight(SELECTED.item);
}

function toggleGroupOnOff(cid,gid){
  const g=ensureGroup(cid,gid,gid);
  g.enabled=!(g.enabled!==false);
  save(false);
  render();
  renderRight(SELECTED.item);
}

function openWorkspace(component,group){
  let url="/control/patch17-workspace?component="+encodeURIComponent(component)+"&group="+encodeURIComponent(group);
  if(component==="hero") url="/ui/patch22_hero_rotation_workspace.html?component=hero&group="+encodeURIComponent(group);
  window.open(url,"_blank");
}

function openUser(){
  window.open("/travel-v1","_blank");
}

async function save(alertOn){
  const d=await api("/api/patch17/control-first/save",{method:"POST",body:JSON.stringify(DATA)});
  DATA=d.data;
  normalize();
  if(alertOn) alert("저장 완료 / USER 반영");
}

function checkGps(){
  const box=document.getElementById("gpsBox");
  if(!box) return;
  const now=new Date().toLocaleString();
  if(!navigator.geolocation){
    box.innerHTML="시간: "+now+"<br>GPS 지원 안 됨";
    return;
  }
  navigator.geolocation.getCurrentPosition(p=>{
    box.innerHTML="시간: "+now+"<br>GPS 정상<br>위도: "+p.coords.latitude+"<br>경도: "+p.coords.longitude+"<br>정확도: "+p.coords.accuracy+"m";
  },e=>{
    box.innerHTML="시간: "+now+"<br>GPS 오류/권한 필요: "+e.message;
  },{enableHighAccuracy:true,timeout:8000});
}

function getOrigin(){
  return new Promise((res,rej)=>{
    if(!navigator.geolocation) return rej();
    navigator.geolocation.getCurrentPosition(p=>res(p.coords.latitude+","+p.coords.longitude),rej,{enableHighAccuracy:true,timeout:8000});
  });
}

async function openDirFromInput(){
  const v=document.getElementById("destInput")?.value.trim();
  if(!v){alert("목적지를 입력하세요.");return;}
  let origin="";
  try{origin=await getOrigin();}catch(e){}
  window.open("https://www.google.com/maps/dir/"+encodeURIComponent(origin)+"/"+encodeURIComponent(v),"_blank");
}

load();
</script>
</body>
</html>
