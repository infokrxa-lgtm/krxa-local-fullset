
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>KRXA Travel V1 Admin Action Flow Editor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#eef4fb;color:#0f172a;font-family:Arial,sans-serif}
.wrap{padding:18px}
.panel{background:white;border:1px solid #cbd5e1;border-radius:18px;padding:18px}
.grid{display:grid;grid-template-columns:360px 1fr;gap:18px}
.page{margin:8px 0;border-radius:14px;overflow:hidden;border:1px solid #dbe3ee}
.head{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#e2e8f0;font-weight:900;cursor:pointer}
.head.active{background:#2563eb;color:white}
.items{display:none;padding:8px;background:#f8fafc}
.items.open{display:block}
.item{display:flex;justify-content:space-between;align-items:center;padding:10px;margin:6px 0;border:1px solid #e2e8f0;border-radius:10px;background:white;cursor:pointer}
.item.active{background:#dbeafe}
.btn{border:0;border-radius:999px;padding:7px 12px;font-weight:900;cursor:pointer}
.on{background:#16a34a;color:white}.off{background:#dc2626;color:white}.blue{background:#2563eb;color:white}.gray{background:#64748b;color:white}.red{background:#dc2626;color:white}
.right{background:#f8fafc;border:1px solid #cbd5e1;border-radius:16px;padding:18px;min-height:620px}
.row{display:grid;grid-template-columns:170px 1fr;gap:10px;margin:8px 0;align-items:center}
input,select{padding:10px;border:1px solid #cbd5e1;border-radius:10px;font-size:15px;width:100%}
.step{display:grid;grid-template-columns:1fr 80px 80px;gap:8px;padding:9px;border-bottom:1px solid #e5e7eb;align-items:center}
.toolbar{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h2>관리자 · 실행흐름 편집기 PATCH 15</h2>
    <p>좌측에서 사용자 페이지/클릭바를 선택하고, 우측에서 구성요소·실행흐름·ON/OFF·신규·수정·삭제를 관리합니다.</p>
    <div class="grid">
      <div>
        <div id="left"></div>
        <button class="btn blue" onclick="addPage()">+ 새 페이지</button>
      </div>
      <div>
        <h2 id="title">선택 없음</h2>
        <div id="right" class="right">좌측에서 항목을 선택하세요.</div>
      </div>
    </div>
  </div>
</div>

<script>
let CFG={pages:[]}, OPEN=0, SEL_PAGE=null, SEL_ITEM=null;

async function load(){
  const r=await fetch('/api/admin-dynamic-bars?ts='+Date.now());
  const d=await r.json();
  CFG=d.config||{version:'dynamic_bar_v1',pages:[]};
  render();
  detail();
}

function render(){
  const left=document.getElementById('left');
  left.innerHTML='';
  (CFG.pages||[]).forEach((p,pi)=>{
    const box=document.createElement('div');
    box.className='page';
    const head=document.createElement('div');
    head.className='head '+(OPEN===pi?'active':'');
    head.innerHTML=`<span>${p.title||p.id}</span><button class="btn ${p.enabled!==false?'on':'off'}">${p.enabled!==false?'ON':'OFF'}</button>`;
    head.onclick=()=>{OPEN=OPEN===pi?null:pi;SEL_PAGE=pi;SEL_ITEM=null;render();detail();};
    head.querySelector('button').onclick=(e)=>{e.stopPropagation();p.enabled=!(p.enabled!==false);render();detail();};

    const items=document.createElement('div');
    items.className='items '+(OPEN===pi?'open':'');
    (p.items||[]).forEach((it,ii)=>{
      const row=document.createElement('div');
      row.className='item '+(SEL_PAGE===pi&&SEL_ITEM===ii?'active':'');
      row.innerHTML=`<span>${it.icon||''} ${it.title||it.id}</span><button class="btn ${it.enabled!==false?'on':'off'}">${it.enabled!==false?'ON':'OFF'}</button>`;
      row.onclick=()=>{SEL_PAGE=pi;SEL_ITEM=ii;render();detail();};
      row.querySelector('button').onclick=(e)=>{e.stopPropagation();it.enabled=!(it.enabled!==false);render();detail();};
      items.appendChild(row);
    });
    box.appendChild(head); box.appendChild(items); left.appendChild(box);
  });
}

function defaultFlow(it){
  const id=it.id||'';
  if(['hotel','food','restaurant','tour','shopping'].includes(id)){
    return {steps:[
      {id:'default_sites',title:'기본 사이트 등록',enabled:true},
      {id:'user_links',title:'사용자 등록/삭제',enabled:true},
      {id:'destination',title:'목적지 입력',enabled:true},
      {id:'map_route',title:'현재위치 → 목적지 지도연결',enabled:true}
    ]};
  }
  if(['transport','route'].includes(id)){
    return {steps:[
      {id:'destination',title:'목적지 입력',enabled:true},
      {id:'map_app',title:'지도앱 선택',enabled:true},
      {id:'route',title:'길찾기',enabled:true}
    ]};
  }
  if(id==='hero'){
    return {steps:[
      {id:'hero_baekban',title:'허영만 백반기행',enabled:true},
      {id:'hero_tour',title:'주변 관광지',enabled:true},
      {id:'place_list',title:'장소 리스트 관리',enabled:true}
    ]};
  }
  return {steps:[{id:'click',title:'사용자 클릭',enabled:true},{id:'action',title:'실행 연결',enabled:true}]};
}

function detail(){
  const t=document.getElementById('title'), r=document.getElementById('right');
  if(SEL_PAGE===null){t.textContent='선택 없음';r.textContent='좌측에서 항목을 선택하세요.';return;}
  const p=CFG.pages[SEL_PAGE];

  if(SEL_ITEM===null){
    t.textContent=p.title||p.id;
    r.innerHTML=`
      <h3>페이지 관리</h3>
      <div class="row"><b>페이지명</b><input id="p_title" value="${p.title||''}"></div>
      <div class="row"><b>상태</b><button class="btn ${p.enabled!==false?'on':'off'}" onclick="togglePage()">${p.enabled!==false?'ON':'OFF'}</button></div>
      <div class="toolbar">
        <button class="btn blue" onclick="addBar()">+ 신규바 추가</button>
        <button class="btn gray" onclick="applyPage()">수정 반영</button>
        <button class="btn red" onclick="deletePage()">페이지 삭제</button>
        <button class="btn on" onclick="save()">완료 / USER 반영</button>
      </div>`;
    return;
  }

  const it=p.items[SEL_ITEM];
  it.action=it.action||{kind:'none'};
  it.flow=it.flow||defaultFlow(it);
  t.textContent=(p.title||p.id)+' · '+(it.title||it.id);

  r.innerHTML=`
    <h3>클릭바 관리</h3>
    <div class="row"><b>ID</b><input id="i_id" value="${it.id||''}"></div>
    <div class="row"><b>표시명</b><input id="i_title" value="${it.title||''}"></div>
    <div class="row"><b>아이콘</b><input id="i_icon" value="${it.icon||''}"></div>
    <div class="row"><b>USER 자동 생성</b><input type="checkbox" id="i_dynamic" ${it.dynamic?'checked':''}></div>
    <div class="row"><b>ON/OFF</b><input type="checkbox" id="i_enabled" ${it.enabled!==false?'checked':''}></div>

    <h3>실행 설정</h3>
    <div class="row"><b>실행종류</b>
      <select id="a_kind">${['none','url','page','map','recommend','workspace','call'].map(k=>`<option value="${k}" ${it.action.kind===k?'selected':''}>${k}</option>`).join('')}</select>
    </div>
    <div class="row"><b>실행값</b><input id="a_value" value="${it.action.url||it.action.value||it.action.page||''}"></div>

    <h3>구성요소 / 중간단계</h3>
    <div id="steps">${(it.flow.steps||[]).map((s,i)=>`
      <div class="step">
        <span>${s.title}</span>
        <button class="btn ${s.enabled!==false?'on':'off'}" onclick="toggleStep(${i})">${s.enabled!==false?'ON':'OFF'}</button>
        <button class="btn gray" onclick="editStep(${i})">수정</button>
      </div>`).join('')}</div>

    <div class="toolbar">
      <button class="btn blue" onclick="addStep()">+ 단계 추가</button>
      <button class="btn gray" onclick="applyItem()">수정 반영</button>
      <button class="btn red" onclick="deleteItem()">삭제</button>
      <button class="btn on" onclick="save()">완료 / USER 반영</button>
    </div>`;
}

function togglePage(){CFG.pages[SEL_PAGE].enabled=!(CFG.pages[SEL_PAGE].enabled!==false);render();detail();}
function applyPage(){CFG.pages[SEL_PAGE].title=document.getElementById('p_title').value;render();detail();}
function deletePage(){if(confirm('페이지 삭제?')){CFG.pages.splice(SEL_PAGE,1);SEL_PAGE=null;SEL_ITEM=null;render();detail();}}
function addPage(){CFG.pages.push({id:'page_'+Date.now(),title:'새 사용자 UI',enabled:true,items:[]});OPEN=CFG.pages.length-1;SEL_PAGE=OPEN;SEL_ITEM=null;render();detail();}
function addBar(){if(SEL_PAGE===null)return;CFG.pages[SEL_PAGE].items.push({id:'bar_'+Date.now(),title:'신규바',icon:'🔹',enabled:true,dynamic:true,action:{kind:'none'},flow:{steps:[]}});SEL_ITEM=CFG.pages[SEL_PAGE].items.length-1;render();detail();}
function applyItem(){
  const it=CFG.pages[SEL_PAGE].items[SEL_ITEM];
  it.id=document.getElementById('i_id').value.trim();
  it.title=document.getElementById('i_title').value.trim();
  it.icon=document.getElementById('i_icon').value.trim();
  it.dynamic=document.getElementById('i_dynamic').checked;
  it.enabled=document.getElementById('i_enabled').checked;
  const k=document.getElementById('a_kind').value, v=document.getElementById('a_value').value.trim();
  it.action={kind:k};
  if(k==='url'||k==='workspace')it.action.url=v;
  else if(k==='page')it.action.page=v;
  else it.action.value=v;
  it.flow=it.flow||defaultFlow(it);
  render();detail();
}
function deleteItem(){if(confirm('클릭바 삭제?')){CFG.pages[SEL_PAGE].items.splice(SEL_ITEM,1);SEL_ITEM=null;render();detail();}}
function toggleStep(i){const it=CFG.pages[SEL_PAGE].items[SEL_ITEM];it.flow.steps[i].enabled=!(it.flow.steps[i].enabled!==false);detail();}
function editStep(i){const s=CFG.pages[SEL_PAGE].items[SEL_ITEM].flow.steps[i];s.title=prompt('단계명',s.title)||s.title;s.id=prompt('단계 ID',s.id)||s.id;detail();}
function addStep(){const it=CFG.pages[SEL_PAGE].items[SEL_ITEM];it.flow=it.flow||{steps:[]};const title=prompt('단계명');if(title){it.flow.steps.push({id:'step_'+Date.now(),title,enabled:true});detail();}}
async function save(){if(SEL_ITEM!==null && document.getElementById('i_id'))applyItem();if(SEL_ITEM===null && document.getElementById('p_title'))applyPage();const res=await fetch('/api/admin-dynamic-bars/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(CFG)});const d=await res.json();CFG=d.config;alert('저장 완료 / USER 반영');render();detail();}
load();
</script>
</body>
</html>
