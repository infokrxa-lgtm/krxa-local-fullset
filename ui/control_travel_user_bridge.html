<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>KRXA Travel USER ↔ CONTROL Bridge</title>
<style>
body{font-family:Arial,sans-serif;background:#f8fafc;margin:0;padding:18px;color:#0f172a}
h2{margin-top:0}.card{background:white;border-radius:16px;padding:14px;margin:10px 0;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.head{cursor:pointer;font-weight:800;padding:10px;border-radius:12px;background:#e2e8f0}
.body{display:none;padding:10px 4px}
button,a.btn{display:block;text-decoration:none;text-align:center;border:0;border-radius:10px;padding:10px;margin:8px 0;background:#2563eb;color:white;font-weight:700}
.green{background:#16a34a!important}.gray{background:#64748b!important}
</style>
</head>
<body>
<h2>CONTROL · USER 1~8페이지 연결 관리</h2>
<p>기존 관제 구조는 유지하고, 사용자 1~8페이지 상태/연결 관리만 얹습니다. 한 번 클릭 열림, 다시 클릭 닫힘.</p>

<div id="wrap"></div>

<script>
const pages=[
 ["1페이지 홈/Hero","/travel-v1","허영만/추천 Hero, GPS 상단, 기본 진입"],
 ["2페이지 실행허브","/travel-v1","회전 추천, 여행 실행 허브"],
 ["3페이지 서비스카드","/travel-v1","공항/호텔/식당/교통/길찾기/관광/쇼핑/음악/TV/통화/사진/동영상"],
 ["4페이지 말대말","/travel-v1","통역/대화 엔진 연결"],
 ["5페이지 기록/히스토리","/travel-v1","사용자 흐름 기록"],
 ["6페이지 즐겨찾기","/travel-v1","사용자 등록/삭제 흐름"],
 ["7페이지 SOS","/travel-v1","긴급/현지 도움"],
 ["8페이지 설정","/travel-v1","사용자 설정/사이트 관리"]
];

function card(title,url,desc,i){
 const id="p"+i;
 return `<div class="card">
   <div class="head" onclick="toggle('${id}')">${title}</div>
   <div class="body" id="${id}">
     <p>${desc}</p>
     <a class="btn green" target="_blank" href="${url}">사용자 화면 열기</a>
     <a class="btn" target="_blank" href="/control/travel-map-apps">지도앱 관리</a>
     <button class="gray" onclick="alert('관제 체크: ${title}')">상태 체크</button>
   </div>
 </div>`;
}
function toggle(id){
 const el=document.getElementById(id);
 el.style.display = el.style.display==="block" ? "none" : "block";
}
document.getElementById("wrap").innerHTML =
 pages.map((p,i)=>card(p[0],p[1],p[2],i)).join("") +
 `<div class="card">
   <div class="head" onclick="toggle('map')">지도앱 관리 / 승인</div>
   <div class="body" id="map">
     <a class="btn green" target="_blank" href="/control/travel-map-apps">CONTROL 지도앱 관리 열기</a>
     <a class="btn" target="_blank" href="/api/travel-map-apps">API 상태 확인</a>
   </div>
 </div>`;
</script>
</body>
</html>
