<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><title>DEV GPS Time Place</title><style>body{margin:0;background:#0f172a;color:white;font-family:Arial;padding:22px}.card{background:#1e293b;border-radius:18px;padding:16px;margin-bottom:14px}button{border:0;border-radius:10px;padding:10px 14px;margin:4px;background:#2563eb;color:white;font-weight:bold;cursor:pointer}.gray{background:#64748b}pre{background:#020617;border-radius:12px;padding:12px;white-space:pre-wrap;max-height:420px;overflow:auto}</style></head><body><h1>DEV · GPS / 날짜 / 시간 / 장소 검증</h1><div class="card"><button onclick="runCheck()">검증 새로고침</button><button class="gray" onclick="window.open('/control/travel-context','_blank')">CONTROL 설정</button><button class="gray" onclick="window.open('/travel-v1','_blank')">USER 확인</button><button class="gray" onclick="window.open('/dev','_blank')">기존 DEV 코드/프로그램</button></div><div class="card"><h2>검증 결과</h2><pre id="result">대기</pre></div><script>async function runCheck(){const state=await(await fetch('/api/travel-context-state')).json();const checks=[];checks.push('API /api/travel-context-state: OK');checks.push('mode: '+state.mode);checks.push('display: '+JSON.stringify(state.display));checks.push('internal: '+JSON.stringify(state.internal));checks.push('DEV 역할: 연결 상태/데이터/표시값 검증');result.textContent=checks.join('\n')+'\n\nRAW:\n'+JSON.stringify(state,null,2)}runCheck();</script></body></html>
