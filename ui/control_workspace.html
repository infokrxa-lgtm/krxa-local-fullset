<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRXA PC Control Workspace</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial,sans-serif}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.side{background:#020617;padding:18px;border-right:1px solid #334155}
.main{padding:18px}
button{width:100%;padding:12px;margin:6px 0;border:0;border-radius:10px;font-weight:bold;cursor:pointer}
.mode{background:#2563eb;color:white}.on{background:#16a34a;color:white}.off{background:#dc2626;color:white}
.card{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
input,select,textarea{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:0}
pre{background:#020617;color:#d1fae5;padding:12px;border-radius:10px;white-space:pre-wrap;max-height:420px;overflow:auto}
.small{font-size:13px;color:#cbd5e1}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<div class="app">
  <div class="side">
    <h2>KRXA PC WORKSPACE</h2>
    <p class="small">관제 + DEV 통합 작업실</p>
    <button class="mode" onclick="showPanel('dashboard')">대시보드</button>
    <button class="mode" onclick="showPanel('opTravel')">Travel 추천장소</button>
    <button class="mode" onclick="showPanel('opHero')">Hero 카드</button>
    <button class="mode" onclick="showPanel('opCandidates')">추천 후보 승인</button>
    <button class="mode" onclick="showPanel('opLinks')">서비스 링크</button>
    <button class="mode" onclick="showPanel('opMapDb')">KRXA Map DB</button>
    <button class="mode" onclick="showPanel('opResearch')">시장조사 엔진</button>
    <button class="mode" onclick="showPanel('opResearchList')">시장조사 리스트</button>
    <button class="mode" onclick="window.open('/dev/workspace','_blank')">DEV 작업</button>
    <button class="mode" onclick="window.open('/travel-v1','_blank')">Travel V1 열기</button>
    <button class="mode" onclick="window.open('/api/state','_blank')">STATE JSON</button>
  </div>

  <div class="main">
    <div id="panel"></div>
  </div>
</div>

<script>
function panel(html){document.getElementById("panel").innerHTML=html;}

function showPanel(name){
  if(name==="opTravel") return opMenu("Travel 추천장소", "travel");
  if(name==="opHero") return opMenu("Hero 카드", "hero");
  if(name==="opCandidates") return opMenu("추천 후보 승인", "candidate");
  if(name==="opLinks") return opMenu("서비스 링크", "links");
  if(name==="opMapDb") return opMenu("KRXA Map DB", "mapdb");
  if(name==="opResearch") return opMenu("시장조사 엔진", "research");
  if(name==="opResearchList") return opResearchList();

  if(name==="dashboard") return dashboard();
  if(name==="travelDiscovery") return travelDiscovery();
  if(name==="heroCards") return heroCards();
  if(name==="candidateFeed") return candidateFeed();
  if(name==="serviceLinks") return serviceLinks();
  if(name==="mapDb") return mapDbPanel();
  if(name==="marketResearch") return marketResearchPanel();
  if(name==="researchFeed") return researchFeedPanel();
  if(name==="dev") return devPanel();
}


function opMenu(title, type){

    <div class="card">
      <h2>${title}</h2>
      <p class="small">운영형 리스트 화면입니다. 세부 작업은 새창에서 진행합니다.</p>
      <div class="grid">
        <div class="card">
          <h3>허영만 백반기행</h3>
          <p>실제 시장조사 장소 리스트</p>
          <button class="mode" onclick="window.open('/control/branch?type=baekban','_blank')">작업창 열기</button>
        </div>
        <div class="card">
          <h3>백종원 추천 맛집</h3>
          <p>방송/골목식당/추천 장소</p>
          <button class="mode" onclick="window.open('/control/branch?type=baekjongwon','_blank')">작업창 열기</button>
        </div>
        <div class="card">
          <h3>유튜브 맛집</h3>
          <p>유튜브 기반 검증 장소</p>
          <button class="mode" onclick="window.open('/control/branch?type=youtube_food','_blank')">작업창 열기</button>
        </div>
        <div class="card">
          <h3>지역 축제</h3>
          <p>한국관광공사/지자체 기반 축제</p>
          <button class="mode" onclick="window.open('/control/branch?type=festival','_blank')">작업창 열기</button>
        </div>
        <div class="card">
          <h3>뉴스 관광지</h3>
          <p>뉴스/관광공사 기반 관광지</p>
          <button class="mode" onclick="window.open('/control/branch?type=news_tour','_blank')">작업창 열기</button>
        </div>
      </div>
    </div>
  `);
}

function opResearchList(){
  panel(`
    <div class="card">
      <h2>시장조사 리스트</h2>
      <p class="small">KRXA가 조사한 실제 장소 리스트입니다. 각 항목은 새 작업창에서 관리합니다.</p>
      <button class="mode" onclick="loadResearchFeedSummary()">전체 리스트 불러오기</button>
      <div id="researchFeedSummary" class="grid"></div>
      <pre id="researchFeedRaw">로드 전</pre>
    </div>
  `);
}

async function loadResearchFeedSummary(){
  const r = await fetch("/api/market-research-feed");
  const d = await r.json();
  const box = document.getElementById("researchFeedSummary");
  const raw = document.getElementById("researchFeedRaw");
  raw.innerText = JSON.stringify(d, null, 2);

  const categories = d.categories || [];
  const items = d.items || [];

  let html = "";
  categories.forEach(c=>{
    const count = items.filter(x=>x.category===c.id && x.status!=="deleted").length;
    html += `
      <div class="card">
        <h3>${c.title}</h3>
        <p>등록 장소: ${count}개</p>
        <p>상태: ${c.status}</p>
        <button class="mode" onclick="window.open('/control/branch?type=${c.id}','_blank')">작업창 열기</button>
      </div>
    `;
  });

  box.innerHTML = html || "<div class='card'>시장조사 리스트 없음</div>";
}

  panel(`

      <div class="card"><b>Service Links</b><p>항공권·지도·교통 사이트 관리</p></div>
    </div></div>

function heroCards(){
  panel(`
    <div class="card"><h2>0페이지 Hero 카드 관리</h2>
    <p class="small">0페이지 Discovery Hero에서 회전 표시될 카드를 등록/수정/삭제합니다.</p>

}

function getHeroCardForm(){
  return {
    id: document.getElementById("heroId").value,
    title: document.getElementById("heroTitle").value,
    subtitle: document.getElementById("heroSubtitle").value,
    source: document.getElementById("heroSource").value,
    keyword: document.getElementById("heroKeyword").value,
    map_keyword: document.getElementById("heroMapKeyword").value,
    linked_group: document.getElementById("heroGroup").value,
    status: "active"
  };
}

async function loadHeroCards(){
  const r = await fetch("/api/travel-hero-cards");
  const d = await r.json();
  document.getElementById("heroCardBox").innerText = JSON.stringify(d, null, 2);
}

async function createHeroCard(){
  const r = await fetch("/api/travel-hero-cards/create", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(getHeroCardForm())
  });
  document.getElementById("heroCardBox").innerText = JSON.stringify(await r.json(), null, 2);
}

async function updateHeroCard(){
  const body = getHeroCardForm();
  if(!body.id){ alert("수정할 hero id를 입력하세요."); return; }

  const r = await fetch("/api/travel-hero-cards/update", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  document.getElementById("heroCardBox").innerText = JSON.stringify(await r.json(), null, 2);
}

async function deleteHeroCard(){
  const id = document.getElementById("heroDeleteId").value;
  if(!id){ alert("삭제할 hero id를 입력하세요."); return; }

  const r = await fetch("/api/travel-hero-cards/delete", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({id:id})
  });
  document.getElementById("heroCardBox").innerText = JSON.stringify(await r.json(), null, 2);
}

function candidateFeed(){

async function loadCandidates(){
  const r=await fetch("/api/travel-discovery-candidates"); const d=await r.json();

  (d.items||[]).forEach(x=>{
    html += `ID: ${x.id}\n제목: ${x.title}\n상태: ${x.status}\n\n`;
  });
  document.getElementById("candidateBox").innerText=html||"후보 없음";
}

function marketResearchPanel(){
  panel(`
    <div class="card"><h2>KRXA 시장조사 엔진</h2>

async function runMarketResearch(){
  const r = await fetch("/api/market-research/run", {

    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(getMarketResearchForm())
  });
  document.getElementById("marketResearchBox").innerText =
    JSON.stringify(await r.json(), null, 2);
}
