<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><title>CONTROL GPS Time Place</title><style>body{margin:0;background:#0f172a;color:white;font-family:Arial;padding:22px}.card{background:#1e293b;border-radius:18px;padding:16px;margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}input,select,textarea{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:0;box-sizing:border-box}button{border:0;border-radius:10px;padding:10px 14px;margin:4px;background:#2563eb;color:white;font-weight:bold;cursor:pointer}.green{background:#16a34a}.gray{background:#64748b}pre{background:#020617;border-radius:12px;padding:12px;white-space:pre-wrap;max-height:360px;overflow:auto}</style></head><body><h1>CONTROL · GPS / 날짜 / 시간 / 장소 Sync v1</h1><div class="card">USER UI는 기준 화면입니다. CONTROL은 표시 설정만 관리합니다.</div><div class="grid"><div class="card"><h2>USER 표시 설정</h2><label>모드</label><select id="mode"><option value="auto">auto: 사용자 기기 기준</option><option value="control">control: 관제 테스트값 우선</option></select><label>GPS</label><input id="gps"><label>날짜</label><input id="date"><label>시간</label><input id="time"><label>장소</label><input id="place"><label>언어</label><input id="language"><button class="green" onclick="saveState()">저장/USER 반영</button><button onclick="loadState()">새로고침</button><button class="gray" onclick="window.open('/travel-v1','_blank')">USER 확인</button><button class="gray" onclick="window.open('/dev/travel-context','_blank')">DEV 검증</button></div><div class="card"><h2>내부 참고 데이터</h2><label>lat</label><input id="lat"><label>lng</label><input id="lng"><label>country</label><input id="country"><label>city</label><input id="city"><label>메모</label><textarea id="note" rows="5"></textarea></div></div><div class="card"><h2>현재 상태 JSON</h2><pre id="raw">대기</pre></div><script>let state={};async function loadState(){state=await(await fetch('/api/travel-context-state')).json();mode.value=state.mode||'auto';gps.value=(state.display||{}).gps||'auto';date.value=(state.display||{}).date||'auto';time.value=(state.display||{}).time||'auto';place.value=(state.display||{}).place||'';language.value=(state.display||{}).language||'ko';lat.value=(state.internal||{}).lat||'';lng.value=(state.internal||{}).lng||'';country.value=(state.internal||{}).country||'';city.value=(state.internal||{}).city||'';note.value=(state.control||{}).note||'';raw.textContent=JSON.stringify(state,null,2)}async function saveState(){state.mode=mode.value;state.display={gps:gps.value,date:date.value,time:time.value,place:place.value,language:language.value};state.internal={lat:lat.value,lng:lng.value,country:country.value,city:city.value,updatedAt:new Date().toISOString()};state.control={allowOverride:mode.value==='control',note:note.value};const out=await(await fetch('/api/travel-context-state/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)})).json();raw.textContent=JSON.stringify(out,null,2);alert(out.ok?'저장 완료':'저장 실패')}loadState();</script></body></html>
