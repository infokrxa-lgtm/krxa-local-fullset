<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>KRXA Travel DEV · Page Actions</title>
<style>
body{font-family:Arial,sans-serif;background:#020617;margin:0;padding:18px;color:#e2e8f0}
.card{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:14px;margin:10px 0}
.head{cursor:pointer;font-weight:800;padding:10px;border-radius:12px;background:#1e293b}
.body{display:none;padding:10px 4px}
button,a.btn{display:block;text-decoration:none;text-align:center;border:0;border-radius:10px;padding:10px;margin:8px 0;background:#2563eb;color:white;font-weight:700}
.green{background:#16a34a!important}.red{background:#dc2626!important}.gray{background:#64748b!important}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
code{color:#93c5fd}
</style>
</head>
<body>
<h2>DEV · USER 1~8페이지 코드/프로그램 관리</h2>
<p>DEV는 코드/프로그램 신규·수정·삭제·ON-OFF 및 CONTROL 승인요청/보고를 담당합니다.</p>

<div id="wrap"></div>

<script>
const pages=[
 ["1페이지 Hero/추천","ui/js/travel_recommend.js","Hero·추천·DIR/SEARCH"],
 ["2페이지 실행허브","ui/app.html / ui/js/travel_recommend.js","회전 영역·교통허브"],
 ["3페이지 서비스카드","ui/app.html / ui/js/travel_recommend.js","호텔·식당·길찾기·관광·쇼핑"],
 ["4페이지 말대말","ui/js/m2m_translate.js","음성·번역·대화"],
 ["5페이지 기록","krxa_store.py / storage","히스토리·저장"],
 ["6페이지 즐겨찾기","storage / service links","등록·삭제·ON/OFF"],
 ["7페이지 SOS","ui/app.html / SOS config","긴급 연결"],
 ["8페이지 설정","ui/js/travel_map_apps.js / storage/travel_map_apps.json","지도앱·사용자 설정"]
];

function toggle(id){
 const el=document.getElementById(id);
 el.style.display = el.style.display==="block" ? "none" : "block";
}

function action(page, kind){
 alert(page + " / DEV " + kind + " 기능 연결 예정");
}

function card(p,i){
 const id="d"+i;
 return `<div class="card">
  <div class="head" onclick="toggle('${id}')">${p[0]}</div>
  <div class="body" id="${id}">
    <p><code>${p[1]}</code></p>
    <p>${p[2]}</p>
    <div class="grid">
      <button onclick="action('${p[0]}','신규 코드')">신규</button>
      <button onclick="action('${p[0]}','수정 코드')">수정</button>
      <button class="red" onclick="action('${p[0]}','삭제 코드')">삭제</button>
      <button class="gray" onclick="action('${p[0]}','ON/OFF 코드')">ON/OFF</button>
    </div>
    <button class="green" onclick="action('${p[0]}','CONTROL 승인요청')">CONTROL 승인요청</button>
    <button onclick="action('${p[0]}','개발 보고')">개발 보고</button>
    <a class="btn" target="_blank" href="/dev/travel-map-apps">지도앱 코드/템플릿 검증</a>
  </div>
 </div>`;
}

document.getElementById("wrap").innerHTML =
 pages.map((p,i)=>card(p,i)).join("") +
 `<div class="card">
   <div class="head" onclick="toggle('common')">공통 검증</div>
   <div class="body" id="common">
    <a class="btn green" target="_blank" href="/api/travel-map-apps">지도앱 API 확인</a>
    <a class="btn" target="_blank" href="/control/travel-user-bridge">CONTROL 연결 확인</a>
   </div>
 </div>`;
</script>
</body>
</html>
