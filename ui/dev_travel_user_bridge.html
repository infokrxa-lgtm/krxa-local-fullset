<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>KRXA Travel DEV UI Config</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#020617;color:#e2e8f0}
.layout{display:grid;grid-template-columns:310px 1fr;height:100vh}
.left{padding:18px;border-right:1px solid #334155;overflow:auto}
.right{padding:22px;overflow:auto}
.page{margin:8px 0;border:1px solid #334155;border-radius:14px;overflow:hidden}
.pageHead{padding:12px;font-weight:900;background:#1e293b;cursor:pointer}
.children{display:none;padding:8px;background:#0f172a}
.child{padding:10px;margin:6px 0;border-radius:10px;background:#1e293b;cursor:pointer}
.card{background:#0f172a;border:1px solid #334155;border-radius:18px;padding:18px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
button,a{border:0;border-radius:12px;padding:12px;font-weight:800;color:white;background:#2563eb;text-decoration:none;text-align:center;cursor:pointer;display:block}
.green{background:#16a34a}.red{background:#dc2626}.gray{background:#64748b}.yellow{background:#ca8a04}
input,textarea,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #334155;background:#020617;color:#e2e8f0}
pre{white-space:pre-wrap;word-break:break-word;background:#020617;border:1px solid #334155;padding:12px;border-radius:12px}
</style>
</head>
<body>
<div class="layout">
  <div class="left">
    <h2>DEV · 사용자 UI 코드/프로그램 관리</h2>
    <p>코드/프로그램 신규·수정·삭제·ON/OFF · CONTROL 승인요청/보고</p>
    <button class="green" onclick="loadConfig()">새로고침</button>
    <a target="_blank" href="/travel-v1">USER 화면 열기</a>
    <div id="tree"></div>
  </div>

  <div class="right">
    <div class="card">
      <h2 id="selectedTitle">하위 기능을 선택하세요</h2>
      <p id="selectedDesc">좌측에서 사용자 UI 페이지와 하위 기능을 선택하세요.</p>
    </div>

    <div class="card">
      <h3>작업</h3>
      <div class="grid">
        <button class="green" onclick="newItem()">신규</button>
        <button onclick="editItem()">수정</button>
        <button class="red" onclick="deleteItem()">삭제</button>
        <button class="gray" onclick="toggleItem()">ON/OFF</button>
      </div>
    </div>

    <div class="card">
      <h3>선택 항목 편집</h3>
      <input id="itemTitle" placeholder="표시명">
      <input id="itemType" placeholder="type 예: recommend, route, voice, site">
      <textarea id="itemMemo" rows="5" placeholder="관리/개발 메모"></textarea>
      <button class="green" onclick="saveSelected()">저장 → USER UI 반영</button>
    </div>

    <div class="card">
      <h3>JSON 상태</h3>
      <pre id="raw"></pre>
    </div>
  </div>
</div>

<script>
let config = null;
let currentPageId = null;
let currentItemId = null;

async function loadConfig(){
  const res = await fetch("/api/travel-ui-config");
  const data = await res.json();
  config = data.config || {pages:[]};
  renderTree();
  renderRaw();
}

async function saveConfig(){
  const res = await fetch("/api/travel-ui-config/save", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(config)
  });
  const data = await res.json();
  config = data.config;
  renderTree();
  renderRaw();
  alert("저장 완료. USER UI 새로고침 시 반영됩니다.");
}

function renderTree(){
  const box = document.getElementById("tree");
  box.innerHTML = (config.pages||[]).map((p,i)=>`
    <div class="page">
      <div class="pageHead" onclick="toggle('p${i}')">${p.title} ${p.enabled===false?"[OFF]":"[ON]"}</div>
      <div class="children" id="p${i}">
        ${(p.items||[]).map(it=>`
          <div class="child" onclick="selectItem('${p.id}','${it.id}')">
            ${it.title} ${it.enabled===false?"[OFF]":"[ON]"}
          </div>`).join("")}
      </div>
    </div>
  `).join("");
}

function toggle(id){
  const el=document.getElementById(id);
  el.style.display = el.style.display==="block" ? "none" : "block";
}

function getPage(){
  return (config.pages||[]).find(p=>p.id===currentPageId);
}

function getItem(){
  const p=getPage();
  if(!p) return null;
  return (p.items||[]).find(it=>it.id===currentItemId);
}

function selectItem(pageId,itemId){
  currentPageId = pageId;
  currentItemId = itemId;
  const p=getPage();
  const it=getItem();
  document.getElementById("selectedTitle").innerText = p.title + " · " + it.title;
  document.getElementById("selectedDesc").innerText = "DEV 담당 항목입니다.";
  document.getElementById("itemTitle").value = it.title || "";
  document.getElementById("itemType").value = it.type || "";
  document.getElementById("itemMemo").value = it.memo || "";
}

function newItem(){
  if(!currentPageId){
    alert("먼저 페이지/항목을 선택하세요.");
    return;
  }
  const p=getPage();
  const id="item_"+Date.now();
  p.items=p.items||[];
  p.items.push({id:id,title:"신규 항목",enabled:true,type:"custom",memo:""});
  currentItemId=id;
  renderTree();
  selectItem(currentPageId,currentItemId);
}

function editItem(){
  if(!getItem()){alert("항목을 선택하세요.");return;}
  document.getElementById("itemTitle").focus();
}

function deleteItem(){
  const p=getPage();
  if(!p||!currentItemId){alert("항목을 선택하세요.");return;}
  p.items=(p.items||[]).filter(it=>it.id!==currentItemId);
  currentItemId=null;
  saveConfig();
}

function toggleItem(){
  const it=getItem();
  if(!it){alert("항목을 선택하세요.");return;}
  it.enabled = it.enabled===false ? true : false;
  saveConfig();
}

function saveSelected(){
  const it=getItem();
  if(!it){alert("항목을 선택하세요.");return;}
  it.title=document.getElementById("itemTitle").value.trim() || it.title;
  it.type=document.getElementById("itemType").value.trim() || it.type;
  it.memo=document.getElementById("itemMemo").value;
  saveConfig();
}

function renderRaw(){
  document.getElementById("raw").textContent = JSON.stringify(config,null,2);
}

loadConfig();
</script>
</body>
</html>
