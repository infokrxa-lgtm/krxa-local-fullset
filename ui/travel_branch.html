<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Travel Branch</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#eef4ff;color:#0f172a}
.wrap{padding:18px}
.card{background:white;border-radius:22px;padding:18px;margin-bottom:14px;box-shadow:0 8px 22px #0001}
button{border:0;border-radius:14px;padding:12px 16px;background:#2563eb;color:white;font-weight:bold;width:100%;margin-top:8px}
.small{background:#e5e7eb;color:#111827}
</style>
</head>
<body>
<div class="wrap">
  <h2 id="title">추천</h2>
  <div id="heroList"></div>
  <button class="small" onclick="openFullList()">리스트 보기</button>
</div>

<script src="/ui/js/travel_context.js"></script>
<script>
const params = new URLSearchParams(location.search);
const branchId = params.get("branch") || "branch-heo-baekban";
let branch = null;

async function load(){
  const res = await fetch("/api/travel-branches");
  const data = await res.json();
  branch = (data.branches || []).find(b => b.id === branchId);
  if(!branch){ document.getElementById("heroList").innerText="데이터 없음"; return; }

  document.getElementById("title").innerText = branch.title;
  const active = (branch.items || []).filter(x => x.active).slice(0,5);

  document.getElementById("heroList").innerHTML = active.map(item => `
    <div class="card" onclick="KRXA_DeviceContext.openRouteTo('${item.address || item.map_keyword || item.name}')">
      <h3>${item.name}</h3>
      <p>${item.region || ""}</p>
      <p>${item.address || item.map_keyword || ""}</p>
      <small>${item.source || ""}</small>
    </div>
  `).join("");
}

function openFullList(){
  window.open("/travel-list?branch=" + encodeURIComponent(branchId), "_blank");
}

if(window.KRXA_DeviceContext) window.KRXA_DeviceContext.init();
load();
</script>
</body>
</html>
