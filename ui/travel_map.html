<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRXA Travel Map Window</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial,sans-serif}
.wrap{max-width:720px;margin:auto;padding:18px}
.card{background:#1e293b;border-radius:16px;padding:18px;margin:12px 0}
input{width:100%;padding:14px;border:0;border-radius:12px;margin:8px 0;font-size:16px}
button{width:100%;padding:14px;border:0;border-radius:12px;margin:6px 0;font-weight:bold;font-size:16px;cursor:pointer}
.blue{background:#2563eb;color:white}
.green{background:#16a34a;color:white}
.gray{background:#334155;color:white}
.small{color:#cbd5e1;font-size:13px}
pre{background:#020617;color:#d1fae5;padding:12px;border-radius:10px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="wrap">
  <h1>KRXA 지도 실행창</h1>
  <p class="small">현재 위치 기준으로 목적지를 입력하고 지도앱을 선택합니다.</p>

  <div class="card">
    <h2>목적지 입력</h2>
    <input id="destination" placeholder="예: 늘봄집 수서본점 / 안양중앙시장 / 여수">
    <button class="green" onclick="useCurrentLocation()">📍 내 위치 확인</button>
    <button class="blue" onclick="prepareRoute()">가는 방법 준비</button>
  </div>

  <div class="card">
    <h2>지도앱 선택</h2>
    <button class="blue" onclick="openGoogleMap()">Google Maps 열기</button>
    <button class="blue" onclick="openNaverMap()">Naver Map 열기</button>
    <button class="blue" onclick="openKakaoMap()">Kakao Map 열기</button>
  </div>

  <div class="card">
    <h2>KRXA 안내</h2>
    <pre id="info">목적지를 입력하거나, 이전 화면에서 전달된 목적지를 확인하세요.</pre>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
let lat = params.get("lat") || "";
let lng = params.get("lng") || "";
let q = params.get("q") || "";

document.getElementById("destination").value = q;

function logInfo(msg){
  document.getElementById("info").innerText = msg;
}

function useCurrentLocation(){
  if(!navigator.geolocation){
    logInfo("이 브라우저는 위치 기능을 지원하지 않습니다.");
    return;
  }

  logInfo("현재 위치 확인 중...");

  navigator.geolocation.getCurrentPosition(function(pos){
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;
    logInfo("내 위치 확인됨\n위도: " + lat + "\n경도: " + lng);
  }, function(){
    logInfo("위치 권한이 없거나 확인에 실패했습니다.");
  }, {
    enableHighAccuracy:true,
    timeout:10000,
    maximumAge:30000
  });
}

function getDestination(){
  return document.getElementById("destination").value.trim() || q || "nearby place";
}

function prepareRoute(){
  const dest = getDestination();

  let text =
    "목적지: " + dest + "\n" +
    "현재 위치: " + (lat && lng ? lat + "," + lng : "확인 필요") + "\n\n" +
    "안내:\n" +
    "- 지도앱을 선택하면 새창으로 열립니다.\n" +
    "- Google Maps는 현재 위치 표시가 가장 안정적입니다.\n" +
    "- Naver/Kakao는 장소 검색 중심으로 연결합니다.\n";

  logInfo(text);
}

function openGoogleMap(){
  const dest = getDestination();
  let url = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(dest);

  if(lat && lng){
    url += "&origin=" + encodeURIComponent(lat + "," + lng);
  }

  window.open(url, "_blank");
}

function openNaverMap(){
  const dest = getDestination();
  let url = "https://map.naver.com/p/search/" + encodeURIComponent(dest);
  if(lat && lng){
    url += "?c=" + lng + "," + lat + ",15,0,0,0,dh";
  }
  window.open(url, "_blank");
}

function openKakaoMap(){
  const dest = getDestination();
  let url = "https://map.kakao.com/?q=" + encodeURIComponent(dest);
  if(lat && lng){
    url += "&urlX=" + lng + "&urlY=" + lat;
  }
  window.open(url, "_blank");
}

prepareRoute();
if(!lat || !lng){
  useCurrentLocation();
}
</script>
</body>
</html>
