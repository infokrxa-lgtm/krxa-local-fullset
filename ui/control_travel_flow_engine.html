<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>PATCH21 Flow Engine Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#eef4fb;font-family:Arial,sans-serif;color:#0f172a}
.wrap{padding:16px}
.panel{background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:16px}
.grid{display:grid;grid-template-columns:380px 1fr;gap:16px}
.left,.right{background:#f8fafc;border:1px solid #dbe3ee;border-radius:18px;padding:14px}
.flow{border:1px solid #e5e7eb;border-radius:14px;background:white;margin:8px 0;padding:12px;cursor:pointer}
.flow.active{background:#dbeafe}
.step{border:1px solid #e5e7eb;border-radius:14px;background:white;margin:8px 0;padding:12px}
.btn{border:0;border-radius:999px;padding:8px 12px;font-weight:900;cursor:pointer;margin:3px}
.blue{background:#2563eb;color:white}.green{background:#16a34a;color:white}.gray{background:#64748b;color:white}
small{color:#64748b}
</style>
</head>
<body>
<div class="wrap">
<div class="panel">
<h2>PATCH21 · Flow Engine + Travel UI Design Layer</h2>
<p>Flow는 실행 구조, 사용자 UI는 디자인 Layer입니다. 추천 사이트와 지도앱 연결값을 포함합니다.</p>
<div class="grid">
  <div class="left" id="flowList"></div>
  <div class="right">
    <h2 id="title">Flow 선택</h2>
    <p id="desc">좌측 Flow를 선택하세요.</p>
    <div id="steps"></div>
  </div>
</div>
</div>
</div>
<script>
let FLOW=null, SELECTED=null;

async function load(){
  const r=await fetch('/api/patch21/flow-engine?ts='+Date.now(),{cache:'no-store'});
  const d=await r.json();
  FLOW=d.data;
  render();
}

function render(){
  const list=document.getElementById('flowList');
  list.innerHTML='';
  (FLOW.flows||[]).forEach(f=>{
    const div=document.createElement('div');
    div.className='flow '+(SELECTED&&SELECTED.id===f.id?'active':'');
    div.innerHTML='<b>'+f.title+'</b><br><small>'+f.ui_layer+'</small>';
    div.onclick=()=>{SELECTED=f;renderDetail();render();};
    list.appendChild(div);
  });
}

function renderDetail(){
  const f=SELECTED;
  document.getElementById('title').textContent=f.title;
  document.getElementById('desc').textContent=f.ui_layer;

  const siteHtml=(f.recommended_sites||[]).map(s=>
    '<div class="step"><b>'+s.name+'</b><br><small>'+s.url+'</small><br><button class="btn gray" onclick="window.open(\\''+s.url+'\\',\\'_blank\\')">테스트</button></div>'
  ).join('');

  document.getElementById('steps').innerHTML=
    '<h3>Flow 단계</h3>'+
    f.steps.map(st=>`
      <div class="step">
        <b>${st.title}</b><br>
        <small>type=${st.type} / editable=${st.editable}</small><br>
        ${st.editable?'<button class="btn blue" onclick="openWorkspace(\\''+f.id+'\\',\\''+st.id+'\\')">작업창</button>':'<button class="btn gray">자동/엔진 영역</button>'}
      </div>
    `).join('')+
    '<h3>추천 사이트</h3>'+
    (siteHtml||'<div class="step">추천 사이트 없음</div>')+
    '<h3>기본 지도</h3><div class="step"><b>'+FLOW.default_map.name+'</b><br><small>'+FLOW.default_map.template+'</small></div>';
}

function openWorkspace(flowId, stepId){
  const map={
    hero:['hero','baekban'],
    flight:['airport','flight_sites'],
    hotel:['hotel','default_sites'],
    food:['food','recommend'],
    transport:['taxi','taxi'],
    route:['route','destination'],
    tour:['tour','recommend'],
    shopping:['shopping','recommend'],
    call:['call','phone'],
    m2m:['m2m_link','connect'],
    sos:['sos','police']
  };
  const pair=map[flowId]||[flowId,stepId];
  window.open('/control/patch17-workspace?component='+pair[0]+'&group='+pair[1],'_blank');
}

load();
</script>
</body>
</html>
